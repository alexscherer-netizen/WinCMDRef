<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windows CMD & PowerShell — Befehlsreferenz</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --bg2: #111318;
    --bg3: #181c24;
    --bg4: #1e2330;
    --border: #252c3d;
    --border2: #2e3850;
    --text: #e2e8f0;
    --text2: #8892a4;
    --text3: #525f75;
    --blue: #3b82f6;
    --blue-dim: #1d3461;
    --blue-bright: #60a5fa;
    --green: #22c55e;
    --green-dim: #14532d;
    --purple: #a78bfa;
    --purple-dim: #2e1065;
    --amber: #f59e0b;
    --sidebar-w: 240px;
    --topbar-h: 54px;
    --bottom-nav-h: 60px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    display: flex;
    min-height: 100vh;
    font-size: 13px;
    overflow-x: hidden;
  }

  /* ── SIDEBAR OVERLAY (mobile) ── */
  #sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 90;
    backdrop-filter: blur(2px);
  }
  #sidebar-overlay.visible { display: block; }

  /* ── SIDEBAR ── */
  #sidebar {
    width: var(--sidebar-w);
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    overflow-y: auto;
    z-index: 100;
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  }

  .sidebar-logo {
    padding: 20px 18px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sidebar-logo .logo-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800; color: var(--blue-bright); letter-spacing: -0.02em; }
  .sidebar-logo .logo-sub { font-size: 10px; color: var(--text3); margin-top: 2px; letter-spacing: 0.08em; text-transform: uppercase; }

  /* Close button inside sidebar (mobile) */
  #sidebar-close {
    display: none;
    background: none;
    border: none;
    color: var(--text3);
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
  }

  .sidebar-search { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .sidebar-search input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 7px 10px 7px 30px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .sidebar-search input:focus { border-color: var(--blue); }
  .sidebar-search input::placeholder { color: var(--text3); }
  .search-icon { position: absolute; left: 24px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 13px; pointer-events: none; }
  .search-wrap { position: relative; }
  .sidebar-section { padding: 10px 14px 4px; font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text3); font-weight: 600; }
  .sidebar-item {
    display: flex; align-items: center; gap: 9px;
    padding: 10px 14px;
    cursor: pointer;
    transition: background 0.15s;
    color: var(--text2);
    font-size: 12px;
    border-left: 2px solid transparent;
    user-select: none;
  }
  .sidebar-item:hover { background: var(--bg3); color: var(--text); }
  .sidebar-item.active { background: var(--bg3); color: var(--blue-bright); border-left-color: var(--blue); }
  .sidebar-item .cat-icon { font-size: 14px; width: 18px; text-align: center; }
  .sidebar-item .cat-count { margin-left: auto; font-size: 10px; color: var(--text3); background: var(--bg4); padding: 1px 6px; border-radius: 10px; }
  .sidebar-footer { margin-top: auto; padding: 14px; border-top: 1px solid var(--border); font-size: 10px; color: var(--text3); text-align: center; }

  /* ── MAIN ── */
  #main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

  /* ── TOPBAR ── */
  #topbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: var(--topbar-h);
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  /* Hamburger (hidden on desktop) */
  #menu-btn {
    display: none;
    background: none;
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text2);
    font-size: 18px;
    cursor: pointer;
    padding: 5px 8px;
    line-height: 1;
    flex-shrink: 0;
  }

  .topbar-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .topbar-title span { color: var(--blue-bright); }
  .topbar-badges { display: flex; gap: 6px; margin-left: auto; align-items: center; flex-shrink: 0; }
  .stat-pill { font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border2); color: var(--text2); background: var(--bg3); }
  .stat-pill b { color: var(--text); }

  /* ── CONTENT ── */
  #content { padding: 20px 24px; flex: 1; }

  .cat-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .cat-header-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .cat-header-text h2 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); }
  .cat-header-text p { font-size: 11px; color: var(--text2); margin-top: 2px; }

  /* ── COMMAND GRID ── */
  .cmd-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px; }

  .cmd-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .cmd-card:hover { border-color: var(--border2); transform: translateY(-1px); }
  .cmd-card:active { transform: scale(0.99); }
  .cmd-card.open { border-color: var(--blue); }

  .cmd-head { padding: 13px 14px; display: flex; align-items: flex-start; gap: 10px; }
  .cmd-name-wrap { flex: 1; min-width: 0; }
  .cmd-name { font-size: 14px; font-weight: 700; color: var(--blue-bright); letter-spacing: -0.01em; }
  .cmd-short { font-size: 11px; color: var(--text2); margin-top: 4px; line-height: 1.55; }

  .badge { font-size: 9px; font-weight: 700; padding: 3px 7px; border-radius: 4px; letter-spacing: 0.04em; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
  .badge-cmd  { background: var(--blue-dim);   color: var(--blue-bright); border: 1px solid #1e3a6e; }
  .badge-ps   { background: var(--purple-dim); color: var(--purple);      border: 1px solid #4c1d95; }
  .badge-both { background: var(--green-dim);  color: var(--green);       border: 1px solid #166534; }
  .badge-ad   { background: #0c2a3d;           color: #38bdf8;            border: 1px solid #0e3a52; }
  .badge-dns  { background: #052e16;           color: #4ade80;            border: 1px solid #14532d; }
  .badge-run  { background: #2d0a3d;           color: #e879f9;            border: 1px solid #6b21a8; }
  .run-win { font-size: 9px; padding: 1px 5px; border-radius: 3px; margin-left: 4px; font-weight: 600; vertical-align: middle; }
  .run-w7  { background: #1a2a1a; color: #86efac; border: 1px solid #166534; }
  .run-w8  { background: #1a1a2e; color: #93c5fd; border: 1px solid #1e3a8a; }
  .run-w10 { background: #1a1a1a; color: #d1d5db; border: 1px solid #374151; }
  .run-w11 { background: #2a1a2e; color: #c4b5fd; border: 1px solid #5b21b6; }

  .cmd-arrow { color: var(--text3); font-size: 11px; transition: transform 0.25s; margin-top: 3px; flex-shrink: 0; }
  .cmd-card.open .cmd-arrow { transform: rotate(180deg); color: var(--blue); }

  .cmd-detail { display: none; border-top: 1px solid var(--border); padding: 14px; background: var(--bg3); }
  .cmd-card.open .cmd-detail { display: block; }

  .detail-row { margin-bottom: 12px; }
  .detail-row:last-child { margin-bottom: 0; }
  .detail-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); font-weight: 600; margin-bottom: 5px; }
  .code-box { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-size: 11px; color: #c9d1d9; overflow-x: auto; white-space: pre; line-height: 1.5; }
  .example-line { background: var(--bg); border: 1px solid var(--border); border-left: 2px solid var(--green); border-radius: 6px; padding: 6px 10px 6px 12px; font-size: 11px; color: #7ee787; margin-bottom: 4px; overflow-x: auto; white-space: pre; }
  .example-line:last-child { margin-bottom: 0; }
  .tip-box { background: #1a1500; border: 1px solid #3d2e00; border-left: 2px solid var(--amber); border-radius: 6px; padding: 8px 12px; font-size: 11px; color: #d4a017; line-height: 1.6; white-space: normal; }

  .section-block { margin-bottom: 32px; }
  .section-title { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; padding: 10px 14px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; border-left: 3px solid var(--blue); }
  .section-title-icon { font-size: 18px; flex-shrink: 0; }
  .section-title-name { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: var(--text); }
  .section-title-desc { font-size: 11px; color: var(--text2); margin-top: 1px; }
  .section-title-count { margin-left: auto; font-size: 10px; color: var(--text3); background: var(--bg4); padding: 3px 10px; border-radius: 20px; white-space: nowrap; }

  .empty { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty .e-icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 13px; }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
  mark { background: #2d1b00; color: var(--amber); border-radius: 2px; padding: 0 2px; }

  /* ══════════════════════════════════════════
     BOTTOM NAV (mobile only)
  ══════════════════════════════════════════ */
  #bottom-nav {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--bottom-nav-h);
    background: var(--bg2);
    border-top: 1px solid var(--border);
    z-index: 80;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  #bottom-nav::-webkit-scrollbar { display: none; }
  #bottom-nav-inner {
    display: flex;
    align-items: stretch;
    height: 100%;
    min-width: max-content;
    padding: 0 6px;
    gap: 2px;
  }
  .bnav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    padding: 0 12px;
    cursor: pointer;
    color: var(--text3);
    font-size: 9px;
    letter-spacing: 0.04em;
    border-radius: 8px;
    transition: background 0.15s, color 0.15s;
    min-width: 56px;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .bnav-item:active { background: var(--bg3); }
  .bnav-item.active { color: var(--blue-bright); }
  .bnav-icon { font-size: 18px; line-height: 1; }
  .bnav-label { font-size: 8.5px; white-space: nowrap; }

  /* ══════════════════════════════════════════
     TABLET  (768px – 1024px)
  ══════════════════════════════════════════ */
  @media (max-width: 1024px) {
    :root { --sidebar-w: 200px; }
    #content { padding: 16px 18px; }
    .cmd-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 8px; }
    .topbar-badges .stat-pill:not(:first-child) { display: none; }
    #topbar { padding: 0 16px; }
    .guide-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
  }

  /* ══════════════════════════════════════════
     MOBILE  (≤ 767px) — Slide-in Drawer
  ══════════════════════════════════════════ */
  @media (max-width: 767px) {
    body { font-size: 13px; }

    /* Sidebar becomes off-canvas drawer */
    #sidebar {
      transform: translateX(-100%);
      width: 260px;
      bottom: 0;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    #sidebar.open { transform: translateX(0); }
    #sidebar-close { display: block; }

    /* Main takes full width */
    #main { margin-left: 0; padding-bottom: var(--bottom-nav-h); }

    /* Topbar: hamburger visible, pills hidden */
    #topbar { padding: 0 12px; gap: 8px; }
    #menu-btn { display: flex; align-items: center; }
    .topbar-badges { display: none; }
    .topbar-title { font-size: 13px; }

    /* Bottom nav visible */
    #bottom-nav { display: flex; }

    /* Content */
    #content { padding: 10px; }

    /* Full-width grid on small screens */
    .cmd-grid { grid-template-columns: 1fr; gap: 7px; }

    /* Cards */
    .cmd-head { padding: 11px 12px; }
    .cmd-name { font-size: 13px; }
    .cmd-short { font-size: 11px; }
    .code-box, .example-line, .tip-box { font-size: 11px; }

    /* Section header */
    .section-title-desc { display: none; }
    .cat-header-text h2 { font-size: 15px; }

    /* Sidebar */
    .sidebar-search input { font-size: 13px; padding: 8px 10px 8px 30px; }
    .sidebar-item { padding: 10px 14px; font-size: 12px; }
    .sidebar-item .cat-icon { font-size: 15px; width: 20px; }

    /* Guide */
    .guide-grid { grid-template-columns: 1fr; gap: 8px; }
    .guide-title { font-size: 12px; }
    .guide-subtitle { font-size: 10px; }
    .guide-panel { padding: 10px 12px; }
    .guide-tab { padding: 7px 11px; font-size: 9px; }
    .step-code { font-size: 10.5px; padding: 6px 9px; }
    .step-title { font-size: 11px; }
    .step-desc { font-size: 10.5px; }
    .step-note, .step-warn, .step-path { font-size: 10.5px; }
    .step-num { width: 20px; height: 20px; min-width: 20px; font-size: 10px; }
    .step { gap: 8px; margin-bottom: 12px; }
  }

  /* ══════════════════════════════════════════
     VERY SMALL  (≤ 380px)
  ══════════════════════════════════════════ */
  @media (max-width: 380px) {
    :root { --bottom-nav-h: 56px; }
    .cmd-name { font-size: 14px; }
    .bnav-label { display: none; }
    .bnav-item { min-width: 44px; }
  }

  /* ══════════════════════════════════════════
     SAFE AREA (iPhone notch / home bar)
  ══════════════════════════════════════════ */
  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    #bottom-nav {
      padding-bottom: env(safe-area-inset-bottom);
      height: calc(var(--bottom-nav-h) + env(safe-area-inset-bottom));
    }
    @media (max-width: 767px) {
      #main { padding-bottom: calc(var(--bottom-nav-h) + env(safe-area-inset-bottom)); }
    }
  }
  /* ══════════════════════════════════════════
     AD GUIDE STYLES
  ══════════════════════════════════════════ */
  .guide-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }
  .guide-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .guide-card:hover { border-color: #fb923c66; transform: translateY(-1px); }
  .guide-card:active { transform: scale(0.99); }
  .guide-card.open { border-color: #fb923c; overflow: visible; }

  .guide-head {
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .guide-emoji {
    font-size: 22px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .guide-head-text { flex: 1; min-width: 0; }
  .guide-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #fb923c;
    letter-spacing: -0.01em;
  }
  .guide-subtitle {
    font-size: 11px;
    color: var(--text2);
    margin-top: 3px;
    line-height: 1.5;
    white-space: normal;
    word-break: break-word;
  }
  .guide-arrow {
    color: var(--text3);
    font-size: 11px;
    transition: transform 0.25s;
    margin-top: 3px;
    flex-shrink: 0;
  }
  .guide-card.open .guide-arrow { transform: rotate(180deg); color: #fb923c; }

  .guide-body {
    display: none;
    border-top: 1px solid var(--border);
    background: var(--bg3);
    padding: 0;
    border-radius: 0 0 12px 12px;
    overflow-x: hidden;
    overflow-y: visible;
  }
  .guide-card.open .guide-body { display: block; }

  /* Tab switcher inside guide */
  .guide-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .guide-tabs::-webkit-scrollbar { display: none; }
  .guide-tab {
    padding: 9px 14px;
    font-size: 10px;
    font-weight: 700;
    color: var(--text3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }
  .guide-tab:hover { color: var(--text2); }
  .guide-tab.active { color: #fb923c; border-bottom-color: #fb923c; }

  .guide-panel { display: none; padding: 16px; }
  .guide-panel.active { display: block; }

  /* Steps */
  .steps { list-style: none; }
  .step {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
    position: relative;
  }
  .step:last-child { margin-bottom: 0; }
  .step-num {
    width: 24px;
    height: 24px;
    min-width: 24px;
    border-radius: 50%;
    background: #7c2d1244;
    border: 1px solid #fb923c66;
    color: #fb923c;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .step-content {
    flex: 1;
    min-width: 0;
    max-width: 100%;
  }
  .step-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.4;
    white-space: normal;
    word-break: break-word;
  }
  .step-desc {
    font-size: 11px;
    color: var(--text2);
    line-height: 1.6;
    margin-bottom: 5px;
    white-space: normal;
    word-break: break-word;
  }
  .step-code {
    display: block;
    background: var(--bg);
    border: 1px solid var(--border);
    border-left: 2px solid #fb923c;
    border-radius: 5px;
    padding: 7px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #c9d1d9;
    white-space: pre;
    overflow-x: scroll;
    overflow-y: visible;
    -webkit-overflow-scrolling: touch;
    margin-top: 4px;
    width: 100%;
    box-sizing: border-box;
    /* Force scrollbar visible on iOS */
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }
  .step-code::-webkit-scrollbar { height: 4px; }
  .step-code::-webkit-scrollbar-track { background: transparent; }
  .step-code::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
  .step-note {
    font-size: 10.5px;
    color: #d4a017;
    background: #1a150033;
    border: 1px solid #3d2e0066;
    border-radius: 5px;
    padding: 6px 10px;
    margin-top: 4px;
    line-height: 1.6;
    white-space: normal;
    word-break: break-word;
  }
  .step-warn {
    font-size: 10.5px;
    color: #f87171;
    background: #1a000033;
    border: 1px solid #5a000066;
    border-radius: 5px;
    padding: 6px 10px;
    margin-top: 4px;
    line-height: 1.6;
    white-space: normal;
    word-break: break-word;
  }
  .step-path {
    font-size: 11px;
    color: #7ee787;
    background: var(--bg);
    border: 1px solid var(--border);
    border-left: 2px solid var(--green);
    border-radius: 5px;
    padding: 6px 10px;
    margin-top: 4px;
    white-space: normal;
    word-break: break-word;
    line-height: 1.6;
  }

  /* Method badges inside guide */
  .method-badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
