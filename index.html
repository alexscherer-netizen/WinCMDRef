  {name:'dnscmd /recordadd',cat:'dns',typ:'cmd',short:'Fuegt einen DNS-Eintrag (Resource Record) zu einer Zone hinzu.',syntax:'dnscmd [Server] /recordadd [Zone] [Name] [TTL] [Typ] [Wert]',examples:['dnscmd /recordadd firma.local server01 A 192.168.1.50','dnscmd /recordadd firma.local @ MX 10 mail.firma.local','dnscmd /recordadd firma.local www CNAME server01.firma.local','dnscmd /recordadd firma.local @ TXT "v=spf1 mx ~all"','dnscmd /recordadd 1.168.192.in-addr.arpa 50 PTR server01.firma.local.'],tip:'@ steht fuer den Zonennamen selbst (Apex). PTR-Eintraege erfordern die Reverse-Zone. TTL in Sekunden.'},
  {name:'dnscmd /recorddelete',cat:'dns',typ:'cmd',short:'Loescht einen DNS-Eintrag aus einer Zone.',syntax:'dnscmd [Server] /recorddelete [Zone] [Name] [Typ] [Wert] [/f]',examples:['dnscmd /recorddelete firma.local server01 A 192.168.1.50 /f','dnscmd /recorddelete firma.local www CNAME server01.firma.local /f'],tip:'/f unterdrueckt die Rueckfrage. Alle Parameter muessen exakt uebereinstimmen.'},
  {name:'dnscmd /enumrecords',cat:'dns',typ:'cmd',short:'Listet alle Resource Records einer Zone oder eines Namens auf.',syntax:'dnscmd [Server] /enumrecords [Zone] [Name] [/type Typ Wert] [/authority] [/glue]',examples:['dnscmd /enumrecords firma.local @','dnscmd /enumrecords firma.local server01','dnscmd DC01 /enumrecords firma.local @ /type MX'],tip:'@ zeigt alle Records des Zonen-Apex. Gut zur schnellen Zone-Ueberpruefung.'},
  {name:'dnscmd /statistics',cat:'dns',typ:'cmd',short:'Zeigt DNS-Server-Statistiken (Abfragen, Antworten, Fehler).',syntax:'dnscmd [Server] /statistics [/clear]',examples:['dnscmd /statistics','dnscmd DC01 /statistics','dnscmd /statistics /clear'],tip:'/clear setzt die Zaehler zurueck. Zeigt Queries, Rekursion, Timeout, Cache-Hits usw.'},
  {name:'dnscmd /clearcache',cat:'dns',typ:'cmd',short:'Leert den DNS-Resolver-Cache auf dem Server.',syntax:'dnscmd [Server] /clearcache',examples:['dnscmd /clearcache','dnscmd DC01 /clearcache'],tip:'Unterschied zu ipconfig /flushdns: dieser Befehl leert den Cache des Servers, nicht des Clients.'},
  {name:'dnscmd /config',cat:'dns',typ:'cmd',short:'Aendert Konfigurationsparameter des DNS-Servers.',syntax:'dnscmd [Server] /config [/Parameter] [Wert]',examples:['dnscmd /config /forwarders 8.8.8.8 8.8.4.4','dnscmd /config /norecursion 1','dnscmd /config /loglevel 0x0000F331','dnscmd /config /scavenginginterval 168'],tip:'/norecursion 1 deaktiviert Rekursion (fuer reine Forwarder). /scavenginginterval in Stunden.'},
  {name:'dnscmd /startscavenging',cat:'dns',typ:'cmd',short:'Startet die DNS-Bereinigung (Scavenging) sofort.',syntax:'dnscmd [Server] /startscavenging',examples:['dnscmd /startscavenging','dnscmd DC01 /startscavenging'],tip:'Scavenging entfernt veraltete (verwaiste) dynamische DNS-Eintraege. Vorher Scavenging in der Zone aktivieren.'},
  {name:'dnscmd /writebackfiles',cat:'dns',typ:'cmd',short:'Schreibt alle Zonenaenderungen sofort in die Zone-Dateien.',syntax:'dnscmd [Server] /writebackfiles [Zonenname]',examples:['dnscmd /writebackfiles','dnscmd /writebackfiles firma.local'],tip:'Bei AD-integrierten Zonen werden Daten in AD gespeichert. Bei dateibasierten Zonen in .dns-Dateien.'},
  {name:'dnscmd /zonepause',cat:'dns',typ:'cmd',short:'Pausiert eine Zone — beantwortet keine Abfragen mehr.',syntax:'dnscmd [Server] /zonepause [Zonenname]  |  /zoneresume [Zonenname]',examples:['dnscmd /zonepause testzone.local','dnscmd /zoneresume testzone.local'],tip:'Nuetzlich fuer Wartung. Abfragen fuer diese Zone werden mit SERVFAIL beantwortet.'},
  {name:'dnscmd /exportsettings',cat:'dns',typ:'cmd',short:'Exportiert die DNS-Serverkonfiguration in eine Textdatei.',syntax:'dnscmd [Server] /exportsettings',examples:['dnscmd /exportsettings','dnscmd DC01 /exportsettings'],tip:'Erstellt eine DnsSettings.txt im DNS-Serververzeichnis. Gut fuer Dokumentation und Backups.'},

  // ═══════════════════════════════════════════════
  // DNS SERVER — PowerShell DnsServer-Modul
  // ═══════════════════════════════════════════════
  {name:'Get-DnsServer',cat:'dns',typ:'ps',short:'Zeigt die komplette Konfiguration des DNS-Servers.',syntax:'Get-DnsServer [-ComputerName Server]',examples:['Get-DnsServer','Get-DnsServer -ComputerName DC01','(Get-DnsServer).ServerSetting'],tip:'Gibt ein vollstaendiges Konfigurationsobjekt zurueck. Ideal fuer Skripte und Dokumentation.'},
  {name:'Get-DnsServerZone',cat:'dns',typ:'ps',short:'Listet alle Zonen auf dem DNS-Server auf.',syntax:'Get-DnsServerZone [-ComputerName Server] [-Name Zonenname]',examples:['Get-DnsServerZone','Get-DnsServerZone -ComputerName DC01','Get-DnsServerZone | Where ZoneType -eq Primary | Select ZoneName,IsADIntegrated'],tip:'Zeigt ZoneType, AD-Integration, ReplicationScope und mehr als Objekte.'},
  {name:'Add-DnsServerPrimaryZone',cat:'dns',typ:'ps',short:'Erstellt eine neue primaere DNS-Zone.',syntax:'Add-DnsServerPrimaryZone -Name [Zone] -ReplicationScope Domain|Forest|Legacy|None [-ZoneFile Datei]',examples:['Add-DnsServerPrimaryZone -Name "firma.local" -ReplicationScope Domain','Add-DnsServerPrimaryZone -Name "1.168.192.in-addr.arpa" -ReplicationScope Domain','Add-DnsServerPrimaryZone -Name "test.local" -ZoneFile "test.local.dns" -PassThru'],tip:'ReplicationScope Domain = AD-integriert (empfohlen). Ohne ReplicationScope = dateibasiert.'},
  {name:'Add-DnsServerSecondaryZone',cat:'dns',typ:'ps',short:'Erstellt eine Sekundaerzone mit Zonenabzug vom Master.',syntax:'Add-DnsServerSecondaryZone -Name [Zone] -ZoneFile [Datei] -MasterServers [IP]',examples:['Add-DnsServerSecondaryZone -Name "firma.local" -ZoneFile "firma.local.dns" -MasterServers 192.168.1.1','Add-DnsServerSecondaryZone -Name "1.168.192.in-addr.arpa" -ZoneFile "rev.dns" -MasterServers 192.168.1.1'],tip:'Sekundaerzonen sind schreibgeschuetzt. Zonenabzug muss auf dem Master erlaubt sein.'},
  {name:'Add-DnsServerStubZone',cat:'dns',typ:'ps',short:'Erstellt eine Stub-Zone — speichert nur NS- und SOA-Records.',syntax:'Add-DnsServerStubZone -Name [Zone] -MasterServers [IP] -ReplicationScope Domain',examples:['Add-DnsServerStubZone -Name "partner.local" -MasterServers 10.10.1.1 -ReplicationScope Domain'],tip:'Stub-Zonen koennen DNS-Delegation ersetzen und erleichtern Namensaufloesung in anderen Domaenen.'},
  {name:'Remove-DnsServerZone',cat:'dns',typ:'ps',short:'Loescht eine Zone vom DNS-Server.',syntax:'Remove-DnsServerZone -Name [Zone] [-Force] [-ComputerName Server]',examples:['Remove-DnsServerZone -Name "testzone.local" -Force','Remove-DnsServerZone -Name "altezone.local" -ComputerName DC01 -Force'],tip:'-Force unterdrueckt die Rueckfrage. Bei AD-integrierten Zonen auch AD-Replikationspartition loeschen.'},
  {name:'Get-DnsServerResourceRecord',cat:'dns',typ:'ps',short:'Liest Resource Records aus einer DNS-Zone.',syntax:'Get-DnsServerResourceRecord -ZoneName [Zone] [-Name Name] [-RRType A|AAAA|MX|CNAME|NS|SOA|PTR|TXT|SRV]',examples:['Get-DnsServerResourceRecord -ZoneName firma.local','Get-DnsServerResourceRecord -ZoneName firma.local -RRType A','Get-DnsServerResourceRecord -ZoneName firma.local -Name server01','Get-DnsServerResourceRecord -ZoneName firma.local -RRType MX | Select HostName,RecordData'],tip:'Gibt Objekte zurueck — ideal fuer Filterpipelines. RecordData enthaelt den eigentlichen Wert.'},
  {name:'Add-DnsServerResourceRecordA',cat:'dns',typ:'ps',short:'Erstellt einen A-Record (IPv4-Adresse).',syntax:'Add-DnsServerResourceRecordA -ZoneName [Zone] -Name [Host] -IPv4Address [IP] [-TimeToLive [HH:MM:SS]] [-CreatePtr]',examples:['Add-DnsServerResourceRecordA -ZoneName firma.local -Name server01 -IPv4Address 192.168.1.50','Add-DnsServerResourceRecordA -ZoneName firma.local -Name www -IPv4Address 192.168.1.80 -TimeToLive 01:00:00 -CreatePtr'],tip:'-CreatePtr erstellt automatisch den passenden PTR-Eintrag in der Reverse-Zone.'},
  {name:'Add-DnsServerResourceRecordAAAA',cat:'dns',typ:'ps',short:'Erstellt einen AAAA-Record (IPv6-Adresse).',syntax:'Add-DnsServerResourceRecordAAAA -ZoneName [Zone] -Name [Host] -IPv6Address [IPv6]',examples:['Add-DnsServerResourceRecordAAAA -ZoneName firma.local -Name server01 -IPv6Address "2001:db8::1"'],tip:'Gleich wie A-Record, aber fuer IPv6. Reverse-Zone: ip6.arpa'},
  {name:'Add-DnsServerResourceRecordCName',cat:'dns',typ:'ps',short:'Erstellt einen CNAME-Record (Alias).',syntax:'Add-DnsServerResourceRecordCName -ZoneName [Zone] -Name [Alias] -HostNameAlias [Ziel]',examples:['Add-DnsServerResourceRecordCName -ZoneName firma.local -Name www -HostNameAlias server01.firma.local','Add-DnsServerResourceRecordCName -ZoneName firma.local -Name ftp -HostNameAlias fileserver.firma.local'],tip:'Ziel (HostNameAlias) muss ein FQDN mit abschliessendem Punkt sein oder relativ zur Zone.'},
  {name:'Add-DnsServerResourceRecordMX',cat:'dns',typ:'ps',short:'Erstellt einen MX-Record (Mail Exchanger).',syntax:'Add-DnsServerResourceRecordMX -ZoneName [Zone] -Name [Name] -MailExchange [FQDN] -Preference [Prio]',examples:['Add-DnsServerResourceRecordMX -ZoneName firma.local -Name @ -MailExchange mail.firma.local -Preference 10','Add-DnsServerResourceRecordMX -ZoneName firma.local -Name @ -MailExchange backup-mail.firma.local -Preference 20'],tip:'@ = Zonen-Apex. Niedrigere Preference = hoehere Prioritaet. MailExchange muss auf A-Record zeigen.'},
  {name:'Add-DnsServerResourceRecordPtr',cat:'dns',typ:'ps',short:'Erstellt einen PTR-Record (Reverse-DNS).',syntax:'Add-DnsServerResourceRecordPtr -ZoneName [ReverseZone] -Name [Letztes Oktett] -PtrDomainName [FQDN]',examples:['Add-DnsServerResourceRecordPtr -ZoneName "1.168.192.in-addr.arpa" -Name "50" -PtrDomainName "server01.firma.local."','Add-DnsServerResourceRecordPtr -ZoneName "1.168.192.in-addr.arpa" -Name "1" -PtrDomainName "dc01.firma.local."'],tip:'Name = letztes Oktett der IP. FQDN mit abschliessendem Punkt. Reverse-Zone muss existieren.'},
  {name:'Add-DnsServerResourceRecordTxt',cat:'dns',typ:'ps',short:'Erstellt einen TXT-Record (SPF, DKIM, DMARC, Verifikation).',syntax:'Add-DnsServerResourceRecordTxt -ZoneName [Zone] -Name [Name] -DescriptiveText [Wert]',examples:['Add-DnsServerResourceRecordTxt -ZoneName firma.local -Name @ -DescriptiveText "v=spf1 mx ip4:192.168.1.0/24 ~all"','Add-DnsServerResourceRecordTxt -ZoneName firma.local -Name _dmarc -DescriptiveText "v=DMARC1; p=none; rua=mailto:dmarc@firma.local"'],tip:'SPF, DKIM und DMARC werden alle als TXT-Records angelegt. Name @ = Zonen-Apex.'},
  {name:'Remove-DnsServerResourceRecord',cat:'dns',typ:'ps',short:'Loescht einen oder mehrere Resource Records.',syntax:'Remove-DnsServerResourceRecord -ZoneName [Zone] -Name [Name] -RRType [Typ] [-Force]',examples:['Remove-DnsServerResourceRecord -ZoneName firma.local -Name server01 -RRType A -Force','Get-DnsServerResourceRecord -ZoneName firma.local -RRType A | Where HostName -eq "althost" | Remove-DnsServerResourceRecord -ZoneName firma.local -Force'],tip:'-Force unterdrueckt die Rueckfrage. Per Pipeline koennen mehrere Records geloescht werden.'},
  {name:'Set-DnsServerResourceRecord',cat:'dns',typ:'ps',short:'Aendert einen bestehenden Resource Record.',syntax:'$alt = Get-DnsServerResourceRecord ...  |  $neu = $alt.Clone()  |  Set-DnsServerResourceRecord -NewInputObject $neu -OldInputObject $alt -ZoneName [Zone]',examples:['$old = Get-DnsServerResourceRecord -ZoneName firma.local -Name server01 -RRType A','$new = $old.Clone()','$new.RecordData.IPv4Address = [System.Net.IPAddress]::Parse("192.168.1.99")','Set-DnsServerResourceRecord -NewInputObject $new -OldInputObject $old -ZoneName firma.local'],tip:'PS-Methode fuer IP-Aenderung: alten Record klonen, Wert aendern, dann Set-DnsServerResourceRecord aufrufen.'},
  {name:'Get-DnsServerForwarder',cat:'dns',typ:'ps',short:'Zeigt konfigurierte DNS-Weiterleitungen (Forwarder).',syntax:'Get-DnsServerForwarder [-ComputerName Server]',examples:['Get-DnsServerForwarder','Get-DnsServerForwarder -ComputerName DC01'],tip:'Zeigt IP-Adressen der Forwarder und ob Rekursion bei Ausfall erlaubt ist.'},
  {name:'Set-DnsServerForwarder',cat:'dns',typ:'ps',short:'Setzt oder ersetzt DNS-Weiterleitungen.',syntax:'Set-DnsServerForwarder -IPAddress [IP,...] [-UseRootHint $true|$false]',examples:['Set-DnsServerForwarder -IPAddress 8.8.8.8,8.8.4.4','Set-DnsServerForwarder -IPAddress 1.1.1.1,1.0.0.1 -UseRootHint $false','Set-DnsServerForwarder -IPAddress 192.168.1.1'],tip:'-UseRootHint $false verhindert Fallback auf Root-Hints wenn Forwarder nicht erreichbar.'},
  {name:'Add-DnsServerForwarder',cat:'dns',typ:'ps',short:'Fuegt einen zusaetzlichen Forwarder hinzu.',syntax:'Add-DnsServerForwarder -IPAddress [IP] [-ComputerName Server]',examples:['Add-DnsServerForwarder -IPAddress 9.9.9.9','Add-DnsServerForwarder -IPAddress 149.112.112.112 -ComputerName DC01'],tip:'Im Unterschied zu Set-DnsServerForwarder wird die Liste ergaenzt, nicht ersetzt.'},
  {name:'Add-DnsServerConditionalForwarderZone',cat:'dns',typ:'ps',short:'Erstellt eine bedingte Weiterleitung fuer eine bestimmte Domaene.',syntax:'Add-DnsServerConditionalForwarderZone -Name [Domaene] -MasterServers [IP,...] [-ReplicationScope Domain]',examples:['Add-DnsServerConditionalForwarderZone -Name "partner.local" -MasterServers 10.10.1.1','Add-DnsServerConditionalForwarderZone -Name "azure.intern" -MasterServers 168.63.129.16 -ReplicationScope Domain'],tip:'Bedingte Weiterleitungen loesen Abfragen fuer eine bestimmte Domaene an einen spezifischen DNS-Server weiter.'},
  {name:'Get-DnsServerCache',cat:'dns',typ:'ps',short:'Zeigt den Inhalt des DNS-Server-Caches.',syntax:'Get-DnsServerCache [-ComputerName Server]',examples:['Get-DnsServerCache','Get-DnsServerCache | Select HostName,RecordType,TimeToLive'],tip:'Zeigt gecachte Eintraege des Resolvers. Unterschied: Client-Cache = ipconfig /displaydns.'},
  {name:'Clear-DnsServerCache',cat:'dns',typ:'ps',short:'Leert den DNS-Server-Cache.',syntax:'Clear-DnsServerCache [-ComputerName Server] [-Force]',examples:['Clear-DnsServerCache -Force','Clear-DnsServerCache -ComputerName DC01 -Force'],tip:'Aequivalent zu dnscmd /clearcache. -Force unterdrueckt die Rueckfrage.'},
  {name:'Get-DnsServerStatistics',cat:'dns',typ:'ps',short:'Zeigt DNS-Serverstatistiken (Queries, Antworten, Cache-Hits).',syntax:'Get-DnsServerStatistics [-ComputerName Server] [-Clear]',examples:['Get-DnsServerStatistics','(Get-DnsServerStatistics).PacketStatistics','(Get-DnsServerStatistics).CacheStatistics'],tip:'Gibt detaillierte Unterobjekte zurueck: PacketStatistics, QueryStatistics, CacheStatistics usw.'},
  {name:'Invoke-DnsServerZoneSign',cat:'dns',typ:'ps',short:'Signiert eine Zone mit DNSSEC.',syntax:'Invoke-DnsServerZoneSign -ZoneName [Zone] [-Force]',examples:['Invoke-DnsServerZoneSign -ZoneName firma.local -Force'],tip:'Erfordert vorher konfigurierte DNSSEC-Schuessel. Zone muss Primary und AD-integriert sein.'},
  {name:'Get-DnsServerDsSetting',cat:'dns',typ:'ps',short:'Zeigt die AD-Integrationseinstellungen des DNS-Servers.',syntax:'Get-DnsServerDsSetting [-ComputerName Server]',examples:['Get-DnsServerDsSetting','Get-DnsServerDsSetting -ComputerName DC01'],tip:'Zeigt DirectoryPartitionAutoEnlistInterval, LazyUpdateInterval, TombstoneInterval usw.'},
  {name:'Sync-DnsServerZone',cat:'dns',typ:'ps',short:'Synchronisiert eine AD-integrierte Zone sofort aus dem AD.',syntax:'Sync-DnsServerZone -Name [Zone] [-ComputerName Server] [-PassThru]',examples:['Sync-DnsServerZone -Name firma.local -PassThru','Sync-DnsServerZone -Name "1.168.192.in-addr.arpa" -ComputerName DC01'],tip:'Erzwingt sofortigen Abgleich mit AD. Hilfreich nach manuellen AD-Aenderungen.'},
  {name:'Get-DnsServerZoneAging',cat:'dns',typ:'ps',short:'Zeigt die Scavenging-Einstellungen einer Zone.',syntax:'Get-DnsServerZoneAging -Name [Zone] [-ComputerName Server]',examples:['Get-DnsServerZoneAging -Name firma.local','Get-DnsServerZoneAging -Name "1.168.192.in-addr.arpa"'],tip:'Zeigt AgingEnabled, RefreshInterval, NoRefreshInterval. Basis fuer automatisches Scavenging.'},
  {name:'Set-DnsServerZoneAging',cat:'dns',typ:'ps',short:'Aktiviert und konfiguriert Scavenging fuer eine Zone.',syntax:'Set-DnsServerZoneAging -Name [Zone] -Aging $true|$false [-RefreshInterval HH:MM:SS] [-NoRefreshInterval HH:MM:SS]',examples:['Set-DnsServerZoneAging -Name firma.local -Aging $true -RefreshInterval 7.00:00:00 -NoRefreshInterval 7.00:00:00','Set-DnsServerZoneAging -Name firma.local -Aging $false'],tip:'Scavenging entfernt veraltete dynamische Eintraege. Standard: NoRefresh=7 Tage, Refresh=7 Tage.'},
  {name:'Import-Module DnsServer',cat:'dns',typ:'ps',short:'Laedt das DNS Server PowerShell-Modul.',syntax:'Import-Module DnsServer',examples:['Import-Module DnsServer','Get-Module -Name DnsServer -ListAvailable','Install-WindowsFeature RSAT-DNS-Server'],tip:'Auf DNS-Servern automatisch verfuegbar. Auf Clients: RSAT-DNS installieren (Install-WindowsFeature RSAT-DNS-Server).'},

  {name:'fsutil',cat:'run',subcat:'dev',typ:'run',win:['7','8','10','11'],short:'Dateisystem-Dienstprogramm — NTFS, ReFS, Hardlinks',syntax:'Zeigt fsutil-Hilfe',examples:[],tip:'fsutil hardlink create erstellt Hardlinks. fsutil dirty query C: pruefen ob Chkdsk noetig.'},
  {name:'runas /user:Administrator cmd',cat:'run',subcat:'dev',typ:'run',win:['7','8','10','11'],short:'CMD als anderer Benutzer starten',syntax:'Startet CMD unter anderem Benutzerkonto',examples:[],tip:'Passwort wird interaktiv abgefragt. Nuetzlich wenn kein UAC-Dialog erscheint oder anderes Konto benoetigt.'},
  {name:'sysprep',cat:'run',subcat:'dev',typ:'run',win:['7','8','10','11'],short:'Systemvorbereitung — Windows-Image fuer Deployment',syntax:'Oeffnet: Systemvorbereitungstool-Verzeichnis',examples:[],tip:'C:\\Windows\\System32\\Sysprep\\sysprep.exe Verallgemeinert Windows-Installationen fuer Deployment/Klonen.'},
  {name:'credwiz',cat:'run',subcat:'dev',typ:'run',win:['7','8','10','11'],short:'Gespeicherte Anmeldeinformationen sichern/wiederherstellen',syntax:'Oeffnet: Assistent fuer gespeicherte Anmeldeinformationen',examples:[],tip:'Exportiert und importiert Windows Credential Manager Eintraege.'},
  {name:'control keymgr.dll',cat:'run',subcat:'dev',typ:'run',win:['7','8','10','11'],short:'Gespeicherte Passwoerter im Credential Manager',syntax:'Oeffnet: Windows-Anmeldeinformationsverwaltung',examples:[],tip:'Gespeicherte Netzwerkpasswoerter, Windows-Anmeldedaten und Zertifikate einsehen und loeschen.'},
  {name:'wfs',cat:'run',subcat:'dev',typ:'run',win:['7','8','10','11'],short:'Windows-Fax und -Scan',syntax:'Oeffnet: Windows-Fax und -Scan',examples:[],tip:'Eingehende Faxe verwalten und Dokumente scannen wenn Fax-/Scanner-Hardware vorhanden.'},
  {name:'msra',cat:'run',subcat:'dev',typ:'run',win:['7','8','10','11'],short:'Windows-Remoteunterstuetzung — Fernhilfe anfordern',syntax:'Oeffnet: Windows-Remoteunterstuetzung',examples:[],tip:'Einladung erstellen und an Supporter senden. Supporter kann dann Desktop sehen und steuern (mit Erlaubnis).'},
  {name:'eudcedit',cat:'run',subcat:'dev',typ:'run',win:['7','8','10','11'],short:'Zeicheneditor — eigene Unicode-Zeichen erstellen',syntax:'Oeffnet: Zeicheneditor (Private Character Editor)',examples:[],tip:'Eigene Schriftzeichen in Unicode-Bereiche F000-F0FF erstellen. Sehr spezialisiertes Tool.'},
  {name:'fxscover',cat:'run',subcat:'dev',typ:'run',win:['7','8','10','11'],short:'Fax-Deckblatt-Editor',syntax:'Oeffnet: Fax-Deckblatt-Editor',examples:[],tip:'Erstellt eigene Deckblaetter fuer Windows-Fax. Benoetigt Fax-Feature (Windows-Komponenten).'},
  {name:'iscsicpl',cat:'run',subcat:'dev',typ:'run',win:['7','8','10','11'],short:'iSCSI-Initiator — SAN-Speicher ueber Netzwerk verbinden',syntax:'Oeffnet: iSCSI-Initiator',examples:[],tip:'Verbindet iSCSI-Targets (SAN-Speicher) ueber Netzwerk. iSCSI-Dienst muss laufen.'},
  {name:'lpksetup',cat:'run',subcat:'dev',typ:'run',win:['7','8'],short:'Sprachpaket installieren/deinstallieren',syntax:'Oeffnet: Sprachpaket-Installation',examples:[],tip:'In Windows 10/11: Einstellungen → Zeit und Sprache → Sprache. lpksetup nur fuer aeltere Versionen.'},
  {name:'cttune',cat:'run',subcat:'dev',typ:'run',win:['7','8','10','11'],short:'ClearType-Textoptimierung konfigurieren',syntax:'Oeffnet: ClearType-Text-Tuner',examples:[],tip:'Schriften auf LCD-Bildschirmen optimieren. Durchlaufen des Assistenten verbessert Lesbarkeit deutlich.'},
  {name:'colorcpl',cat:'run',subcat:'dev',typ:'run',win:['7','8','10','11'],short:'Farbverwaltung — ICC-Profile fuer Monitore/Drucker',syntax:'Oeffnet: Farbverwaltung',examples:[],tip:'ICC-Farbprofile fuer Monitore und Drucker installieren und zuweisen. Wichtig fuer Foto-/Druckbereich.'},

  // ═══ TROUBLESHOOTING BEFEHLE ═══

  // System & Boot
  {name:'sfc /scannow',cat:'ts',typ:'cmd',short:'Systemdateipruefung — beschaedigte Windows-Dateien reparieren.',syntax:'sfc /scannow',examples:['sfc /scannow','sfc /verifyonly','sfc /scanfile=C:\\Windows\\System32\\ntdll.dll'],tip:'Als Admin! Ergebnis in C:\\Windows\\Logs\\CBS\\CBS.log. Danach dism /Online /Cleanup-Image /RestoreHealth wenn Fehler bleiben.'},
  {name:'dism /RestoreHealth',cat:'ts',typ:'cmd',short:'Windows-Image online reparieren — loest sfc-Fehler.',syntax:'dism /Online /Cleanup-Image /RestoreHealth',examples:['dism /Online /Cleanup-Image /ScanHealth','dism /Online /Cleanup-Image /CheckHealth','dism /Online /Cleanup-Image /RestoreHealth'],tip:'ScanHealth = sucht Fehler. CheckHealth = schnelle Pruefung. RestoreHealth = repariert via Windows Update. Als Admin!'},
  {name:'chkdsk /f /r',cat:'ts',typ:'cmd',short:'Festplattenprobleme pruefen und reparieren.',syntax:'chkdsk C: /f /r /x',examples:['chkdsk C: /f /r','chkdsk D: /f /x','chkdsk C: /scan'],tip:'/f repariert Fehler. /r findet fehlerhafte Sektoren. /x erzwingt Abhaengen. Auf Systemlaufwerk: beim naechsten Neustart.'},
  {name:'bootrec /fixmbr',cat:'ts',typ:'cmd',short:'MBR/Bootsektor reparieren — kein Booten mehr moeglich.',syntax:'bootrec [/fixmbr|/fixboot|/rebuildbcd|/scanos]',examples:['bootrec /fixmbr','bootrec /fixboot','bootrec /scanos','bootrec /rebuildbcd'],tip:'Nur aus WinRE! /fixmbr = MBR neu schreiben. /rebuildbcd = Bootliste neu aufbauen. /scanos = Windows-Installationen suchen.'},
  {name:'bcdedit /enum',cat:'ts',typ:'cmd',short:'Booteintraege anzeigen — doppelter Boot, Bootpfade.',syntax:'bcdedit /enum [all|active|firmware]',examples:['bcdedit /enum','bcdedit /enum all','bcdedit /delete {GUID} /cleanup'],tip:'GUID-Eintraege mit {identifier}. Defekte Eintraege per /delete entfernen. Neustart-Zaehler: /set {current} bootmenupolicy legacy.'},
  {name:'winmgmt /verifyrepository',cat:'ts',typ:'cmd',short:'WMI-Repository auf Beschaedigung pruefen.',syntax:'winmgmt [/verifyrepository|/salvagerepository|/resetrepository]',examples:['winmgmt /verifyrepository','winmgmt /salvagerepository'],tip:'WMI-Fehler verursachen viele Probleme (WBEM, Task Manager, Systeminfo). /salvagerepository repariert, /resetrepository setzt zurueck (Datenverlust!).'},
  {name:'powercfg /lastwake',cat:'ts',typ:'cmd',short:'Zeigt was den PC zuletzt aufgeweckt hat.',syntax:'powercfg /lastwake  |  powercfg /waketimers  |  powercfg /devicequery wake_armed',examples:['powercfg /lastwake','powercfg /waketimers','powercfg /devicequery wake_armed'],tip:'PC wacht naechtens auf? /lastwake und /waketimers zeigen den Schuldigen. /devicequery zeigt alle Wake-faehigen Geraete.'},

  // Netzwerk-Diagnose
  {name:'ipconfig /all',cat:'ts',typ:'cmd',short:'Vollstaendige IP-Konfiguration — IP, DNS, Gateway, MAC.',syntax:'ipconfig /all',examples:['ipconfig /all','ipconfig /all | findstr "DNS"','ipconfig /all | findstr "IPv4"'],tip:'Zeigt DNS-Server, DHCP-Status, MAC-Adressen, Miet-Ablauf. Erste Anlaufstelle bei Netzwerkproblemen.'},
  {name:'netsh int ip reset',cat:'ts',typ:'cmd',short:'TCP/IP-Stack vollstaendig zuruecksetzen.',syntax:'netsh int ip reset [Logdatei.txt]',examples:['netsh int ip reset C:\\ip_reset.log','netsh winsock reset','ipconfig /flushdns','ipconfig /release && ipconfig /renew'],tip:'Die Vier-Schritte-Kur: 1. netsh int ip reset 2. netsh winsock reset 3. ipconfig /flushdns 4. Neustart. Loest 90% der Netzwerkprobleme.'},
  {name:'tracert -d',cat:'ts',typ:'cmd',short:'Routing-Pfad ohne DNS-Aufloesung verfolgen — schneller.',syntax:'tracert -d [Ziel]',examples:['tracert -d 8.8.8.8','tracert -d google.com','tracert -d 192.168.1.1'],tip:'* = Hop antwortet nicht (Firewall). Letzter erreichbare Hop = Problemstelle. -d spart Zeit durch keine DNS-Aufloesung.'},
  {name:'Test-NetConnection -Port',cat:'ts',typ:'ps',short:'TCP-Port-Erreichbarkeit testen — ersetzt telnet.',syntax:'Test-NetConnection [Host] -Port [N] -InformationLevel Detailed',examples:['Test-NetConnection google.com -Port 443','Test-NetConnection dc01 -Port 389','Test-NetConnection 192.168.1.1 -Port 3389','Test-NetConnection 8.8.8.8 -Port 53'],tip:'TcpTestSucceeded: True = Port offen. False = gesperrt oder Dienst laeuft nicht. Moderner telnet-Ersatz.'},
  {name:'netstat -ano',cat:'ts',typ:'cmd',short:'Alle offenen Ports mit PID anzeigen — wer hoert wo?',syntax:'netstat -ano | findstr [Port|Status]',examples:['netstat -ano | findstr LISTEN','netstat -ano | findstr :3389','netstat -ano | findstr :80','netstat -ano | findstr ESTABLISHED'],tip:'PID aus netstat + tasklist /FI "PID eq [N]" zeigt welches Programm den Port nutzt. Unbekannte Ports = Malware-Verdacht!'},
  {name:'nslookup -type=all',cat:'ts',typ:'both',short:'DNS vollstaendig abfragen — alle Records eines Namens.',syntax:'nslookup -type=ALL [Name] [DNS-Server]',examples:['nslookup -type=ALL firma.local','nslookup -type=MX firma.de','nslookup -type=SOA firma.local dc01'],tip:'ALL zeigt alle Record-Typen. SOA zeigt autoritaetiven Server. MX prueft Mail-Config. Abweichender DNS testen: nslookup name 8.8.8.8.'},
  {name:'arp -a',cat:'ts',typ:'cmd',short:'ARP-Tabelle — IP-zu-MAC Zuordnung pruefen, Duplikate finden.',syntax:'arp -a [IP]',examples:['arp -a','arp -a 192.168.1.1','arp -d *'],tip:'Zwei IPs mit gleicher MAC = ARP-Spoofing. Zwei MACs fuer gleiche IP = IP-Konflikt. arp -d * leert den Cache.'},
  {name:'route print',cat:'ts',typ:'cmd',short:'Routing-Tabelle anzeigen — Gateway- und Routing-Probleme.',syntax:'route print [-4|-6]',examples:['route print','route print -4','route print | findstr "0.0.0.0"'],tip:'0.0.0.0/0 = Default-Gateway. Mehrere Default-Routes = Probleme moeglich. Falsche Metrik kann zu Routingfehlern fuehren.'},
  {name:'Get-NetAdapter | Select *',cat:'ts',typ:'ps',short:'Alle Adapter-Details — Status, Treiber, MAC, Speed.',syntax:'Get-NetAdapter | Select Name,Status,LinkSpeed,MacAddress,DriverVersion',examples:['Get-NetAdapter | Select Name,Status,LinkSpeed,MacAddress','Get-NetAdapter | Where Status -ne Up','Get-NetAdapterStatistics | Select Name,ReceivedDiscardedPackets,OutboundDiscardedPackets'],tip:'ReceivedDiscardedPackets > 0 = Fehler auf Layer 2. Status Disconnected = Kabel oder Switch-Problem.'},

  // Performance & Ressourcen
  {name:'resmon',cat:'ts',typ:'cmd',short:'Ressourcenmonitor — CPU, RAM, Disk, Netzwerk detailliert.',syntax:'resmon',examples:['resmon'],tip:'Zeigt welcher Prozess eine Datei sperrt (Disk-Tab). CPU-Tab: blockierende Threads (gelb). Netzwerk-Tab: aktive Verbindungen pro Prozess.'},
  {name:'perfmon /report',cat:'ts',typ:'cmd',short:'60-Sekunden Systemdiagnose-Bericht erstellen.',syntax:'perfmon /report',examples:['perfmon /report'],tip:'Analysiert automatisch CPU, RAM, Disk, Netzwerk und gibt Empfehlungen. HTML-Bericht in %systemdrive%\\PerfLogs\\System\\Diagnostics.'},
  {name:'typeperf',cat:'ts',typ:'cmd',short:'Performance-Counter live in der Konsole messen.',syntax:'typeperf "\\Indikator" -si [Sekunden] -sc [Anzahl]',examples:['"\\Processor(_Total)\\% Processor Time" -si 2 -sc 10','"\\Memory\\Available MBytes" -si 1','"\\PhysicalDisk(_Total)\\Avg. Disk Queue Length" -si 2'],tip:'Queue Length > 2 = Festplatte ist Flaschenhals. CPU > 90% dauerhaft = CPU-Last-Problem. RAM < 200MB = Speicherdruck.'},
  {name:'wmic cpu get LoadPercentage',cat:'ts',typ:'cmd',short:'CPU-Auslastung direkt abrufen.',syntax:'wmic cpu get LoadPercentage,Name,NumberOfCores',examples:['wmic cpu get LoadPercentage','wmic cpu get Name,NumberOfCores,MaxClockSpeed','wmic memorychip get Capacity,Speed'],tip:'Schnelle CPU- und RAM-Infos ohne Task-Manager. wmic memorychip zeigt RAM-Bausteine.'},
  {name:'Get-Process | Sort CPU',cat:'ts',typ:'ps',short:'Prozesse nach CPU-Last sortieren — Top-Verbraucher finden.',syntax:'Get-Process | Sort-Object CPU -Descending | Select -First 15',examples:['Get-Process | Sort CPU -Descending | Select -First 10 Name,CPU,WorkingSet','Get-Process | Sort WorkingSet -Descending | Select -First 10 Name,WorkingSet,Id','Get-Process | Where CPU -gt 50 | Select Name,CPU,Id'],tip:'WorkingSet = RAM-Verbrauch in Bytes. CPU = gesamte CPU-Zeit seit Start (nicht aktuelle Last). Fuer Echtzeit-Last: Measure-Object.'},
  {name:'Get-Disk',cat:'ts',typ:'ps',short:'Festplatten-Status und Zustand pruefen.',syntax:'Get-Disk  |  Get-PhysicalDisk',examples:['Get-Disk | Select Number,FriendlyName,Size,OperationalStatus','Get-PhysicalDisk | Select FriendlyName,OperationalStatus,HealthStatus,Size','Get-StorageReliabilityCounter -PhysicalDisk (Get-PhysicalDisk)'],tip:'HealthStatus: Healthy/Warning/Unhealthy. Unhealthy = Festplatte ersetzen! Get-StorageReliabilityCounter zeigt SMART-Werte.'},
  {name:'Get-Volume',cat:'ts',typ:'ps',short:'Laufwerksstatus und freien Speicher pruefen.',syntax:'Get-Volume',examples:['Get-Volume | Select DriveLetter,FileSystemLabel,SizeRemaining,Size,HealthStatus','Get-Volume | Where SizeRemaining -lt 1GB','Get-Volume | Select DriveLetter,@{n="FreeGB";e={[math]::Round($_.SizeRemaining/1GB,1)}}'],tip:'HealthStatus: Healthy/Warning/Unknown. SizeRemaining < 10% = Speichermangel-Probleme. FileSystem: NTFS/ReFS/FAT32.'},

  // Ereignisanalyse
  {name:'Get-WinEvent -Filter',cat:'ts',typ:'ps',short:'Ereignisprotokoll gezielt nach Fehlern und IDs abfragen.',syntax:'Get-WinEvent -FilterHashtable @{LogName="System"; Level=2; StartTime=(Get-Date).AddHours(-24)}',examples:["Get-WinEvent -FilterHashtable @{LogName='System'; Level=2} -MaxEvents 20","Get-WinEvent -FilterHashtable @{LogName='Application'; Id=1000} -MaxEvents 10","Get-WinEvent -FilterHashtable @{LogName='Security'; Id=4625} -MaxEvents 20 | Select TimeCreated,Message"],tip:'Level: 1=Kritisch, 2=Fehler, 3=Warnung. Id=4625: fehlgeschlagene Anmeldungen. Id=1000: Anwendungsabsturz. Id=41: Bluescreens.'},
  {name:'wevtutil qe',cat:'ts',typ:'cmd',short:'Ereignisprotokoll per CMD abfragen — auch remote.',syntax:'wevtutil qe [Protokoll] /q:"*[System[EventID=N]]" /c:20 /f:text',examples:["wevtutil qe System /q:\"*[System[Level=2]]\" /c:10 /f:text","wevtutil qe Security /q:\"*[System[EventID=4625]]\" /c:20 /f:text","wevtutil qe Application /q:\"*[System[EventID=1000]]\" /c:10"],tip:'Level 2=Fehler. EventID 4625=Anmelde-Fehler, 41=Bluescreen, 1000=App-Absturz, 6008=Unerwartetes Herunterfahren.'},
  {name:'eventvwr.msc',cat:'ts',typ:'cmd',short:'Ereignisanzeige — grafische Ansicht aller Protokolle.',syntax:'eventvwr.msc',examples:['eventvwr.msc'],tip:'Windows-Protokolle → System: Treiberfehler, Startprobleme. Anwendung: App-Abstauerze. Sicherheit: Anmeldeversuche. Benutzerdefinierte Ansichten → Administrative Ereignisse fuer alle Fehler.'},
  {name:'auditpol /get /category:*',cat:'ts',typ:'cmd',short:'Aktive Audit-Richtlinien anzeigen — was wird protokolliert?',syntax:'auditpol /get /category:*',examples:['auditpol /get /category:*','auditpol /get /subcategory:"Logon"','auditpol /set /subcategory:"Logon" /success:enable /failure:enable'],tip:'Zeigt ob Anmeldungen, Objektzugriffe, Rechtenutzung protokolliert werden. Essentiell fuer Forensik.'},

  // Dienste & Prozesse
  {name:'sc query type= all',cat:'ts',typ:'cmd',short:'Alle Dienste mit Status auflisten.',syntax:'sc query type= all state= all',examples:['sc query type= all state= all','sc query type= all state= running','sc query state= stopped'],tip:'state= all zeigt auch gestoppte Dienste. findstr pipen: sc query type= all | findstr "SERVICE_NAME\\|STATE"'},
  {name:'sc failure',cat:'ts',typ:'cmd',short:'Fehlerverhalten eines Dienstes konfigurieren und pruefen.',syntax:'sc failure [Dienstname] reset= N actions= restart/N/restart/N',examples:['sc failure wuauserv','sc failure spooler reset= 86400 actions= restart/5000/restart/5000/restart/5000'],tip:'Zeigt/setzt was bei Dienstausfall passiert. actions= restart/5000 = nach 5 Sek neu starten.'},
  {name:'tasklist /svc',cat:'ts',typ:'cmd',short:'Prozesse mit gehosteten Diensten anzeigen (svchost-Analyse).',syntax:'tasklist /svc [/FI "IMAGENAME eq svchost.exe"]',examples:['tasklist /svc','tasklist /svc /FI "IMAGENAME eq svchost.exe"','tasklist /svc | findstr svchost'],tip:'Zeigt welche Dienste in welchem svchost.exe laufen. Essentiell um CPU-fressende svchost-Instanzen zu identifizieren.'},
  {name:'Get-Service | Where',cat:'ts',typ:'ps',short:'Gestoppte Dienste finden die automatisch starten sollten.',syntax:'Get-Service | Where {$_.StartType -eq "Automatic" -and $_.Status -eq "Stopped"}',examples:["Get-Service | Where {$_.StartType -eq 'Automatic' -and $_.Status -eq 'Stopped'}",'Get-Service | Sort Status | Format-Table Name,Status,StartType -AutoSize','Get-Service | Where Status -eq Failed'],tip:'Automatic-Stopped Dienste = koennen Probleme verursachen. Fehlgeschlagen? Restart-Service -Name [Name] -Force.'},

  // Treiber & Hardware
  {name:'driverquery /si',cat:'ts',typ:'cmd',short:'Nur signierte Treiber anzeigen — unsignierte = verdaechtig.',syntax:'driverquery /si /fo TABLE',examples:['driverquery /si','driverquery /v /fo CSV > treiber.csv','driverquery | findstr /i "FALSE"'],tip:'FALSE in der IsSigned-Spalte = unsignierter Treiber = potentielles Problem. Als CSV exportieren fuer Vergleiche.'},
  {name:'Get-WindowsDriver',cat:'ts',typ:'ps',short:'Installierte Treiber und Drittanbieter-Treiber auflisten.',syntax:'Get-WindowsDriver -Online [-All]',examples:['Get-WindowsDriver -Online | Select Driver,ProviderName,Date,Version','Get-WindowsDriver -Online | Where BootCritical -eq $true','Get-WindowsDriver -Online | Sort Date -Descending | Select -First 20'],tip:'BootCritical-Treiber beeinflussen den Bootprozess direkt. Neueste Treiber nach Datum sortiert zeigt kuerzliche Aenderungen.'},
  {name:'pnputil /enum-drivers',cat:'ts',typ:'cmd',short:'OEM-Treiber im Treiber-Store auflisten.',syntax:'pnputil /enum-drivers',examples:['pnputil /enum-drivers','pnputil /enum-drivers | findstr "Provider\|Original"','pnputil /delete-driver oem5.inf /uninstall /force'],tip:'oem*.inf Dateien sind installierte Drittanbieter-Treiber. Defekte Treiber per /delete-driver entfernen.'},
  {name:'msinfo32 /report',cat:'ts',typ:'cmd',short:'Vollstaendigen Systembericht in Datei exportieren.',syntax:'msinfo32 /report [Datei.txt] [/categories +all]',examples:['msinfo32 /report C:\\sysinfo.txt','msinfo32 /report C:\\sysinfo.txt /categories +all'],tip:'Erstellt vollstaendige Systeminformation als Textdatei. Ideal um Infos von Remote-PCs ohne Remote-Zugriff zu sammeln.'},
  {name:'devmgmt.msc',cat:'ts',typ:'cmd',short:'Geraete-Manager — Treiberfehler und Hardware-Probleme sehen.',syntax:'devmgmt.msc',examples:['devmgmt.msc'],tip:'Gelbes ! = Treiberfehler. Rotes X = Geraet deaktiviert. Ausrufezeichen-Geraete: Rechtsklick → Treiber aktualisieren oder deinstallieren + Neustart.'},
  {name:'Get-PnpDevice',cat:'ts',typ:'ps',short:'PnP-Geraete und Fehlergeraete per PowerShell abfragen.',syntax:'Get-PnpDevice [-Status Error|Unknown|OK] [-Class Klasse]',examples:["Get-PnpDevice -Status 'Error'","Get-PnpDevice -Status 'Unknown'",'Get-PnpDevice | Where Status -ne OK | Select Name,Status,Class'],tip:'Status Error/Unknown = Treiberproblem. Enable-PnpDevice -InstanceId ... zum Aktivieren per Skript.'},

  // Sicherheit
  {name:'Get-MpComputerStatus',cat:'ts',typ:'ps',short:'Windows Defender Status — Schutz aktiv, Signaturen aktuell?',syntax:'Get-MpComputerStatus',examples:['Get-MpComputerStatus | Select AntivirusEnabled,RealTimeProtectionEnabled,AntivirusSignatureLastUpdated','Get-MpComputerStatus | Select *Enabled*','Get-MpThreat | Select ThreatName,SeverityID,Resources'],tip:'AntivirusSignatureAge > 7 = Signaturen veraltet. Get-MpThreat zeigt erkannte Bedrohungen. Update-MpSignature aktualisiert Signaturen.'},
  {name:'netsh advfirewall show',cat:'ts',typ:'cmd',short:'Firewall-Status und aktive Profile anzeigen.',syntax:'netsh advfirewall show [allprofiles|currentprofile|domainprofile]',examples:['netsh advfirewall show allprofiles','netsh advfirewall show currentprofile','netsh advfirewall firewall show rule name=all | findstr "Rule Name\\|Enabled\\|Action"'],tip:'State OFF = Firewall deaktiviert (Sicherheitsrisiko!). Aktive Regeln: advfirewall firewall show rule name=all.'},
  {name:'cipher /u /n',cat:'ts',typ:'cmd',short:'Alle verschluesselten Dateien auf dem System finden.',syntax:'cipher /u /n [/h]',examples:['cipher /u /n','cipher /u /n /h'],tip:'/u aktualisiert EFS-Schluesseldaten. /n verhindert Aktualisierung (nur anzeigen). /h zeigt auch versteckte Dateien.'},
  {name:'secedit /analyze',cat:'ts',typ:'cmd',short:'Sicherheitseinstellungen gegen eine Vorlage analysieren.',syntax:'secedit /analyze /db [Datei.sdb] /cfg [Vorlage.inf] /log [Log.txt]',examples:['secedit /analyze /db C:\\analyse.sdb /cfg C:\\secvorlage.inf /log C:\\analyse.log','secedit /export /cfg C:\\aktuell.inf'],tip:'Vergleicht aktuelle Einstellungen gegen eine Sicherheitsvorlage. /export sichert aktuelle Konfiguration.'},

  // ═══ SICHERHEIT & HAERTUNG ═══
  // BitLocker
  {name:'manage-bde -status',cat:'sicherheit',typ:'cmd',short:'BitLocker-Status aller Laufwerke anzeigen.',syntax:'manage-bde -status [Laufwerk:]',examples:['manage-bde -status','manage-bde -status C:','manage-bde -status D:'],tip:'Zeigt Schutzstatus, Verschluesselungsprozentsatz, Schutzmethode und gesperrte/entsperrte Laufwerke.'},
  {name:'manage-bde -on',cat:'sicherheit',typ:'cmd',short:'BitLocker auf einem Laufwerk aktivieren.',syntax:'manage-bde -on [Laufwerk:] -recoverypassword -recoverykey [Pfad]',examples:['manage-bde -on C: -recoverypassword -recoverykey C:\\BitLockerKey','manage-bde -on D: -password','manage-bde -on C: -tpm'],tip:'-recoverypassword generiert 48-stelligen Recovery-Key. -tpm nutzt TPM-Chip. Recovery-Key sicher aufbewahren!'},
  {name:'manage-bde -off',cat:'sicherheit',typ:'cmd',short:'BitLocker deaktivieren und Laufwerk entschluesseln.',syntax:'manage-bde -off [Laufwerk:]',examples:['manage-bde -off D:','manage-bde -off C:'],tip:'Entschluesselung laeuft im Hintergrund. Status mit manage-bde -status pruefen. Bei C: Neustart benoetigt.'},
  {name:'manage-bde -unlock',cat:'sicherheit',typ:'cmd',short:'BitLocker-gesperrtes Laufwerk entsperren.',syntax:'manage-bde -unlock [Laufwerk:] -recoverypassword [48-Stellen-Key]',examples:['manage-bde -unlock D: -password','manage-bde -unlock D: -recoverypassword 123456-789012-...','manage-bde -unlock D: -certificate -ct IDCertificate'],tip:'-password fragt Passwort interaktiv ab. -recoverypassword nimmt den 48-stelligen Recovery-Key.'},
  {name:'manage-bde -protectors',cat:'sicherheit',typ:'cmd',short:'BitLocker-Schutzmethoden (TPM, Passwort, Key) anzeigen.',syntax:'manage-bde -protectors -get [Laufwerk:]',examples:['manage-bde -protectors -get C:','manage-bde -protectors -add C: -recoverypassword','manage-bde -protectors -delete C: -id {GUID}'],tip:'Zeigt alle Protectors (TPM, Numerical Password, External Key). -add fuer zusaetzlichen Protector.'},
  {name:'Get-BitLockerVolume',cat:'sicherheit',typ:'ps',short:'BitLocker-Status aller Volumes per PowerShell.',syntax:'Get-BitLockerVolume [-MountPoint Laufwerk]',examples:['Get-BitLockerVolume','Get-BitLockerVolume -MountPoint C:','Get-BitLockerVolume | Select MountPoint,VolumeStatus,EncryptionPercentage,ProtectionStatus'],tip:'VolumeStatus: FullyEncrypted/FullyDecrypted/EncryptionInProgress. ProtectionStatus: On/Off.'},
  {name:'Enable-BitLocker',cat:'sicherheit',typ:'ps',short:'BitLocker per PowerShell aktivieren.',syntax:'Enable-BitLocker -MountPoint [Laufwerk] -EncryptionMethod [Methode] -TpmProtector|-PasswordProtector',examples:['Enable-BitLocker -MountPoint C: -EncryptionMethod XtsAes256 -TpmProtector','Enable-BitLocker -MountPoint D: -EncryptionMethod XtsAes256 -PasswordProtector -Password (ConvertTo-SecureString "BitL0ck!" -AsPlainText -Force)','Add-BitLockerKeyProtector -MountPoint C: -RecoveryPasswordProtector'],tip:'XtsAes256 ist staerkste Methode. TpmProtector benoetigt TPM 1.2+. Add-BitLockerKeyProtector fuer Recovery-Key.'},
  {name:'Disable-BitLocker',cat:'sicherheit',typ:'ps',short:'BitLocker deaktivieren per PowerShell.',syntax:'Disable-BitLocker -MountPoint [Laufwerk]',examples:['Disable-BitLocker -MountPoint C:','Disable-BitLocker -MountPoint D:','Get-BitLockerVolume | Disable-BitLocker'],tip:'Entschluesselung laeuft asynchron. Get-BitLockerVolume zum Fortschritt ueberwachen.'},
  // Zertifikate
  {name:'certutil -hashfile',cat:'sicherheit',typ:'cmd',short:'Datei-Hash berechnen und pruefen (MD5/SHA1/SHA256).',syntax:'certutil -hashfile [Datei] [MD5|SHA1|SHA256|SHA512]',examples:['certutil -hashfile setup.exe SHA256','certutil -hashfile C:\\iso.img MD5','certutil -hashfile datei.zip SHA512'],tip:'Standard-Pruefwerkzeug fuer Download-Integrituet. Hash mit Herstellerangabe vergleichen.'},
  {name:'certutil -store',cat:'sicherheit',typ:'cmd',short:'Zertifikate im Zertifikatspeicher anzeigen.',syntax:'certutil -store [My|Root|CA|TrustedPeople] [Seriennummer]',examples:['certutil -store My','certutil -store Root','certutil -store My | findstr "Subject\\|NotAfter"','certutil -store -user My'],tip:'-user fuer Benutzer-Store. Ohne -user = Computer-Store. Root = vertrauenswuerdige Stammzertifikate.'},
  {name:'certutil -addstore',cat:'sicherheit',typ:'cmd',short:'Zertifikat in Zertifikatspeicher importieren.',syntax:'certutil -addstore [Store] [Zertifikatsdatei]',examples:['certutil -addstore Root C:\\CA.cer','certutil -addstore TrustedPeople C:\\user.cer','certutil -enterprise -addstore Root C:\\CA.cer'],tip:'-enterprise importiert in Computer-Store (alle Benutzer). Als Admin. Fuer GPO-Verteilung besser Group Policy nutzen.'},
  {name:'certutil -delstore',cat:'sicherheit',typ:'cmd',short:'Zertifikat aus Zertifikatspeicher loeschen.',syntax:'certutil -delstore [Store] [Seriennummer|Thumbprint]',examples:['certutil -delstore Root "1234567890ABCDEF"','certutil -delstore My SerialNumber'],tip:'Thumbprint/Seriennummer aus certutil -store ermitteln. Vorsicht beim Loeschen von Root-CAs!'},
  {name:'certutil -generateSSTFromWU',cat:'sicherheit',typ:'cmd',short:'Aktuelle Vertrauensliste von Windows Update herunterladen.',syntax:'certutil -generateSSTFromWU [Datei.sst]',examples:['certutil -generateSSTFromWU C:\\roots.sst','certutil -addstore Root C:\\roots.sst'],tip:'Laedt aktuellste Root-CA-Liste von Microsoft. Dann -addstore zum Importieren.'},
  {name:'Get-Certificate',cat:'sicherheit',typ:'ps',short:'Zertifikate anfordern und installieren per PowerShell.',syntax:'Get-Certificate -Template [Name] -CertStoreLocation cert:\\ -Url [CA-URL]',examples:['Get-ChildItem Cert:\\ | Get-Member','Get-ChildItem Cert:\\LocalMachine\\My | Where NotAfter -lt (Get-Date).AddDays(30)','Get-ChildItem Cert:\\LocalMachine\\Root | Select Subject,NotAfter | Sort NotAfter'],tip:'Cert:\\ ist der Certificate-Provider in PowerShell. NotAfter < 30 Tage = Zertifikat laeuft bald ab!'},
  {name:'New-SelfSignedCertificate',cat:'sicherheit',typ:'ps',short:'Selbstsigniertes Zertifikat erstellen.',syntax:'New-SelfSignedCertificate -DnsName [Name] -CertStoreLocation [Store] -NotAfter [Datum]',examples:["New-SelfSignedCertificate -DnsName 'server.firma.local' -CertStoreLocation 'Cert:\\LocalMachine\\My' -NotAfter (Get-Date).AddYears(2)","New-SelfSignedCertificate -DnsName 'localhost' -CertStoreLocation 'Cert:\\CurrentUser\\My'"],tip:'Fuer Test-Umgebungen und internen Einsatz. Fuer Produktion: echtes CA-Zertifikat verwenden.'},
  {name:'Export-Certificate',cat:'sicherheit',typ:'ps',short:'Zertifikat aus Store exportieren.',syntax:'Get-ChildItem Cert:\\... | Export-Certificate -FilePath [Pfad] -Type [CERT|P7B|SST]',examples:["Get-ChildItem Cert:\\LocalMachine\\My | Where Subject -like '*server*' | Export-Certificate -FilePath C:\\cert.cer -Type CERT","Get-ChildItem Cert:\\LocalMachine\\Root | Export-Certificate -FilePath C:\\roots.p7b -Type P7B"],tip:'CERT = .cer Einzelzertifikat. P7B = Kette. PFX mit Export-PfxCertificate (enthaelt privaten Schluessel).'},
  {name:'Export-PfxCertificate',cat:'sicherheit',typ:'ps',short:'Zertifikat MIT privatem Schluessel als PFX exportieren.',syntax:'Get-ChildItem Cert:\\... | Export-PfxCertificate -FilePath [Pfad.pfx] -Password [SecureString]',examples:["$pw = ConvertTo-SecureString 'PfxP@ss!' -AsPlainText -Force","Get-ChildItem Cert:\\LocalMachine\\My | Where Subject -like '*server*' | Export-PfxCertificate -FilePath C:\\server.pfx -Password $pw"],tip:'PFX enthaelt privaten Schluessel — sicher aufbewahren! Passwortschutz immer setzen.'},
  // AppLocker & Windows Defender
  {name:'Get-AppLockerPolicy',cat:'sicherheit',typ:'ps',short:'AppLocker-Richtlinien anzeigen.',syntax:'Get-AppLockerPolicy -Effective [-Xml]  |  -Local  |  -Domain',examples:['Get-AppLockerPolicy -Effective','Get-AppLockerPolicy -Effective -Xml','Get-AppLockerPolicy -Local | Format-List'],tip:'Effective = tatsaechlich angewendete Policy (GPO + lokal). -Xml gibt XML-Format fuer Export/Import.'},
  {name:'Set-AppLockerPolicy',cat:'sicherheit',typ:'ps',short:'AppLocker-Richtlinie aus XML-Datei anwenden.',syntax:'Set-AppLockerPolicy -XmlPolicy [Datei.xml] [-Merge|-RuleType Exe,Script]',examples:['Set-AppLockerPolicy -XmlPolicy C:\\applocker.xml','Set-AppLockerPolicy -XmlPolicy C:\\applocker.xml -Merge'],tip:'-Merge fuegt Regeln hinzu statt zu ersetzen. Vorher testen mit Get-AppLockerPolicy -Effective.'},
  {name:'Test-AppLockerPolicy',cat:'sicherheit',typ:'ps',short:'Testen ob eine Datei durch AppLocker erlaubt/geblockt wird.',syntax:'Test-AppLockerPolicy -Path [Datei] -User [Benutzer]',examples:["Test-AppLockerPolicy -Path C:\\Tools\\tool.exe -User 'firma\\Max'",'Get-AppLockerPolicy -Effective | Test-AppLockerPolicy -Path C:\\Windows\\System32\\cmd.exe'],tip:'Allowed/Denied ausgabe zeigt ob Programm ausfuehrbar waere. Ideal zum Testen vor Deployment.'},
  {name:'Get-MpPreference',cat:'sicherheit',typ:'ps',short:'Windows Defender Konfiguration anzeigen.',syntax:'Get-MpPreference',examples:['Get-MpPreference | Select ExclusionPath,ExclusionExtension,DisableRealtimeMonitoring','Get-MpPreference | Select Signature*','(Get-MpPreference).ExclusionPath'],tip:'Zeigt alle Ausnahmen, Scan-Einstellungen und Signatur-Konfiguration. Set-MpPreference zum Aendern.'},
  {name:'Set-MpPreference',cat:'sicherheit',typ:'ps',short:'Windows Defender konfigurieren (Ausnahmen, Scans).',syntax:'Set-MpPreference [-ExclusionPath Pfad] [-DisableRealtimeMonitoring $false] [-ScanScheduleDay N]',examples:["Set-MpPreference -ExclusionPath 'C:\\DevTools'",'Set-MpPreference -DisableRealtimeMonitoring $false','Set-MpPreference -ScanScheduleDay 1 -ScanScheduleTime 02:00:00'],tip:'ScanScheduleDay: 0=Taeglich, 1=Sonntag...7=Samstag. Ausnahmen nur bei vertrauenswuerdigen Pfaden!'},
  {name:'Start-MpScan',cat:'sicherheit',typ:'ps',short:'Windows Defender Scan starten.',syntax:'Start-MpScan [-ScanType QuickScan|FullScan|CustomScan] [-ScanPath Pfad]',examples:['Start-MpScan -ScanType QuickScan','Start-MpScan -ScanType FullScan','Start-MpScan -ScanType CustomScan -ScanPath C:\\Downloads'],tip:'QuickScan prueft haeufig infizierte Bereiche. FullScan dauert sehr lange aber ist gruendlich.'},
  {name:'Update-MpSignature',cat:'sicherheit',typ:'ps',short:'Windows Defender Signaturen aktualisieren.',syntax:'Update-MpSignature [-UpdateSource MicrosoftUpdateServer|InternalDefinitionUpdateServer]',examples:['Update-MpSignature','Update-MpSignature -UpdateSource MicrosoftUpdateServer'],tip:'Aktualisiert Virus-Signaturen sofort. Ohne Parameter: Standard-Update-Quelle verwenden.'},
  // SecureBoot & TPM
  {name:'Confirm-SecureBootUEFI',cat:'sicherheit',typ:'ps',short:'Prueft ob Secure Boot aktiviert ist.',syntax:'Confirm-SecureBootUEFI',examples:['Confirm-SecureBootUEFI','try { Confirm-SecureBootUEFI } catch { "Secure Boot nicht unterstuetzt" }'],tip:'True = aktiviert. False = deaktiviert. Exception = kein UEFI (Legacy BIOS). Voraussetzung fuer Windows 11.'},
  {name:'Get-Tpm',cat:'sicherheit',typ:'ps',short:'TPM-Chip Status und Version anzeigen.',syntax:'Get-Tpm',examples:['Get-Tpm','Get-Tpm | Select TpmPresent,TpmReady,TpmEnabled,ManufacturerVersion'],tip:'TpmReady $true = TPM bereit fuer BitLocker. Version 2.0 fuer Windows 11 benoetigt. Initialize-Tpm zum Aktivieren.'},
  {name:'Initialize-Tpm',cat:'sicherheit',typ:'ps',short:'TPM-Chip initialisieren und fuer Windows vorbereiten.',syntax:'Initialize-Tpm [-AllowClear] [-AllowPhysicalPresence]',examples:['Initialize-Tpm','Initialize-Tpm -AllowClear'],tip:'-AllowClear erlaubt TPM-Loeschung wenn noetig. Benoetigt physischen Zugriff oder UEFI-Einstellung.'},
  {name:'Get-SecureBootPolicy',cat:'sicherheit',typ:'ps',short:'Secure Boot Richtlinie und Datenbank abrufen.',syntax:'Get-SecureBootPolicy  |  Get-SecureBootUEFI -Name [db|dbx|KEK|PK]',examples:['Get-SecureBootPolicy','Get-SecureBootUEFI -Name db'],tip:'db = erlaubte Signaturen. dbx = gesperrte Signaturen. KEK/PK = Schluesselverwaltung.'},
  {name:'Set-ExecutionPolicy AllSigned',cat:'sicherheit',typ:'ps',short:'PowerShell-Ausfuehrungsrichtlinie haerten.',syntax:'Set-ExecutionPolicy [AllSigned|RemoteSigned|Restricted|Bypass] [-Scope]',examples:['Set-ExecutionPolicy AllSigned -Scope LocalMachine','Set-ExecutionPolicy RemoteSigned -Scope CurrentUser','Get-ExecutionPolicy -List'],tip:'AllSigned = nur signierte Skripte. RemoteSigned = lokale Skripte OK, Remote-Skripte muessen signiert sein. Restricted = keine Skripte.'},
  {name:'Get-MpThreatDetection',cat:'sicherheit',typ:'ps',short:'Erkannte Bedrohungen und Malware-Funde anzeigen.',syntax:'Get-MpThreatDetection',examples:['Get-MpThreatDetection | Select ThreatName,ActionSuccess,DetectionSourceTypeID','Get-MpThreat | Select ThreatName,SeverityID,CategoryID'],tip:'ThreatName zeigt Malware-Namen. ActionSuccess $false = Bedrohung nicht behoben. Remove-MpThreat zum Entfernen.'},

  // ═══ AZURE / CLOUD ═══
  {name:'Connect-AzAccount',cat:'azure',typ:'ps',short:'Mit Azure-Konto verbinden (Az PowerShell Modul).',syntax:'Connect-AzAccount [-TenantId ID] [-Subscription Name] [-DeviceCode]',examples:['Connect-AzAccount','Connect-AzAccount -TenantId "12345678-1234-..."','Connect-AzAccount -DeviceCode','Connect-AzAccount -Identity'],tip:'-DeviceCode fuer nicht-interaktive Anmeldung. -Identity fuer Managed Identity in Azure VMs. Install-Module Az zuerst.'},
  {name:'Get-AzSubscription',cat:'azure',typ:'ps',short:'Verfuegbare Azure-Abonnements anzeigen.',syntax:'Get-AzSubscription  |  Set-AzContext -Subscription [Name|ID]',examples:['Get-AzSubscription','Get-AzSubscription | Select Name,Id,State','Set-AzContext -Subscription "Mein Abo"','Set-AzContext -SubscriptionId "12345678-..."'],tip:'Set-AzContext wechselt zwischen Abonnements. Get-AzContext zeigt aktuelles Abonnement.'},
  {name:'Get-AzResourceGroup',cat:'azure',typ:'ps',short:'Azure-Ressourcengruppen anzeigen.',syntax:'Get-AzResourceGroup [-Name Name] [-Location Ort]',examples:['Get-AzResourceGroup','Get-AzResourceGroup -Name "RG-Produktion"','Get-AzResourceGroup | Select ResourceGroupName,Location,ProvisioningState'],tip:'Ressourcengruppen = logische Container fuer Azure-Ressourcen. New-AzResourceGroup zum Erstellen.'},
  {name:'New-AzResourceGroup',cat:'azure',typ:'ps',short:'Neue Azure-Ressourcengruppe erstellen.',syntax:'New-AzResourceGroup -Name [Name] -Location [Region]',examples:["New-AzResourceGroup -Name 'RG-Test' -Location 'germanywestcentral'",'New-AzResourceGroup -Name "RG-Prod" -Location "westeurope"','Get-AzLocation | Select Location,DisplayName | Sort DisplayName'],tip:'Get-AzLocation zeigt alle verfuegbaren Regionen. Germany West Central = Frankfurt am Main.'},
  {name:'Get-AzVM',cat:'azure',typ:'ps',short:'Azure-VMs anzeigen und verwalten.',syntax:'Get-AzVM [-Name Name] [-ResourceGroupName RG] [-Status]',examples:['Get-AzVM','Get-AzVM -Status | Select Name,@{n="Status";e={$_.Statuses[1].DisplayStatus}}','Get-AzVM -Name "WebServer01" -Status'],tip:'-Status zeigt PowerState (running/deallocated). Start-AzVM/Stop-AzVM zum Starten/Stoppen.'},
  {name:'Start-AzVM / Stop-AzVM',cat:'azure',typ:'ps',short:'Azure-VM starten oder stoppen.',syntax:'Start-AzVM -Name [Name] -ResourceGroupName [RG]  |  Stop-AzVM ... [-Force]',examples:['Start-AzVM -Name "WebServer01" -ResourceGroupName "RG-Prod"','Stop-AzVM -Name "WebServer01" -ResourceGroupName "RG-Prod" -Force','Restart-AzVM -Name "WebServer01" -ResourceGroupName "RG-Prod"'],tip:'-Force bei Stop-AzVM ohne Bestaetigung. Deallocated = kein Berechnen von VM-Kosten. Stopped = noch kostenpflichtig!'},
  {name:'Get-AzStorageAccount',cat:'azure',typ:'ps',short:'Azure Storage Accounts anzeigen.',syntax:'Get-AzStorageAccount [-ResourceGroupName RG] [-Name Name]',examples:['Get-AzStorageAccount','Get-AzStorageAccount | Select StorageAccountName,Kind,Location','Get-AzStorageAccountKey -Name "meinstorage" -ResourceGroupName "RG-Prod"'],tip:'Get-AzStorageAccountKey gibt Zugriffsschlussel zurueck. New-AzStorageAccount zum Erstellen.'},
  {name:'Get-AzNetworkInterface',cat:'azure',typ:'ps',short:'Azure-Netzwerkadapter und IP-Konfigurationen anzeigen.',syntax:'Get-AzNetworkInterface [-Name Name] [-ResourceGroupName RG]',examples:['Get-AzNetworkInterface | Select Name,Location,@{n="IP";e={$_.IpConfigurations[0].PrivateIpAddress}}','Get-AzPublicIpAddress | Select Name,IpAddress'],tip:'IpConfigurations[0].PrivateIpAddress = interne IP. Get-AzPublicIpAddress zeigt oeffentliche IPs.'},
  {name:'New-AzVirtualNetwork',cat:'azure',typ:'ps',short:'Neues Azure Virtual Network (VNet) erstellen.',syntax:'New-AzVirtualNetwork -Name [Name] -ResourceGroupName [RG] -Location [Ort] -AddressPrefix [CIDR]',examples:["New-AzVirtualNetwork -Name 'VNet-Prod' -ResourceGroupName 'RG-Prod' -Location 'westeurope' -AddressPrefix '10.0.0.0/16'",'Add-AzVirtualNetworkSubnetConfig -Name "Subnet-Web" -VirtualNetwork $vnet -AddressPrefix "10.0.1.0/24"'],tip:'AddressPrefix = IP-Bereich des gesamten VNets. Subnetze danach mit Add-AzVirtualNetworkSubnetConfig.'},
  {name:'Get-AzKeyVault',cat:'azure',typ:'ps',short:'Azure Key Vault Instanzen anzeigen.',syntax:'Get-AzKeyVault [-VaultName Name] [-ResourceGroupName RG]',examples:['Get-AzKeyVault','Get-AzKeyVaultSecret -VaultName "MeinVault"','Get-AzKeyVaultSecret -VaultName "MeinVault" -Name "DbPassword" -AsPlainText'],tip:'Key Vault = sicherer Speicher fuer Secrets, Zertifikate, Schluesse. -AsPlainText gibt Secret im Klartext.'},
  {name:'Get-AzWebApp',cat:'azure',typ:'ps',short:'Azure App Service Web Apps anzeigen.',syntax:'Get-AzWebApp [-ResourceGroupName RG] [-Name Name]',examples:['Get-AzWebApp','Get-AzWebApp | Select Name,State,DefaultHostName','Restart-AzWebApp -ResourceGroupName "RG-Prod" -Name "MeineApp"'],tip:'State: Running/Stopped. DefaultHostName = .azurewebsites.net URL. Start/Stop/Restart-AzWebApp verfuegbar.'},
  {name:'Get-AzSqlServer',cat:'azure',typ:'ps',short:'Azure SQL Server Instanzen anzeigen.',syntax:'Get-AzSqlServer [-ResourceGroupName RG]',examples:['Get-AzSqlServer','Get-AzSqlDatabase -ResourceGroupName "RG-Prod" -ServerName "sqlserver01"','Get-AzSqlServer | Select ServerName,Location,SqlAdministratorLogin'],tip:'Get-AzSqlDatabase listet alle Datenbanken eines Servers. New-AzSqlDatabase zum Erstellen.'},
  // Azure AD / Entra ID
  {name:'Connect-AzureAD',cat:'azure',typ:'ps',short:'Mit Azure Active Directory (Entra ID) verbinden.',syntax:'Connect-AzureAD [-TenantId ID]  |  Connect-MgGraph -Scopes [Berechtigungen]',examples:['Connect-AzureAD','Connect-MgGraph -Scopes "User.Read.All","Group.ReadWrite.All"','Connect-AzureAD -TenantId "12345678-..."'],tip:'AzureAD-Modul veraltet → Microsoft.Graph (Connect-MgGraph) bevorzugen. Install-Module Microsoft.Graph'},
  {name:'Get-AzureADUser',cat:'azure',typ:'ps',short:'Azure AD / Entra ID Benutzer abfragen.',syntax:'Get-AzureADUser [-ObjectId ID] [-Filter "displayName eq Name"]  |  Get-MgUser',examples:['Get-AzureADUser -All $true | Select DisplayName,UserPrincipalName,AccountEnabled','Get-MgUser -All | Select DisplayName,UserPrincipalName','Get-MgUser -Filter "startsWith(displayName,\'Max\')" | Select DisplayName,Id'],tip:'Get-MgUser = moderner Ersatz. -Filter nutzt OData-Syntax. -All $true fuer alle Benutzer (>100).'},
  {name:'New-AzureADUser',cat:'azure',typ:'ps',short:'Neuen Azure AD Benutzer erstellen.',syntax:'New-MgUser -DisplayName [Name] -UserPrincipalName [UPN] -MailNickname [Nick] -AccountEnabled $true',examples:['$pw = New-Object Microsoft.Graph.PowerShell.Models.MicrosoftGraphPasswordProfile','$pw.Password = "TempP@ss1!"','New-MgUser -DisplayName "Max Mustermann" -UserPrincipalName "m.mustermann@firma.onmicrosoft.com" -MailNickname "mmustermann" -AccountPassword $pw -AccountEnabled $true'],tip:'UPN = Anmeldename@Domain. MailNickname = Teil vor @. ForceChangePasswordNextSignIn fuer Erstanmeldung.'},
  {name:'Get-AzureADGroup',cat:'azure',typ:'ps',short:'Azure AD Gruppen abfragen.',syntax:'Get-MgGroup [-Filter "displayName eq Name"] [-All]',examples:['Get-MgGroup -All | Select DisplayName,Id,GroupTypes','Get-MgGroup -Filter "startsWith(displayName,\'IT\')" | Select DisplayName','Get-MgGroupMember -GroupId [GroupId] | Select Id'],tip:'GroupTypes: Unified = Microsoft 365 Gruppe. Security = Sicherheitsgruppe. Add-MgGroupMember zum Hinzufuegen.'},
  {name:'Get-MgUserMemberOf',cat:'azure',typ:'ps',short:'Azure AD Gruppenmitgliedschaften eines Benutzers anzeigen.',syntax:'Get-MgUserMemberOf -UserId [UPN|ID]',examples:["Get-MgUserMemberOf -UserId 'm.mustermann@firma.de' | Select DisplayName",'(Get-MgUserMemberOf -UserId $userId).AdditionalProperties.displayName'],tip:'Zeigt alle Gruppen und Rollen des Benutzers. Transitive Mitgliedschaften: Get-MgUserTransitiveMemberOf.'},
  {name:'Get-MgDomain',cat:'azure',typ:'ps',short:'Azure AD Domaenen des Tenants anzeigen.',syntax:'Get-MgDomain',examples:['Get-MgDomain | Select Id,IsDefault,IsVerified','Get-MgDomain | Where IsDefault -eq $true'],tip:'IsDefault = primaere Domaene. IsVerified = verifizierte Custom-Domaene. onmicrosoft.com ist immer vorhanden.'},
  {name:'Get-MgSubscribedSku',cat:'azure',typ:'ps',short:'Azure AD Lizenzen und Kontingente anzeigen.',syntax:'Get-MgSubscribedSku',examples:['Get-MgSubscribedSku | Select SkuPartNumber,@{n="Verfuegbar";e={$_.PrepaidUnits.Enabled - $_.ConsumedUnits}}','Get-MgSubscribedSku | Select SkuPartNumber,ConsumedUnits,@{n="Gesamt";e={$_.PrepaidUnits.Enabled}}'],tip:'Zeigt M365/Azure AD Lizenzen. ConsumedUnits = genutzt. PrepaidUnits.Enabled = gekauft.'},
  {name:'az login',cat:'azure',typ:'cmd',short:'Azure CLI anmelden (azure-cli).',syntax:'az login [--tenant ID] [--use-device-code] [--service-principal]',examples:['az login','az login --use-device-code','az login --service-principal -u [AppID] -p [Secret] --tenant [TenantID]','az account list --output table'],tip:'Azure CLI (az) = Alternative zu Az PowerShell. az account set --subscription [Name] wechselt Abonnement.'},
  {name:'az vm list',cat:'azure',typ:'cmd',short:'Azure VMs per CLI auflisten.',syntax:'az vm list [--resource-group RG] [--show-details] [-o table]',examples:['az vm list -o table','az vm list --resource-group RG-Prod --show-details -o table','az vm start --name WebServer01 --resource-group RG-Prod','az vm stop --name WebServer01 --resource-group RG-Prod'],tip:'-o table fuer lesbare Ausgabe. -o json fuer Skripte. az vm show --name [Name] fuer Details.'},
  {name:'az ad user list',cat:'azure',typ:'cmd',short:'Azure AD Benutzer per CLI abfragen.',syntax:'az ad user list [--filter "displayName eq Name"] [-o table]',examples:['az ad user list -o table','az ad user list --filter "startswith(displayName,\'Max\')" -o table','az ad user show --id m.mustermann@firma.de'],tip:'--filter nutzt OData. az ad group list fuer Gruppen. az ad app list fuer App-Registrierungen.'},
  {name:'az group list',cat:'azure',typ:'cmd',short:'Azure Ressourcengruppen per CLI anzeigen.',syntax:'az group list [-o table] [--query "[].{Name:name}"]',examples:['az group list -o table','az group list --query "[].name" -o tsv','az group create --name "RG-Test" --location "germanywestcentral"'],tip:'--query mit JMESPath-Syntax fuer Filterung. az group delete --name RG-Test --yes --no-wait loescht.'},

  // ═══ VIRTUALISIERUNG ═══
  // Hyper-V
  {name:'Get-VM',cat:'virt',typ:'ps',short:'Alle Hyper-V VMs anzeigen.',syntax:'Get-VM [-Name Name] [-ComputerName Host]',examples:['Get-VM','Get-VM | Select Name,State,MemoryAssigned,CPUUsage','Get-VM | Where State -eq Running','Get-VM -ComputerName HV01'],tip:'State: Running/Off/Paused/Saved. MemoryAssigned in Bytes. Get-VM * zeigt auch AUs. Remote: -ComputerName.'},
  {name:'Start-VM / Stop-VM',cat:'virt',typ:'ps',short:'Hyper-V VM starten oder stoppen.',syntax:'Start-VM -Name [Name]  |  Stop-VM -Name [Name] [-Force|-TurnOff|-Save]',examples:['Start-VM -Name "WebServer01"','Stop-VM -Name "WebServer01" -Force','Stop-VM -Name "WebServer01" -TurnOff','Save-VM -Name "WebServer01"'],tip:'-TurnOff = sofortiges Ausschalten (kein Graceful). -Save = Ruhezustand. -Force = Herunterfahren erzwingen.'},
  {name:'New-VM',cat:'virt',typ:'ps',short:'Neue Hyper-V VM erstellen.',syntax:'New-VM -Name [Name] -MemoryStartupBytes [RAM] -VHDPath [Pfad] -Generation [1|2]',examples:['New-VM -Name "TestVM" -MemoryStartupBytes 2GB -Generation 2 -NewVHDPath "C:\\VMs\\TestVM.vhdx" -NewVHDSizeBytes 50GB','New-VM -Name "WinServer" -MemoryStartupBytes 4GB -Generation 2 -SwitchName "External"'],tip:'Generation 2 = UEFI + Secure Boot (empfohlen). Generation 1 = BIOS (Legacy). -SwitchName fuer Netzwerk.'},

        <ol class="steps">

          <li class="step"><span class="step-num">3</span><div class="step-content"><div class="step-title">Skript ausfuehren</div><div class="step-code">.\meinskript.ps1

powershell -ExecutionPolicy Bypass -File skript.ps1</div></div></li>
        </ol>
        <div class="guide-section-head">&#128295; Grundlegende Syntax</div>
        <ol class="steps">
          <li class="step"><span class="step-num">4</span><div class="step-content"><div class="step-title">Variablen und Typen</div><div class="step-code"># Variablen beginnen mit $

$liste = @("A", "B", "C")
$hashtable = @{ Name = "Max"; Alter = 30 }
[int]$getyppt = 100    # Typ erzwingen
$bool = $true          # oder $false</div></div></li>
          <li class="step"><span class="step-num">5</span><div class="step-content"><div class="step-title">Ausgabe und String-Interpolation</div><div class="step-code">Write-Host "Hallo $name"
Write-Host "Zahl: $zahl" -ForegroundColor Green
Write-Output "Weiter in Pipeline: $name"
# Mehrzeilig:
$text = @"
Name: $name
Zahl: $zahl
"@
Write-Host $text</div></div></li>
          <li class="step"><span class="step-num">6</span><div class="step-content"><div class="step-title">Kommentare und Hilfe-Header</div><div class="step-code"># Einzeiliger Kommentar
<#
  Mehrzeiliger Kommentar
  Autor: Max Mustermann
#>

# Script-Header (Get-Help nutzbar):
<#
.SYNOPSIS
  Kurzbeschreibung
.DESCRIPTION
  Ausfuehrliche Beschreibung
.PARAMETER Name
  Erklaerung des Parameters
.EXAMPLE

#></div></div></li>

      {label:'Kontrollstrukturen',content:`
