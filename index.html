<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windows CMD & PowerShell — Befehlsreferenz</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --bg2: #111318;
    --bg3: #181c24;
    --bg4: #1e2330;
    --border: #252c3d;
    --border2: #2e3850;
    --text: #e2e8f0;
    --text2: #8892a4;
    --text3: #525f75;
    --blue: #3b82f6;
    --blue-dim: #1d3461;
    --blue-bright: #60a5fa;
    --green: #22c55e;
    --green-dim: #14532d;
    --purple: #a78bfa;
    --purple-dim: #2e1065;
    --amber: #f59e0b;
    --sidebar-w: 240px;
    --topbar-h: 54px;
    --bottom-nav-h: 60px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    display: flex;
    min-height: 100vh;
    font-size: 13px;
    overflow-x: hidden;
  }

  /* ── SIDEBAR OVERLAY (mobile) ── */
  #sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 90;
    backdrop-filter: blur(2px);
  }
  #sidebar-overlay.visible { display: block; }

  /* ── SIDEBAR ── */
  #sidebar {
    width: var(--sidebar-w);
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    overflow-y: auto;
    z-index: 100;
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  }

  .sidebar-logo {
    padding: 20px 18px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sidebar-logo .logo-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800; color: var(--blue-bright); letter-spacing: -0.02em; }
  .sidebar-logo .logo-sub { font-size: 10px; color: var(--text3); margin-top: 2px; letter-spacing: 0.08em; text-transform: uppercase; }

  /* Close button inside sidebar (mobile) */
  #sidebar-close {
    display: none;
    background: none;
    border: none;
    color: var(--text3);
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
  }

  .sidebar-search { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .sidebar-search input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 7px 10px 7px 30px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .sidebar-search input:focus { border-color: var(--blue); }
  .sidebar-search input::placeholder { color: var(--text3); }
  .search-icon { position: absolute; left: 24px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 13px; pointer-events: none; }
  .search-wrap { position: relative; }
  .sidebar-section { padding: 10px 14px 4px; font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text3); font-weight: 600; }
  .sidebar-item {
    display: flex; align-items: center; gap: 9px;
    padding: 10px 14px;
    cursor: pointer;
    transition: background 0.15s;
    color: var(--text2);
    font-size: 12px;
    border-left: 2px solid transparent;
    user-select: none;
  }
  .sidebar-item:hover { background: var(--bg3); color: var(--text); }
  .sidebar-item.active { background: var(--bg3); color: var(--blue-bright); border-left-color: var(--blue); }
  .sidebar-item .cat-icon { font-size: 14px; width: 18px; text-align: center; }
  .sidebar-item .cat-count { margin-left: auto; font-size: 10px; color: var(--text3); background: var(--bg4); padding: 1px 6px; border-radius: 10px; }
  .sidebar-footer { margin-top: auto; padding: 14px; border-top: 1px solid var(--border); font-size: 10px; color: var(--text3); text-align: center; }

  /* ── MAIN ── */
  #main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

  /* ── TOPBAR ── */
  #topbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: var(--topbar-h);
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  /* Hamburger (hidden on desktop) */
  #menu-btn {
    display: none;
    background: none;
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text2);
    font-size: 18px;
    cursor: pointer;
    padding: 5px 8px;
    line-height: 1;
    flex-shrink: 0;
  }

  .topbar-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .topbar-title span { color: var(--blue-bright); }
  .topbar-badges { display: flex; gap: 6px; margin-left: auto; align-items: center; flex-shrink: 0; }
  .stat-pill { font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border2); color: var(--text2); background: var(--bg3); }
  .stat-pill b { color: var(--text); }

  /* ── CONTENT ── */
  #content { padding: 20px 24px; flex: 1; }

  .cat-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .cat-header-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .cat-header-text h2 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); }
  .cat-header-text p { font-size: 11px; color: var(--text2); margin-top: 2px; }

  /* ── COMMAND GRID ── */
  .cmd-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px; }

  .cmd-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .cmd-card:hover { border-color: var(--border2); transform: translateY(-1px); }
  .cmd-card:active { transform: scale(0.99); }
  .cmd-card.open { border-color: var(--blue); }

  .cmd-head { padding: 13px 14px; display: flex; align-items: flex-start; gap: 10px; }
  .cmd-name-wrap { flex: 1; min-width: 0; max-width: 100%; }
  .cmd-name { font-size: 14px; font-weight: 700; color: var(--blue-bright); letter-spacing: -0.01em; white-space: normal; word-break: break-word; }
  .cmd-short { font-size: 11px; color: var(--text2); margin-top: 4px; line-height: 1.55; white-space: normal; word-break: break-word; }

  .badge { font-size: 9px; font-weight: 700; padding: 3px 7px; border-radius: 4px; letter-spacing: 0.04em; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
  .badge-cmd  { background: var(--blue-dim);   color: var(--blue-bright); border: 1px solid #1e3a6e; }
  .badge-ps   { background: var(--purple-dim); color: var(--purple);      border: 1px solid #4c1d95; }
  .badge-both { background: var(--green-dim);  color: var(--green);       border: 1px solid #166534; }
  .badge-ad   { background: #0c2a3d;           color: #38bdf8;            border: 1px solid #0e3a52; }
  .badge-dns  { background: #052e16;           color: #4ade80;            border: 1px solid #14532d; }
  .badge-run  { background: #2d0a3d;           color: #e879f9;            border: 1px solid #6b21a8; }

  /* Win-Version Badges — eigene Zeile unter dem Befehlsnamen */
  .run-wins {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    margin-top: 4px;
  }
  .run-win {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .run-w7  { background: #1a2a1a; color: #86efac; border: 1px solid #166534; }
  .run-w8  { background: #1a1a2e; color: #93c5fd; border: 1px solid #1e3a8a; }
  .run-w10 { background: #1a1a1a; color: #d1d5db; border: 1px solid #374151; }
  .run-w11 { background: #2a1a2e; color: #c4b5fd; border: 1px solid #5b21b6; }

  .cmd-arrow { color: var(--text3); font-size: 11px; transition: transform 0.25s; margin-top: 3px; flex-shrink: 0; }
  .cmd-card.open .cmd-arrow { transform: rotate(180deg); color: var(--blue); }

  .cmd-detail { display: none; border-top: 1px solid var(--border); padding: 14px; background: var(--bg3); border-radius: 0 0 10px 10px; }
  .cmd-card.open .cmd-detail { display: block; }

  .detail-row { margin-bottom: 12px; }
  .detail-row:last-child { margin-bottom: 0; }
  .detail-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); font-weight: 600; margin-bottom: 5px; }

  /* ── UNIVERSELLE CODE/TEXT BOXEN — gleiche Regeln ueberall ── */
  .code-box {
    display: block;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #c9d1d9;
    white-space: pre;
    overflow-x: scroll;
    overflow-y: visible;
    -webkit-overflow-scrolling: touch;
    line-height: 1.5;
    max-width: 100%;
    box-sizing: border-box;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
  }
  .code-box::-webkit-scrollbar { height: 4px; }
  .code-box::-webkit-scrollbar-track { background: transparent; }
  .code-box::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  .example-line {
    display: block;
    background: var(--bg);
    border: 1px solid var(--border);
    border-left: 2px solid var(--green);
    border-radius: 6px;
    padding: 6px 10px 6px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #7ee787;
    white-space: pre;
    overflow-x: scroll;
    overflow-y: visible;
    -webkit-overflow-scrolling: touch;
    margin-bottom: 4px;
    max-width: 100%;
    box-sizing: border-box;
    scrollbar-width: thin;
    scrollbar-color: #166534 transparent;
  }
  .example-line:last-child { margin-bottom: 0; }
  .example-line::-webkit-scrollbar { height: 4px; }
  .example-line::-webkit-scrollbar-track { background: transparent; }
  .example-line::-webkit-scrollbar-thumb { background: #166534; border-radius: 4px; }

  .tip-box {
    background: #1a1500;
    border: 1px solid #3d2e00;
    border-left: 2px solid var(--amber);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 11px;
    color: #d4a017;
    line-height: 1.6;
    white-space: normal;
    word-break: break-word;
  }

  .section-block { margin-bottom: 32px; }
  .section-title { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; padding: 10px 14px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; border-left: 3px solid var(--blue); }
  .section-title-icon { font-size: 18px; flex-shrink: 0; }
  .section-title-name { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: var(--text); }
  .section-title-desc { font-size: 11px; color: var(--text2); margin-top: 1px; }
  .section-title-count { margin-left: auto; font-size: 10px; color: var(--text3); background: var(--bg4); padding: 3px 10px; border-radius: 20px; white-space: nowrap; }

  .empty { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty .e-icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 13px; }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }
  mark { background: #2d1b00; color: var(--amber); border-radius: 2px; padding: 0 2px; }

  /* ── COPY BUTTON ── */
  .copy-btn {
    position: absolute;
    top: 4px; right: 4px;
    background: var(--bg4);
    border: 1px solid var(--border2);
    border-radius: 4px;
    color: var(--text3);
    font-size: 13px;
    padding: 2px 6px;
    cursor: pointer;
    line-height: 1.4;
    transition: background 0.15s, color 0.15s;
    z-index: 2;
  }
  .copy-btn:hover { background: var(--border2); color: var(--text); }

  /* ── CUSTOM CARDS ── */
  .custom-card { border-color: #facc1544 !important; }
  .custom-card.open { border-color: #facc15 !important; }
  .custom-badge {
    display: inline-block;
    font-size: 9px; font-weight: 700;
    background: #422006; color: #facc15;
    border: 1px solid #92400e;
    border-radius: 4px; padding: 1px 6px;
    margin-left: 6px; vertical-align: middle;
  }
  .icon-btn {
    background: none; border: none;
    cursor: pointer; padding: 3px 5px;
    border-radius: 4px; line-height: 1;
    transition: background 0.15s;
  }
  .del-btn { color: #f87171; font-size: 12px; }
  .del-btn:hover { background: #450a0a; }

  /* ── FAB (Floating Action Button) ── */
  #fab {
    position: fixed;
    bottom: calc(var(--bottom-nav-h) + 16px);
    right: 16px;
    width: 48px; height: 48px;
    background: #facc15;
    color: #000;
    border: none;
    border-radius: 50%;
    font-size: 24px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 20px #facc1544;
    z-index: 60;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  #fab:hover { transform: scale(1.1); box-shadow: 0 6px 28px #facc1566; }
  #fab:active { transform: scale(0.95); }
  @media (min-width: 768px) {
    #fab { bottom: 24px; right: 24px; }
  }

  /* ── MODAL ── */
  #addModal {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center; justify-content: center;
    padding: 16px;
  }
  .modal-box {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 24px 22px;
    width: 100%; max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-title {
    font-family: 'Syne', sans-serif;
    font-size: 16px; font-weight: 700;
    color: #facc15;
    margin-bottom: 18px;
    display: flex; align-items: center; gap: 8px;
  }
  .modal-row { margin-bottom: 14px; }
  .modal-label {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--text3);
    font-weight: 600; margin-bottom: 5px;
    display: block;
  }
  .modal-input, .modal-select, .modal-textarea {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 7px;
    padding: 9px 11px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
    box-sizing: border-box;
  }
  .modal-input:focus, .modal-select:focus, .modal-textarea:focus { border-color: #facc15; }
  .modal-textarea { resize: vertical; min-height: 70px; line-height: 1.5; }
  .modal-select { cursor: pointer; }
  .modal-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .modal-err { color: #f87171; font-size: 11px; margin-bottom: 10px; min-height: 16px; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }
  .btn-cancel {
    background: var(--bg3); border: 1px solid var(--border2);
    border-radius: 7px; padding: 8px 16px;
    color: var(--text2); font-family: 'JetBrains Mono', monospace;
    font-size: 12px; cursor: pointer;
  }
  .btn-cancel:hover { background: var(--bg4); }
  .btn-save {
    background: #facc15; border: none;
    border-radius: 7px; padding: 8px 18px;
    color: #000; font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 700; cursor: pointer;
    transition: background 0.15s;
  }
  .btn-save:hover { background: #fde047; }
  .hint-text { font-size: 10px; color: var(--text3); margin-top: 4px; }

  /* ══════════════════════════════════════════
     BOTTOM NAV (mobile only)
  ══════════════════════════════════════════ */
  #bottom-nav {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--bottom-nav-h);
    background: var(--bg2);
    border-top: 1px solid var(--border);
    z-index: 80;
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  #bottom-nav::-webkit-scrollbar { display: none; }
  #bottom-nav-inner {
    display: flex;
    align-items: stretch;
    height: 100%;
    min-width: max-content;
    padding: 0 6px;
    gap: 2px;
  }
  .bnav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    padding: 0 12px;
    cursor: pointer;
    color: var(--text3);
    font-size: 9px;
    letter-spacing: 0.04em;
    border-radius: 8px;
    transition: background 0.15s, color 0.15s;
    min-width: 56px;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .bnav-item:active { background: var(--bg3); }
  .bnav-item.active { color: var(--blue-bright); }
  .bnav-icon { font-size: 18px; line-height: 1; }
  .bnav-label { font-size: 8.5px; white-space: nowrap; }

  /* ══════════════════════════════════════════
     TABLET  (768px – 1024px)
  ══════════════════════════════════════════ */
  @media (max-width: 1024px) {
    :root { --sidebar-w: 200px; }
    #content { padding: 16px 18px; }
    .cmd-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 8px; }
    .topbar-badges .stat-pill:not(:first-child) { display: none; }
    #topbar { padding: 0 16px; }
    .guide-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
  }

  /* ══════════════════════════════════════════
     MOBILE  (≤ 767px) — Slide-in Drawer
  ══════════════════════════════════════════ */
  @media (max-width: 767px) {
    body { font-size: 13px; }

    /* Sidebar becomes off-canvas drawer */
    #sidebar {
      transform: translateX(-100%);
      width: 260px;
      bottom: 0;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    #sidebar.open { transform: translateX(0); }
    #sidebar-close { display: block; }

    /* Main takes full width */
    #main { margin-left: 0; padding-bottom: var(--bottom-nav-h); }

    /* Topbar: hamburger visible, pills hidden */
    #topbar { padding: 0 12px; gap: 8px; }
    #menu-btn { display: flex; align-items: center; }
    .topbar-badges { display: none; }
    .topbar-title { font-size: 13px; }

    /* Bottom nav visible */
    #bottom-nav { display: flex; }

    /* Content */
    #content { padding: 10px; }

    /* Full-width grid on small screens */
    .cmd-grid { grid-template-columns: 1fr; gap: 7px; }

    /* Cards */
    .cmd-head { padding: 11px 12px; }
    .cmd-name { font-size: 13px; }
    .cmd-short { font-size: 11px; }
    /* All code/text boxes — unified mobile size */
    .code-box, .example-line, .tip-box,
    .step-code, .step-path,
    .step-note, .step-warn { font-size: 11px; }
    /* Guide panels */
    .guide-panel { padding: 10px 12px; }
    .guide-tab { padding: 7px 11px; font-size: 9px; }
    .step { gap: 8px; margin-bottom: 12px; }
    .step-num { width: 20px; height: 20px; min-width: 20px; font-size: 10px; }
    .step-title { font-size: 11px; }
    .step-desc { font-size: 10.5px; }

    /* Section header */
    .section-title-desc { display: none; }
    .cat-header-text h2 { font-size: 15px; }

    /* Sidebar */
    .sidebar-search input { font-size: 13px; padding: 8px 10px 8px 30px; }
    .sidebar-item { padding: 10px 14px; font-size: 12px; }
    .sidebar-item .cat-icon { font-size: 15px; width: 20px; }

    /* Guide */
    .guide-grid { grid-template-columns: 1fr; gap: 8px; }
    .guide-title { font-size: 12px; }
    .guide-subtitle { font-size: 10px; }
    .guide-panel { padding: 10px 12px; }
    .guide-tab { padding: 7px 11px; font-size: 9px; }
    .step-code { font-size: 10.5px; padding: 6px 9px; }
    .step-title { font-size: 11px; }
    .step-desc { font-size: 10.5px; }
    .step-note, .step-warn, .step-path { font-size: 10.5px; }
    .step-num { width: 20px; height: 20px; min-width: 20px; font-size: 10px; }
    .step { gap: 8px; margin-bottom: 12px; }
  }

  /* ══════════════════════════════════════════
     VERY SMALL  (≤ 380px)
  ══════════════════════════════════════════ */
  @media (max-width: 380px) {
    :root { --bottom-nav-h: 56px; }
    .cmd-name { font-size: 14px; }
    .bnav-label { display: none; }
    .bnav-item { min-width: 44px; }
  }

  /* ══════════════════════════════════════════
     SAFE AREA (iPhone notch / home bar)
  ══════════════════════════════════════════ */
  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    #bottom-nav {
      padding-bottom: env(safe-area-inset-bottom);
      height: calc(var(--bottom-nav-h) + env(safe-area-inset-bottom));
    }
    @media (max-width: 767px) {
      #main { padding-bottom: calc(var(--bottom-nav-h) + env(safe-area-inset-bottom)); }
    }
  }
  /* ══════════════════════════════════════════
     AD GUIDE STYLES
  ══════════════════════════════════════════ */
  .guide-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
    overflow: visible;
  }
  .guide-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
    -webkit-tap-highlight-color: transparent;
    /* overflow:visible so step-code can scroll horizontally */
    overflow: visible;
  }
  .guide-card:hover { border-color: #fb923c66; transform: translateY(-1px); }
  .guide-card:active { transform: scale(0.99); }
  .guide-card.open { border-color: #fb923c; }

  .guide-head {
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    /* carry the top border-radius visually */
    border-radius: 12px 12px 0 0;
    background: var(--bg2);
  }
  .guide-emoji {
    font-size: 22px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .guide-head-text { flex: 1; min-width: 0; }
  .guide-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: #fb923c;
    letter-spacing: -0.01em;
  }
  .guide-subtitle {
    font-size: 11px;
    color: var(--text2);
    margin-top: 3px;
    line-height: 1.5;
    white-space: normal;
    word-break: break-word;
  }
  .guide-arrow {
    color: var(--text3);
    font-size: 11px;
    transition: transform 0.25s;
    margin-top: 3px;
    flex-shrink: 0;
  }
  .guide-card.open .guide-arrow { transform: rotate(180deg); color: #fb923c; }

  .guide-body {
    display: none;
    border-top: 1px solid var(--border);
    background: var(--bg3);
    padding: 0;
    border-radius: 0 0 12px 12px;
    overflow: visible;
  }
  .guide-card.open .guide-body { display: block; }

  /* Tab switcher inside guide */
  .guide-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .guide-tabs::-webkit-scrollbar { display: none; }
  .guide-tab {
    padding: 9px 14px;
    font-size: 10px;
    font-weight: 700;
    color: var(--text3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }
  .guide-tab:hover { color: var(--text2); }
  .guide-tab.active { color: #fb923c; border-bottom-color: #fb923c; }

  .guide-panel { display: none; padding: 14px 16px; overflow: visible; }
  .guide-panel.active { display: block; }

  .steps { list-style: none; overflow: visible; }
  .step {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
    position: relative;
    overflow: visible;
  }
  .step:last-child { margin-bottom: 0; }
  .step-num {
    width: 24px;
    height: 24px;
    min-width: 24px;
    border-radius: 50%;
    background: #7c2d1244;
    border: 1px solid #fb923c66;
    color: #fb923c;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .step-content {
    flex: 1;
    min-width: 0;
    overflow: visible;
  }
  .step-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.4;
    white-space: normal;
    word-break: break-word;
  }
  .step-desc {
    font-size: 11px;
    color: var(--text2);
    line-height: 1.6;
    margin-bottom: 5px;
    white-space: normal;
    word-break: break-word;
  }

  /* step-code: scrollable wrapper + pre content */
  .step-code-wrap {
    position: relative;
    margin-top: 4px;
    width: 100%;
  }
  .step-code {
    display: block;
    background: var(--bg);
    border: 1px solid var(--border);
    border-left: 2px solid #fb923c;
    border-radius: 5px;
    padding: 7px 36px 7px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #c9d1d9;
    white-space: pre;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin-top: 0;
    width: 100%;
    max-width: 100%;
    box-sizing: border-box;
    scrollbar-width: thin;
    scrollbar-color: #fb923c55 transparent;
  }
  .step-code::-webkit-scrollbar { height: 4px; }
  .step-code::-webkit-scrollbar-track { background: transparent; }
  .step-code::-webkit-scrollbar-thumb { background: #fb923c88; border-radius: 4px; }
  .step-code-wrap .copy-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    z-index: 3;
  }
  .step-note {
    font-size: 10.5px;
    color: #d4a017;
    background: #1a150033;
    border: 1px solid #3d2e0066;
    border-radius: 5px;
    padding: 6px 10px;
    margin-top: 4px;
    line-height: 1.6;
    white-space: normal;
    word-break: break-word;
  }
  .step-warn {
    font-size: 10.5px;
    color: #f87171;
    background: #1a000033;
    border: 1px solid #5a000066;
    border-radius: 5px;
    padding: 6px 10px;
    margin-top: 4px;
    line-height: 1.6;
    white-space: normal;
    word-break: break-word;
  }
  .step-path {
    display: block;
    font-size: 11px;
    color: #7ee787;
    background: var(--bg);
    border: 1px solid var(--border);
    border-left: 2px solid var(--green);
    border-radius: 5px;
    padding: 6px 10px;
    margin-top: 4px;
    white-space: normal;
    word-break: break-word;
    line-height: 1.6;
    max-width: 100%;
    box-sizing: border-box;
  }

  /* Method badges inside guide */
  .method-badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    margin-right: 5px;
    vertical-align: middle;
    letter-spacing: 0.04em;
  }
  .mb-gui  { background: #1c2b1c; color: #4ade80; border: 1px solid #166534; }
  .mb-cmd  { background: var(--blue-dim); color: var(--blue-bright); border: 1px solid #1e3a6e; }
  .mb-ps   { background: var(--purple-dim); color: var(--purple); border: 1px solid #4c1d95; }

  .guide-section-head {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text3);
    font-weight: 700;
    margin: 14px 0 8px;
  }
  .guide-section-head:first-child { margin-top: 0; }
</style>
</head>

    <div class="modal-row">
      <label class="modal-label">Befehlsname *</label>

    <div class="modal-row">

      <input id="inp-short" class="modal-input" type="text" placeholder="Was macht der Befehl?">

  {name:'diskcopy',cat:'dateisystem',typ:'cmd',short:'Diskette kopieren (Legacy).',syntax:'diskcopy [Quelle:] [Ziel:]',examples:['diskcopy A: B:'],tip:'Nur fuer Diskettenlaufwerke. Fuer moderne Dateikopiervorgaenge robocopy oder xcopy verwenden.'},
  {name:'fc',cat:'dateisystem',typ:'cmd',short:'Zwei Dateien Zeile fuer Zeile vergleichen.',syntax:'fc [/B] [/C] [/L] [/N] Datei1 Datei2',examples:['fc datei1.txt datei2.txt','fc /B bild1.png bild2.png','fc /C /L config_alt.ini config_neu.ini'],tip:'/B Binaervergleich. /C Gross-/Kleinschreibung ignorieren. /N Zeilennummern. Gibt Unterschiede aus.'},
  {name:'comp',cat:'dateisystem',typ:'cmd',short:'Zwei Dateien binaer vergleichen.',syntax:'comp [Datei1] [Datei2] [/D] [/A] [/L] [/N=Zeilen]',examples:['comp datei1.bin datei2.bin','comp text1.txt text2.txt /A'],tip:'/D Dezimaldarstellung. /A ASCII-Zeichen anzeigen. /L Zeilennummer. Aelterer Befehl — fc ist umfassender.'},
  {name:'cipher /w',cat:'dateisystem',typ:'cmd',short:'Freien Speicherplatz sicher ueberschreiben (kein Daten-Recovery).',syntax:'cipher /w:[Laufwerk oder Pfad]',examples:['cipher /w:C:\\','cipher /w:D:\\'],tip:'Ueberschreibt nicht belegten Speicher mit Nullen, Einsen und Zufallsdaten. Dauert lange bei grossen Laufwerken.'},
  {name:'vssadmin',cat:'dateisystem',typ:'cmd',short:'Volumeschattenkopien (VSS) verwalten und anzeigen.',syntax:'vssadmin [list|create|delete|resize] [shadows|shadowstorage]',examples:['vssadmin list shadows','vssadmin list shadowstorage','vssadmin delete shadows /all /quiet','vssadmin resize shadowstorage /for=C: /on=C: /maxsize=10GB'],tip:'VSS ist Basis fuer Windows-Sicherungspunkte. delete shadows loescht ALLE Schattenkopien — Vorsicht!'},
  {name:'wbadmin',cat:'dateisystem',typ:'cmd',short:'Windows Server Backup per Kommandozeile steuern.',syntax:'wbadmin [start backup|start systemstatebackup|get versions|get status]',examples:['wbadmin get versions','wbadmin start backup -backupTarget:D: -include:C: -quiet','wbadmin start systemstatebackup -backupTarget:D: -quiet'],tip:'Vollstaendige Sicherung: -include:C:,D: mehrere Volumes. -quiet unterdrueckt Abfragen. Als Admin!'},
  {name:'icacls /save',cat:'dateisystem',typ:'cmd',short:'NTFS-Berechtigungen in Datei sichern und wiederherstellen.',syntax:'icacls [Pfad] /save [Datei]  |  icacls [Pfad] /restore [Datei]',examples:['icacls C:\\Ordner /save C:\\backup_acl.txt /t','icacls C:\\ /restore C:\\backup_acl.txt'],tip:'/t rekursiv fuer alle Unterordner. /restore spielt die gesicherten ACLs wieder ein. Ideal vor Migrationen.'},
  {name:'Get-Item',cat:'dateisystem',typ:'ps',short:'Datei, Ordner oder Registry-Eintrag als Objekt abrufen.',syntax:'Get-Item [Pfad] [-Force]',examples:['Get-Item C:\\Windows','Get-Item C:\\datei.txt | Select Name,Length,LastWriteTime','Get-Item HKLM:\\SOFTWARE\\Microsoft'],tip:'-Force zeigt versteckte Elemente. Funktioniert auch fuer Registry-Pfade mit HKLM:\\...'},
  {name:'Get-ItemProperty',cat:'dateisystem',typ:'ps',short:'Eigenschaften einer Datei oder eines Registry-Schluessels lesen.',syntax:'Get-ItemProperty [Pfad] [-Name Eigenschaft]',examples:['Get-ItemProperty C:\\datei.txt','Get-ItemProperty HKLM:\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion -Name ProgramFilesDir','(Get-ItemProperty C:\\bild.jpg).LastWriteTime'],tip:'Sehr maechtig fuer Registry-Abfragen. Kombiniert mit Set-ItemProperty fuer Registry-Aenderungen.'},
  {name:'Set-ItemProperty',cat:'dateisystem',typ:'ps',short:'Eigenschaft einer Datei oder eines Registry-Schluessels setzen.',syntax:'Set-ItemProperty [Pfad] -Name [Name] -Value [Wert]',examples:['Set-ItemProperty HKLM:\\SOFTWARE\\MeineApp -Name "Version" -Value "2.0"','Set-ItemProperty C:\\datei.txt -Name IsReadOnly -Value $true'],tip:'Registry-Schluessel erstellen: New-Item HKLM:\\SOFTWARE\\NeuApp. Typ angeben: -Type String|DWORD|Binary'},
  {name:'Copy-Item',cat:'dateisystem',typ:'ps',short:'Dateien und Ordner kopieren — auch ueber Provider-Grenzen.',syntax:'Copy-Item [Quelle] [Ziel] [-Recurse] [-Force] [-Filter]',examples:['Copy-Item C:\\Quelle D:\\Ziel -Recurse','Copy-Item *.txt C:\\Backup -Force','Copy-Item C:\\A\\* C:\\B -Recurse -Filter *.log'],tip:'-Recurse kopiert Unterordner. -Force ueberschreibt ohne Abfrage. Funktioniert auch mit Registry und Zertifikaten.'},
  {name:'Move-Item',cat:'dateisystem',typ:'ps',short:'Dateien und Ordner verschieben oder umbenennen.',syntax:'Move-Item [Quelle] [Ziel] [-Force]',examples:['Move-Item C:\\Alt.txt C:\\Neu.txt','Move-Item C:\\Temp\\*.log C:\\Archiv','Move-Item C:\\OrdnerAlt C:\\OrdnerNeu'],tip:'Gleichzeitig umbenennen und verschieben moeglich. -Force ueberschreibt Ziel wenn schon vorhanden.'},
  {name:'Remove-Item',cat:'dateisystem',typ:'ps',short:'Dateien und Ordner loeschen — auch rekursiv.',syntax:'Remove-Item [Pfad] [-Recurse] [-Force] [-Filter]',examples:['Remove-Item C:\\Temp\\*.tmp','Remove-Item C:\\AlterOrdner -Recurse -Force','Get-ChildItem C:\\Logs -Filter *.log | Remove-Item'],tip:'-Recurse loescht auch Unterordner. -Force loescht schreibgeschuetzte Dateien. Kein Papierkorb — permanent!'},
  {name:'New-Item',cat:'dateisystem',typ:'ps',short:'Neue Datei, Ordner oder Registry-Schluessel erstellen.',syntax:'New-Item [Pfad] -ItemType [File|Directory|SymbolicLink|HardLink]',examples:['New-Item C:\\Neuer-Ordner -ItemType Directory','New-Item C:\\leere.txt -ItemType File','New-Item C:\\Link -ItemType SymbolicLink -Value C:\\Original','New-Item C:\\TestOrdner\\Sub -ItemType Directory -Force'],tip:'-Force erstellt fehlende Elternordner automatisch. SymbolicLink erfordert Admin oder Developer-Modus.'},
  {name:'Rename-Item',cat:'dateisystem',typ:'ps',short:'Datei oder Ordner umbenennen.',syntax:'Rename-Item [Pfad] [NeuerName]',examples:['Rename-Item C:\\alt.txt neu.txt','Get-ChildItem C:\\Ordner *.txt | Rename-Item -NewName { $_.Name -replace ".txt",".bak" }'],tip:'Massenumbenennung per Pipeline moeglich. Skriptblock { } fuer dynamische Namen.'},
  {name:'Test-Path',cat:'dateisystem',typ:'ps',short:'Prueft ob ein Pfad existiert — gibt True/False zurueck.',syntax:'Test-Path [Pfad] [-PathType Container|Leaf|Any]',examples:['Test-Path C:\\Windows','Test-Path C:\\datei.txt -PathType Leaf','if (Test-Path C:\\Backup) { Write-Host "Vorhanden" }'],tip:'-PathType Leaf = nur Dateien, Container = nur Ordner. Essentiell in Skripten vor Dateioperationen.'},
  {name:'Resolve-Path',cat:'dateisystem',typ:'ps',short:'Relativen Pfad in absoluten Pfad aufloesen.',syntax:'Resolve-Path [Pfad]',examples:['Resolve-Path .','Resolve-Path ..\\Ordner','Resolve-Path ~\\Desktop'],tip:'Loest ~, . und .. auf. Fehler wenn Pfad nicht existiert — dann Split-Path -Resolve verwenden.'},
  {name:'Split-Path',cat:'dateisystem',typ:'ps',short:'Teile eines Pfads extrahieren (Verzeichnis, Dateiname).',syntax:'Split-Path [Pfad] [-Parent] [-Leaf] [-Extension] [-LeafBase]',examples:['Split-Path "C:\\Windows\\notepad.exe" -Leaf','Split-Path "C:\\Windows\\notepad.exe" -Parent','Split-Path "C:\\Windows\\notepad.exe" -Extension'],tip:'-Leaf = Dateiname. -Parent = Verzeichnis. -Extension = Endung (.exe). -LeafBase = Name ohne Endung.'},
  {name:'Join-Path',cat:'dateisystem',typ:'ps',short:'Pfadteile korrekt zusammenfuegen.',syntax:'Join-Path [Pfad] [Kindelement]',examples:['Join-Path C:\\Windows "System32"','Join-Path $env:USERPROFILE "Desktop\\meinSkript.ps1"'],tip:'Sicherer als String-Konkatenation — fuegt Backslash korrekt ein und vermeidet Doppelslashes.'},
  {name:'Get-FileHash',cat:'dateisystem',typ:'ps',short:'Pruefsumme (Hash) einer Datei berechnen.',syntax:'Get-FileHash [Pfad] [-Algorithm MD5|SHA1|SHA256|SHA512]',examples:['Get-FileHash C:\\setup.exe','Get-FileHash C:\\iso.img -Algorithm MD5','Get-FileHash C:\\datei.txt -Algorithm SHA256 | Select Hash'],tip:'Standard: SHA256. Zum Integritaets-Pruefen von Downloads gegen angegebenen Hash vergleichen.'},
  {name:'ping',cat:'netzwerk',typ:'both',short:'Testet die Erreichbarkeit eines Hosts im Netzwerk.',syntax:'ping [Hostname/IP] [-n Anzahl] [-t]',examples:['ping google.com','ping 192.168.1.1 -n 10','ping -t 8.8.8.8'],tip:'-t sendet dauerhaft bis Strg+C. Gut fuer Verbindungstests.'},
  {name:'ipconfig',cat:'netzwerk',typ:'cmd',short:'Zeigt die IP-Konfiguration aller Netzwerkadapter.',syntax:'ipconfig [/all] [/release] [/renew] [/flushdns]',examples:['ipconfig','ipconfig /all','ipconfig /flushdns'],tip:'/flushdns leert den DNS-Cache - hilfreich bei Verbindungsproblemen.'},
  {name:'tracert',cat:'netzwerk',typ:'cmd',short:'Verfolgt den Netzwerkpfad zu einem Zielhost.',syntax:'tracert [Hostname/IP] [-d]',examples:['tracert google.com','tracert -d 8.8.8.8'],tip:'-d loest keine DNS-Namen auf - schneller. Zeigt Latenzen pro Hop.'},
  {name:'nslookup',cat:'netzwerk',typ:'both',short:'DNS-Abfragen - loest Hostnamen in IP-Adressen auf.',syntax:'nslookup [Hostname] [DNS-Server]',examples:['nslookup google.com','nslookup heise.de 1.1.1.1'],tip:'Interaktiver Modus mit nslookup ohne Parameter. Tippe exit zum Beenden.'},
  {name:'netstat',cat:'netzwerk',typ:'both',short:'Zeigt aktive Netzwerkverbindungen und offene Ports.',syntax:'netstat [-a] [-n] [-o] [-b]',examples:['netstat -an','netstat -ano','netstat -b'],tip:'-o zeigt die PID. -b zeigt den Prozessnamen (Admin noetig).'},
  {name:'arp',cat:'netzwerk',typ:'both',short:'Zeigt und verwaltet den ARP-Cache (IP zu MAC).',syntax:'arp -a  |  arp -d [IP]  |  arp -s [IP] [MAC]',examples:['arp -a','arp -d 192.168.1.5'],tip:'arp -a listet alle bekannten IP-MAC-Paare. Nuetzlich zur Netzwerkanalyse.'},
  {name:'netsh',cat:'netzwerk',typ:'cmd',short:'Netzwerkkonfiguration ueber die Kommandozeile.',syntax:'netsh [Kontext] [Befehl]',examples:['netsh interface ip show config','netsh wlan show profiles','netsh advfirewall set allprofiles state off'],tip:'Sehr maechtig: WLAN-Profile, Firewall, IP-Adressen alles konfigurierbar.'},
  {name:'net',cat:'netzwerk',typ:'cmd',short:'Netzwerkdienste, Freigaben und Benutzer verwalten.',syntax:'net [use|share|user|start|stop|view] ...',examples:['net use * /delete','net share Daten=C:\\Freigabe','net view \\\\SERVER'],tip:'net use verbindet Netzlaufwerke. net start/stop steuert Windows-Dienste.'},
  {name:'pathping',cat:'netzwerk',typ:'cmd',short:'Kombiniert ping + tracert - zeigt Paketverlust pro Hop.',syntax:'pathping [Hostname] [-n]',examples:['pathping google.com','pathping -n 8.8.8.8'],tip:'Dauert laenger als tracert, liefert aber detailliertere Paketverlustdaten.'},
  {name:'nbtstat',cat:'netzwerk',typ:'cmd',short:'Zeigt NetBIOS-Statistiken und Namen-Cache.',syntax:'nbtstat [-a Host] [-n] [-r] [-R]',examples:['nbtstat -n','nbtstat -a 192.168.1.10','nbtstat -R'],tip:'-R loescht den NetBIOS-Cache. Nuetzlich in aelteren Windows-Netzwerken.'},

  // ── NETZWERK ERWEITERT ──

  // Diagnose & Analyse
  {name:'telnet',cat:'netzwerk',typ:'cmd',short:'Testet TCP-Port-Erreichbarkeit zu einem Host.',syntax:'telnet [Host] [Port]',examples:['telnet 192.168.1.1 80','telnet smtp.gmail.com 25','telnet dc01 389'],tip:'Zuerst aktivieren: pkgmgr /iu:"TelnetClient" oder optionale Features. Gibt keine Fehlerausgabe — Verbindung oder sofort Trennung zeigt ob Port offen ist.'},
  {name:'Test-NetConnection',cat:'netzwerk',typ:'ps',short:'Ping + Port-Test + Traceroute in einem PowerShell-Befehl.',syntax:'Test-NetConnection [Host] [-Port N] [-TraceRoute] [-InformationLevel Detailed]',examples:['Test-NetConnection google.com','Test-NetConnection 192.168.1.1 -Port 443','Test-NetConnection dc01 -Port 389','Test-NetConnection google.com -TraceRoute'],tip:'Moderner Alleskoenner: ersetzt ping, telnet und tracert. -InformationLevel Detailed zeigt alle Details.'},
  {name:'Test-Connection',cat:'netzwerk',typ:'ps',short:'PowerShell-Ping mit Objektausgabe — ideal fuer Skripte.',syntax:'Test-Connection [Host] [-Count N] [-Quiet] [-BufferSize N]',examples:['Test-Connection google.com -Count 4','Test-Connection 8.8.8.8 -Quiet','1..254 | ForEach { Test-Connection "192.168.1.$_" -Count 1 -Quiet }'],tip:'-Quiet gibt nur True/False zurueck. Subnetz-Scan: 1..254 foreach Test-Connection.'},
  {name:'tracert',cat:'netzwerk',typ:'cmd',short:'Verfolgt den Netzwerkpfad zu einem Zielhost Hop fuer Hop.',syntax:'tracert [Host] [-d] [-h MaxHops] [-w Timeout]',examples:['tracert google.com','tracert -d 8.8.8.8','tracert -h 15 heise.de'],tip:'-d verzichtet auf DNS-Aufloesung (schneller). -h begrenzt Max-Hops. * = Paket blockiert von Firewall.'},
  {name:'pathping',cat:'netzwerk',typ:'cmd',short:'Kombiniert ping + tracert mit Paketverlust-Statistik pro Hop.',syntax:'pathping [Host] [-n] [-h MaxHops] [-p Pause] [-q Anfragen]',examples:['pathping google.com','pathping -n 8.8.8.8','pathping -h 20 heise.de'],tip:'Dauert 25+ Sekunden (sammelt Statistiken). -n schneller ohne DNS-Aufloesung. Zeigt Paketverlust pro Hop.'},
  {name:'Get-NetRoute',cat:'netzwerk',typ:'ps',short:'Routing-Tabelle in PowerShell anzeigen.',syntax:'Get-NetRoute [-AddressFamily IPv4|IPv6] [-DestinationPrefix Netz]',examples:['Get-NetRoute -AddressFamily IPv4','Get-NetRoute | Where DestinationPrefix -eq "0.0.0.0/0"','Get-NetRoute | Sort RouteMetric'],tip:'Moderner Ersatz fuer route print. Gibt Objekte zurueck — gut filterbar und skriptbar.'},
  {name:'route',cat:'netzwerk',typ:'both',short:'Routing-Tabelle anzeigen, Routen hinzufuegen und loeschen.',syntax:'route [print|add|delete|change] [Ziel] [mask Maske] [Gateway] [-p]',examples:['route print','route print -4','route add 10.0.0.0 mask 255.0.0.0 192.168.1.1 -p','route delete 10.0.0.0','route change 10.0.0.0 mask 255.0.0.0 192.168.1.254'],tip:'-p macht Route persistent (Neustart-sicher). route print -4 nur IPv4. Metrik mit metric N beeinflussen.'},
  {name:'Get-NetIPConfiguration',cat:'netzwerk',typ:'ps',short:'Ausfuehrliche IP-Konfiguration aller Adapter (PS-Ersatz fuer ipconfig /all).',syntax:'Get-NetIPConfiguration [-Detailed] [-InterfaceAlias Name]',examples:['Get-NetIPConfiguration','Get-NetIPConfiguration -Detailed','Get-NetIPConfiguration -InterfaceAlias "Ethernet"'],tip:'-Detailed zeigt DNS-Suffix, WINS, Gateway. Gibt Objekte zurueck — ideal fuer Skripte.'},
  {name:'Get-NetIPAddress',cat:'netzwerk',typ:'ps',short:'IP-Adressen aller Netzwerkadapter anzeigen.',syntax:'Get-NetIPAddress [-AddressFamily IPv4|IPv6] [-InterfaceAlias Name]',examples:['Get-NetIPAddress -AddressFamily IPv4','Get-NetIPAddress | Where PrefixOrigin -eq Dhcp','Get-NetIPAddress | Select InterfaceAlias,IPAddress,PrefixLength'],tip:'PrefixOrigin: Manual=statisch, Dhcp=automatisch. Zeigt auch Link-Local und Loopback.'},
  {name:'New-NetIPAddress',cat:'netzwerk',typ:'ps',short:'IP-Adresse einem Netzwerkadapter zuweisen.',syntax:'New-NetIPAddress -InterfaceAlias [Name] -IPAddress [IP] -PrefixLength [CIDR] -DefaultGateway [GW]',examples:['New-NetIPAddress -InterfaceAlias "Ethernet" -IPAddress 192.168.1.100 -PrefixLength 24 -DefaultGateway 192.168.1.1','New-NetIPAddress -InterfaceIndex 5 -IPAddress 10.0.0.50 -PrefixLength 16'],tip:'InterfaceAlias per Get-NetAdapter ermitteln. Remove-NetIPAddress zum Entfernen.'},
  {name:'Set-NetIPAddress',cat:'netzwerk',typ:'ps',short:'Bestehende IP-Adresse aendern.',syntax:'Set-NetIPAddress -InterfaceAlias [Name] -IPAddress [IP] -PrefixLength [CIDR]',examples:['Set-NetIPAddress -InterfaceAlias "Ethernet" -IPAddress 192.168.1.200 -PrefixLength 24'],tip:'Nur fuer bestehende statische Adressen. Fuer DHCP: Set-NetIPInterface -InterfaceAlias "Ethernet" -Dhcp Enabled'},

  // Adapter & Schnittstellen
  {name:'Get-NetAdapter',cat:'netzwerk',typ:'ps',short:'Alle Netzwerkadapter mit Status, MAC und Geschwindigkeit anzeigen.',syntax:'Get-NetAdapter [-Name Name] [-Physical]',examples:['Get-NetAdapter','Get-NetAdapter -Physical','Get-NetAdapter | Where Status -eq Up','Get-NetAdapter | Select Name,Status,LinkSpeed,MacAddress'],tip:'-Physical zeigt nur echte Hardware (keine VMs). MacAddress hier auslesen fuer weitere Befehle.'},
  {name:'Enable-NetAdapter',cat:'netzwerk',typ:'ps',short:'Netzwerkadapter aktivieren.',syntax:'Enable-NetAdapter -Name [Name] [-Confirm:$false]',examples:['Enable-NetAdapter -Name "Ethernet" -Confirm:$false','Enable-NetAdapter -Name "WLAN" -Confirm:$false'],tip:'Deaktivieren: Disable-NetAdapter -Name "Ethernet" -Confirm:$false. Adapter-Name per Get-NetAdapter.'},
  {name:'Disable-NetAdapter',cat:'netzwerk',typ:'ps',short:'Netzwerkadapter deaktivieren.',syntax:'Disable-NetAdapter -Name [Name] [-Confirm:$false]',examples:['Disable-NetAdapter -Name "WLAN" -Confirm:$false','Get-NetAdapter | Where Status -eq Disconnected | Disable-NetAdapter -Confirm:$false'],tip:'Kein Kommentar ohne -Confirm:$false. Nützlich um WLAN waehrend Kabelverbindung zu sperren.'},
  {name:'Rename-NetAdapter',cat:'netzwerk',typ:'ps',short:'Netzwerkadapter umbenennen.',syntax:'Rename-NetAdapter -Name [AltName] -NewName [NeuName]',examples:['Rename-NetAdapter -Name "Ethernet 3" -NewName "LAN-Buero"','Rename-NetAdapter -Name "WLAN" -NewName "WiFi"'],tip:'Saubere Namen erleichtern Skripting und Diagnose. Umbenennung ist dauerhaft.'},
  {name:'Set-NetAdapterAdvancedProperty',cat:'netzwerk',typ:'ps',short:'Erweiterte Adapter-Eigenschaften setzen (Jumbo-Frames, Wake-on-LAN etc.).',syntax:'Set-NetAdapterAdvancedProperty -Name [Adapter] -DisplayName [Prop] -DisplayValue [Wert]',examples:['Set-NetAdapterAdvancedProperty -Name "Ethernet" -DisplayName "Jumbo Packet" -DisplayValue "9014"','Set-NetAdapterAdvancedProperty -Name "Ethernet" -DisplayName "Wake on Magic Packet" -DisplayValue "Enabled"'],tip:'Alle Eigenschaften anzeigen: Get-NetAdapterAdvancedProperty -Name Ethernet'},
  {name:'Get-NetAdapterStatistics',cat:'netzwerk',typ:'ps',short:'Netzwerk-Statistiken (Bytes, Pakete, Fehler) eines Adapters.',syntax:'Get-NetAdapterStatistics [-Name Name]',examples:['Get-NetAdapterStatistics','Get-NetAdapterStatistics -Name "Ethernet"','Get-NetAdapterStatistics | Select Name,ReceivedBytes,SentBytes'],tip:'Zeigt Sende-/Empfangsbytes seit letztem Reset. Nuetzlich fuer Traffic-Monitoring-Skripte.'},
  {name:'netsh interface ip',cat:'netzwerk',typ:'cmd',short:'IP-Konfiguration per netsh anzeigen und setzen.',syntax:'netsh interface ip [show|set|add|delete] [config|address|dns|gateway]',examples:['netsh interface ip show config','netsh interface ip set address "Ethernet" static 192.168.1.100 255.255.255.0 192.168.1.1','netsh interface ip set dns "Ethernet" static 8.8.8.8','netsh interface ip set address "Ethernet" dhcp'],tip:'Klassischer Weg fuer statische IPs ohne GUI. Adapter-Name aus ncpa.cpl oder ipconfig.'},
  {name:'netsh wlan',cat:'netzwerk',typ:'cmd',short:'WLAN-Verbindungen, Profile und Adapter verwalten.',syntax:'netsh wlan [show|connect|disconnect|delete] [profiles|interfaces|networks]',examples:['netsh wlan show profiles','netsh wlan show profile name="MeinWLAN" key=clear','netsh wlan connect name="MeinWLAN"','netsh wlan disconnect','netsh wlan delete profile name="AltesWLAN"'],tip:'key=clear zeigt das gespeicherte WLAN-Passwort im Klartext! Nur als Admin.'},
  {name:'netsh advfirewall',cat:'netzwerk',typ:'cmd',short:'Windows-Firewall Regeln und Profile per Kommandozeile verwalten.',syntax:'netsh advfirewall [show|set|reset] [allprofiles|currentprofile|firewall]',examples:['netsh advfirewall show allprofiles','netsh advfirewall set allprofiles state off','netsh advfirewall firewall add rule name="HTTP" dir=in action=allow protocol=TCP localport=80','netsh advfirewall reset'],tip:'Vorsicht beim Deaktivieren! reset setzt alle Regeln auf Standard zurueck.'},
  {name:'netsh int tcp',cat:'netzwerk',typ:'cmd',short:'TCP-Einstellungen (Autotuning, RSS, Chimney) konfigurieren.',syntax:'netsh int tcp [show|set] global [autotuninglevel|rss|chimney]',examples:['netsh int tcp show global','netsh int tcp set global autotuninglevel=normal','netsh int tcp set global autotuninglevel=disabled','netsh int tcp set global rss=enabled'],tip:'autotuninglevel=disabled loest manche VPN/Proxy-Probleme. normal ist Standard fuer moderne Netzwerke.'},

  // Firewall PowerShell
  {name:'Get-NetFirewallRule',cat:'netzwerk',typ:'ps',short:'Windows-Firewall-Regeln anzeigen und filtern.',syntax:'Get-NetFirewallRule [-Name Name] [-DisplayName Name] [-Enabled True] [-Direction Inbound|Outbound]',examples:['Get-NetFirewallRule -Enabled True -Direction Inbound','Get-NetFirewallRule | Where DisplayName -like "*HTTP*"','Get-NetFirewallRule -Name "WINRM-HTTP-In-TCP" | Get-NetFirewallPortFilter'],tip:'Mit Get-NetFirewallPortFilter pipen um Port-Details zu sehen. Sehr maechtig kombiniert mit Where-Object.'},
  {name:'New-NetFirewallRule',cat:'netzwerk',typ:'ps',short:'Neue Firewall-Regel erstellen.',syntax:'New-NetFirewallRule -DisplayName [Name] -Direction [Inbound|Outbound] -Protocol TCP -LocalPort N -Action Allow|Block',examples:['New-NetFirewallRule -DisplayName "HTTP eingehend" -Direction Inbound -Protocol TCP -LocalPort 80 -Action Allow','New-NetFirewallRule -DisplayName "RDP blockieren" -Direction Inbound -Protocol TCP -LocalPort 3389 -Action Block -RemoteAddress 0.0.0.0/0'],tip:'-Profile Domain,Private,Public gibt an fuer welche Netzwerkprofile die Regel gilt.'},
  {name:'Set-NetFirewallRule',cat:'netzwerk',typ:'ps',short:'Bestehende Firewall-Regel aendern.',syntax:'Set-NetFirewallRule -DisplayName [Name] [-Enabled True|False] [-Action Allow|Block]',examples:['Set-NetFirewallRule -DisplayName "HTTP eingehend" -Enabled False','Set-NetFirewallRule -DisplayName "HTTP eingehend" -Action Block'],tip:'Schnell Regeln deaktivieren ohne sie zu loeschen. Get-NetFirewallRule | Set-NetFirewallRule fuer Massen-Aenderungen.'},
  {name:'Remove-NetFirewallRule',cat:'netzwerk',typ:'ps',short:'Firewall-Regel loeschen.',syntax:'Remove-NetFirewallRule -DisplayName [Name]',examples:['Remove-NetFirewallRule -DisplayName "AlteRegel"','Get-NetFirewallRule | Where DisplayName -like "*Test*" | Remove-NetFirewallRule'],tip:'Mehrere Regeln per Pipeline loeschen. Vorsicht: keine Rueckfrage bei Remove!'},

  // DNS Client (PowerShell)
  {name:'Get-DnsClientCache',cat:'netzwerk',typ:'ps',short:'Lokalen DNS-Client-Cache anzeigen.',syntax:'Get-DnsClientCache [-Name Name] [-Type A|AAAA|CNAME]',examples:['Get-DnsClientCache','Get-DnsClientCache -Name "google.com"','Get-DnsClientCache | Where Type -eq A | Select Entry,Data,TimeToLive'],tip:'Zeigt gecachte Eintraege mit verbleibender TTL. Clear-DnsClientCache zum Leeren.'},
  {name:'Clear-DnsClientCache',cat:'netzwerk',typ:'ps',short:'Lokalen DNS-Client-Cache leeren (PS-Ersatz fuer ipconfig /flushdns).',syntax:'Clear-DnsClientCache',examples:['Clear-DnsClientCache','Clear-DnsClientCache; Get-DnsClientCache'],tip:'Identisch mit ipconfig /flushdns. Loest Probleme mit veralteten DNS-Eintraegen.'},
  {name:'Get-DnsClientServerAddress',cat:'netzwerk',typ:'ps',short:'Konfigurierte DNS-Server aller Adapter anzeigen.',syntax:'Get-DnsClientServerAddress [-AddressFamily IPv4|IPv6] [-InterfaceAlias Name]',examples:['Get-DnsClientServerAddress -AddressFamily IPv4','Get-DnsClientServerAddress | Select InterfaceAlias,ServerAddresses'],tip:'Zeigt sowohl DHCP-zugewiesene als auch manuell gesetzte DNS-Server.'},
  {name:'Set-DnsClientServerAddress',cat:'netzwerk',typ:'ps',short:'DNS-Server fuer einen Adapter setzen.',syntax:'Set-DnsClientServerAddress -InterfaceAlias [Name] -ServerAddresses [IP,IP]',examples:['Set-DnsClientServerAddress -InterfaceAlias "Ethernet" -ServerAddresses 8.8.8.8,8.8.4.4','Set-DnsClientServerAddress -InterfaceAlias "Ethernet" -ServerAddresses 1.1.1.1,1.0.0.1','Set-DnsClientServerAddress -InterfaceAlias "Ethernet" -ResetServerAddresses'],tip:'-ResetServerAddresses setzt auf DHCP-DNS zurueck. Adapter-Name per Get-NetAdapter.'},

  // Netzwerkshares & SMB
  {name:'net share',cat:'netzwerk',typ:'cmd',short:'Netzwerkfreigaben anzeigen, erstellen und loeschen.',syntax:'net share [Name=Pfad] [/delete] [/users:N] [/remark:"Text"]',examples:['net share','net share Daten=C:\\Freigabe /remark:"IT Daten"','net share Daten /delete','net share Admin$ /delete'],tip:'net share ohne Parameter listet alle Freigaben inkl. versteckter Admin-Freigaben. $ am Ende = versteckt.'},
  {name:'net view',cat:'netzwerk',typ:'cmd',short:'Computer im Netzwerk oder Freigaben eines Servers anzeigen.',syntax:'net view [\\\\Server] [/domain:Domaene]',examples:['net view','net view \\\\SERVER01','net view /domain:firma.local'],tip:'Zeigt sichtbare Computer in der Arbeitsgruppe/Domaene. Freigaben eines Servers: net view \\\\ServerName'},
  {name:'Get-SmbConnection',cat:'netzwerk',typ:'ps',short:'Aktive SMB-Verbindungen des Clients anzeigen.',syntax:'Get-SmbConnection',examples:['Get-SmbConnection','Get-SmbConnection | Select ServerName,ShareName,UserName,NumOpens'],tip:'Zeigt alle verbundenen Netzwerkfreigaben mit Benutzer und offenen Handles. Disconnect-SmbConnection zum Trennen.'},
  {name:'Get-SmbServerConfiguration',cat:'netzwerk',typ:'ps',short:'SMB-Serverkonfiguration anzeigen (SMB1/2/3 Status).',syntax:'Get-SmbServerConfiguration',examples:['Get-SmbServerConfiguration','(Get-SmbServerConfiguration).EnableSMB1Protocol','(Get-SmbServerConfiguration).EnableSMB2Protocol'],tip:'SMB1 Sicherheitsrisiko! Deaktivieren: Set-SmbServerConfiguration -EnableSMB1Protocol $false -Force'},
  {name:'Set-SmbServerConfiguration',cat:'netzwerk',typ:'ps',short:'SMB-Serverkonfiguration aendern (SMB1 deaktivieren etc.).',syntax:'Set-SmbServerConfiguration [-EnableSMB1Protocol $false] [-EnableSMB2Protocol $true] [-Force]',examples:['Set-SmbServerConfiguration -EnableSMB1Protocol $false -Force','Set-SmbServerConfiguration -RequireSecuritySignature $true -Force','Set-SmbServerConfiguration -EnableSMB2Protocol $true -Force'],tip:'SMB1 deaktivieren ist Security-Best-Practice (WannaCry nutzte SMB1). Neustart empfohlen.'},

  // VPN & Remote
  {name:'Get-VpnConnection',cat:'netzwerk',typ:'ps',short:'Konfigurierte VPN-Verbindungen anzeigen.',syntax:'Get-VpnConnection [-AllUserConnection]',examples:['Get-VpnConnection','Get-VpnConnection -AllUserConnection','Get-VpnConnection | Select Name,ServerAddress,ConnectionStatus'],tip:'-AllUserConnection zeigt system-weite VPN-Profile. Add-VpnConnection zum Erstellen.'},
  {name:'Add-VpnConnection',cat:'netzwerk',typ:'ps',short:'Neue VPN-Verbindung erstellen.',syntax:'Add-VpnConnection -Name [Name] -ServerAddress [Server] -TunnelType [IKEv2|PPTP|L2TP|SSTP]',examples:['Add-VpnConnection -Name "Firma VPN" -ServerAddress "vpn.firma.de" -TunnelType IKEv2 -AuthenticationMethod EAP','Add-VpnConnection -Name "Home VPN" -ServerAddress "192.168.0.1" -TunnelType L2TP -AllUserConnection'],tip:'-AllUserConnection macht VPN fuer alle Benutzer verfuegbar (Admin noetig). IKEv2 = empfohlen.'},
  {name:'Connect-VpnConnection',cat:'netzwerk',typ:'ps',short:'VPN-Verbindung aufbauen.',syntax:'Connect-VpnConnection -Name [Name] [-Credential]',examples:['Connect-VpnConnection -Name "Firma VPN"','rasdial "Firma VPN" Benutzer Passwort'],tip:'rasdial ist CMD-Alternative. Disconnect-VpnConnection oder rasdial /disconnect zum Trennen.'},
  {name:'rasdial',cat:'netzwerk',typ:'cmd',short:'VPN-Verbindung per Kommandozeile auf- und abbauen.',syntax:'rasdial [Verbindungsname] [Benutzer] [Passwort]  |  rasdial /disconnect',examples:['rasdial "Firma VPN" Max Passwort','rasdial "Firma VPN"','rasdial /disconnect'],tip:'Passwort im Klartext — nur fuer Skripte mit verschluesselten Credentials. rasdial ohne Parameter zeigt aktive Verbindungen.'},

  // Netzwerk-Analyse & Monitoring
  {name:'Get-NetTCPConnection',cat:'netzwerk',typ:'ps',short:'Aktive TCP-Verbindungen und lauschende Ports anzeigen (PS-Ersatz fuer netstat).',syntax:'Get-NetTCPConnection [-State Listen|Established|TimeWait] [-LocalPort N] [-RemoteAddress IP]',examples:['Get-NetTCPConnection -State Listen','Get-NetTCPConnection -LocalPort 3389','Get-NetTCPConnection | Where State -eq Established | Sort LocalPort','Get-NetTCPConnection -RemoteAddress 0.0.0.0 -State Listen | Select LocalPort | Sort LocalPort'],tip:'Mit Get-Process kombinieren: Get-NetTCPConnection | Select *,@{n="Process";e={(Get-Process -Id $_.OwningProcess).Name}}'},
  {name:'Get-NetUDPEndpoint',cat:'netzwerk',typ:'ps',short:'Aktive UDP-Endpunkte anzeigen.',syntax:'Get-NetUDPEndpoint [-LocalPort N]',examples:['Get-NetUDPEndpoint','Get-NetUDPEndpoint -LocalPort 53','Get-NetUDPEndpoint | Sort LocalPort'],tip:'Zeigt alle lauschenden UDP-Ports. DNS (53), DHCP (67/68), NTP (123) sind typische UDP-Dienste.'},
  {name:'netstat -b',cat:'netzwerk',typ:'cmd',short:'TCP-Verbindungen mit zugehoerigem Programmnamen anzeigen.',syntax:'netstat -b [-n] [-o] [-a]',examples:['netstat -b','netstat -bano','netstat -ban | findstr LISTEN'],tip:'Muss als Admin ausgefuehrt werden. -b zeigt ausfuehrendes Programm. Langsamer als ohne -b.'},
  {name:'netstat -an',cat:'netzwerk',typ:'cmd',short:'Alle Verbindungen und Ports numerisch (ohne DNS) anzeigen.',syntax:'netstat -an  |  netstat -ano  |  netstat -anp TCP',examples:['netstat -an','netstat -ano','netstat -an | findstr :3389','netstat -ano | findstr LISTEN'],tip:'-n verhindert DNS-Aufloesung (schneller). -o zeigt PID. findstr filtert nach Port oder Status.'},
  {name:'netstat -e',cat:'netzwerk',typ:'cmd',short:'Ethernet-Statistiken (Bytes, Pakete, Fehler) anzeigen.',syntax:'netstat -e [-s]',examples:['netstat -e','netstat -e -t 5'],tip:'-s zeigt protokollspezifische Statistiken (TCP, UDP, IP, ICMP). -t Intervall in Sekunden fuer Live-Anzeige.'},
  {name:'Get-NetConnectionProfile',cat:'netzwerk',typ:'ps',short:'Netzwerkprofil eines Adapters anzeigen (Domain/Private/Public).',syntax:'Get-NetConnectionProfile [-InterfaceAlias Name]',examples:['Get-NetConnectionProfile','Get-NetConnectionProfile | Select InterfaceAlias,NetworkCategory'],tip:'Netzwerkkategorie aendern: Set-NetConnectionProfile -InterfaceAlias "Ethernet" -NetworkCategory Private'},
  {name:'Set-NetConnectionProfile',cat:'netzwerk',typ:'ps',short:'Netzwerkprofil auf Domain/Private/Public aendern.',syntax:'Set-NetConnectionProfile -InterfaceAlias [Name] -NetworkCategory [Domain|Private|Public]',examples:['Set-NetConnectionProfile -InterfaceAlias "Ethernet" -NetworkCategory Private','Set-NetConnectionProfile -InterfaceAlias "WLAN" -NetworkCategory Public'],tip:'WinRM benoetigt Private oder Domain. Public blockiert viele eingehende Verbindungen.'},

  // DHCP & IP-Management
  {name:'ipconfig /release',cat:'netzwerk',typ:'cmd',short:'DHCP-Lease freigeben (IP-Adresse zurueckgeben).',syntax:'ipconfig /release [Adapter]',examples:['ipconfig /release','ipconfig /release "Ethernet"'],tip:'Danach ipconfig /renew um neue IP zu beziehen. Loest Probleme mit falscher IP-Adresse.'},
  {name:'ipconfig /renew',cat:'netzwerk',typ:'cmd',short:'Neue IP-Adresse per DHCP anfordern.',syntax:'ipconfig /renew [Adapter]',examples:['ipconfig /renew','ipconfig /renew "Ethernet"'],tip:'Fordert neue DHCP-Lease an. Erst /release dann /renew fuer sauberen Reset.'},
  {name:'Get-DhcpServerv4Lease',cat:'netzwerk',typ:'ps',short:'DHCP-Leases auf Windows DHCP-Server anzeigen.',syntax:'Get-DhcpServerv4Lease -ComputerName [Server] -ScopeId [Netz]',examples:['Get-DhcpServerv4Lease -ComputerName DC01 -ScopeId 192.168.1.0','Get-DhcpServerv4Lease -ComputerName DC01 -ScopeId 192.168.1.0 | Where HostName -like "*PC01*"'],tip:'Erfordert RSAT-DHCP. Get-DhcpServerv4Scope listet alle Scopes auf.'},
  {name:'Get-DhcpServerv4Scope',cat:'netzwerk',typ:'ps',short:'DHCP-Scopes auf Windows DHCP-Server anzeigen.',syntax:'Get-DhcpServerv4Scope -ComputerName [Server]',examples:['Get-DhcpServerv4Scope -ComputerName DC01','Get-DhcpServerv4Scope -ComputerName DC01 | Select ScopeId,Name,StartRange,EndRange,State'],tip:'Zeigt alle DHCP-Bereiche mit Start/End-Adressen und Auslastung.'},
  {name:'Add-DhcpServerv4Reservation',cat:'netzwerk',typ:'ps',short:'DHCP-Reservierung (feste IP per MAC) erstellen.',syntax:'Add-DhcpServerv4Reservation -ComputerName [Server] -ScopeId [Netz] -IPAddress [IP] -ClientId [MAC] -Description [Text]',examples:['Add-DhcpServerv4Reservation -ComputerName DC01 -ScopeId 192.168.1.0 -IPAddress 192.168.1.200 -ClientId "00-11-22-33-44-55" -Description "Drucker"'],tip:'MAC-Adresse ohne Bindestrich oder mit - oder : angeben. Gibt dem Geraet immer dieselbe IP.'},

  // Netzwerk-Tools
  {name:'getmac',cat:'netzwerk',typ:'both',short:'MAC-Adressen aller Netzwerkadapter anzeigen.',syntax:'getmac [/v] [/s Computer] [/fo FORMAT]',examples:['getmac','getmac /v','getmac /fo CSV /nh','getmac /s PC02 /v'],tip:'/v zeigt auch den Adapter-Namen. /s fragt remote Computer ab. Schneller als ipconfig /all fuer nur MAC-Adressen.'},
  {name:'Get-NetNeighbor',cat:'netzwerk',typ:'ps',short:'ARP-Tabelle in PowerShell anzeigen (PS-Ersatz fuer arp -a).',syntax:'Get-NetNeighbor [-AddressFamily IPv4|IPv6] [-InterfaceAlias Name]',examples:['Get-NetNeighbor -AddressFamily IPv4','Get-NetNeighbor | Where State -eq Reachable','Get-NetNeighbor | Select IPAddress,LinkLayerAddress,State'],tip:'State: Reachable=aktuell, Stale=veraltet, Incomplete=ausstehend. Moderner Ersatz fuer arp -a.'},
  {name:'arp -a',cat:'netzwerk',typ:'cmd',short:'ARP-Cache anzeigen — IP zu MAC Zuordnungen.',syntax:'arp -a [IP]  |  arp -d [IP]  |  arp -s [IP] [MAC]',examples:['arp -a','arp -a 192.168.1.1','arp -d 192.168.1.5','arp -s 192.168.1.100 00-11-22-33-44-55'],tip:'-d loescht Eintrag. -s fuegt statischen Eintrag hinzu. Nützlich um Duplicate-IP oder falsche MAC zu erkennen.'},
  {name:'netsh int ip reset',cat:'netzwerk',typ:'cmd',short:'TCP/IP-Stack vollstaendig zuruecksetzen.',syntax:'netsh int ip reset [Logdatei]',examples:['netsh int ip reset','netsh int ip reset C:\\ip_reset.log','netsh winsock reset'],tip:'Setzt alle IP-Einstellungen zurueck. Neustart erforderlich! Loest viele harrtnaeckige Netzwerkprobleme. netsh winsock reset zuertlich ergaenzen.'},
  {name:'netsh winsock reset',cat:'netzwerk',typ:'cmd',short:'Winsock-Katalog zuruecksetzen (loest viele Netzwerkprobleme).',syntax:'netsh winsock reset [catalog]',examples:['netsh winsock reset','netsh winsock reset catalog'],tip:'Loest Probleme mit fehlgeschlagenen Verbindungen, langsamen Downloads und kaputten Socket-Eintraegen. Neustart danach!'},
  {name:'winrm quickconfig',cat:'netzwerk',typ:'cmd',short:'WinRM (Windows Remote Management) aktivieren und konfigurieren.',syntax:'winrm quickconfig [-q] [-force]',examples:['winrm quickconfig','winrm quickconfig -q','Enable-PSRemoting -Force'],tip:'Aktiviert WinRM-Dienst, erstellt Firewall-Regel und konfiguriert Listener. Voraussetzung fuer PowerShell-Remoting.'},
  {name:'Test-WSMan',cat:'netzwerk',typ:'ps',short:'WinRM-Verbindung zu einem Computer testen.',syntax:'Test-WSMan [ComputerName] [-Credential Benutzer]',examples:['Test-WSMan PC02','Test-WSMan DC01 -Credential (Get-Credential)','Test-WSMan localhost'],tip:'Testet ob WinRM auf dem Zielcomputer erreichbar und aktiv ist. Gibt WinRM-Version zurueck wenn erfolgreich.'},
  {name:'Get-NetQosPolicy',cat:'netzwerk',typ:'ps',short:'QoS-Richtlinien (Bandbreitenpriorisierung) anzeigen.',syntax:'Get-NetQosPolicy',examples:['Get-NetQosPolicy','Get-NetQosPolicy | Select Name,AppPathNameMatchCondition,DSCPAction'],tip:'QoS priorisiert bestimmten Traffic (z.B. VoIP ueber Dateiuebertragungen). New-NetQosPolicy zum Erstellen.'},

  {name:'systeminfo',cat:'system',typ:'both',short:'Zeigt detaillierte Systeminformationen (OS, RAM, Patches).',syntax:'systeminfo [/S Computer] [/FO FORMAT]',examples:['systeminfo','systeminfo /FO CSV > info.csv'],tip:'Gibt Hotfixes, Speicher, BIOS-Version und mehr aus. Ausgabe exportierbar.'},
  {name:'winver',cat:'system',typ:'both',short:'Oeffnet das Fenster mit der Windows-Versionsnummer.',syntax:'winver',examples:['winver'],tip:'Schnellster Weg um Build-Nummer und Edition zu sehen.'},
  {name:'shutdown',cat:'system',typ:'both',short:'Faehrt den Computer herunter, startet neu oder meldet ab.',syntax:'shutdown [/s] [/r] [/h] [/t Zeit] [/m \\\\PC]',examples:['shutdown /s /t 0','shutdown /r /t 30','shutdown /a','shutdown /h'],tip:'/a bricht einen geplanten Shutdown ab. /h versetzt in den Ruhezustand.'},
  {name:'sfc',cat:'system',typ:'cmd',short:'System File Checker - prueft und repariert Systemdateien.',syntax:'sfc /scannow  |  sfc /verifyonly',examples:['sfc /scannow','sfc /verifyonly'],tip:'Muss als Administrator ausgefuehrt werden. Repariert beschaedigte Windows-Dateien.'},
  {name:'chkdsk',cat:'system',typ:'cmd',short:'Ueberprueft und repariert Fehler im Dateisystem.',syntax:'chkdsk [Laufwerk:] [/F] [/R]',examples:['chkdsk C: /F','chkdsk D: /R'],tip:'/F repariert Fehler. /R sucht nach defekten Sektoren (dauert lange).'},
  {name:'diskpart',cat:'system',typ:'cmd',short:'Interaktives Tool zur Festplatten- und Partitionsverwaltung.',syntax:'diskpart - list disk - select disk N - ...',examples:['diskpart','list disk','select disk 1','list partition'],tip:'Immer als Admin! Sehr maechtig - falsche Befehle koennen Daten loeschen.'},
  {name:'msconfig',cat:'system',typ:'both',short:'Systemkonfiguration - Autostart, Boot-Optionen, Dienste.',syntax:'msconfig',examples:['msconfig'],tip:'GUI-Tool. Boot-Tab: Safe Mode. Autostart im Task-Manager (neue Windows-Versionen).'},
  {name:'regedit',cat:'system',typ:'both',short:'Registrierungseditor - Oeffnet die Windows-Registry.',syntax:'regedit',examples:['regedit'],tip:'Als Admin ausfuehren. Vor Aenderungen immer einen Backup-Export machen!'},
  {name:'powercfg',cat:'system',typ:'cmd',short:'Energieverwaltung und Ruhezustand konfigurieren.',syntax:'powercfg [/l] [/energy] [/hibernate on|off]',examples:['powercfg /l','powercfg /energy','powercfg /hibernate off'],tip:'/energy erstellt einen detaillierten Energiebericht als HTML-Datei.'},
  {name:'sc',cat:'system',typ:'both',short:'Dienste abfragen, starten, stoppen und konfigurieren.',syntax:'sc [query|start|stop|config] [Dienstname]',examples:['sc query type= all','sc stop wuauserv','sc start spooler'],tip:'sc query listet alle Dienste. Alternativ: net start/stop fuer einfache Faelle.'},
  {name:'dism',cat:'system',typ:'cmd',short:'Windows-Image und Komponenten verwalten.',syntax:'dism /Online /Cleanup-Image [/ScanHealth|/RestoreHealth]',examples:['dism /Online /Cleanup-Image /ScanHealth','dism /Online /Cleanup-Image /RestoreHealth'],tip:'Repariert Windows-Systemimage. Wird oft nach sfc /scannow eingesetzt.'},
  {name:'bcdedit',cat:'system',typ:'cmd',short:'Bearbeitet den Boot-Konfigurationsdatenspeicher (BCD).',syntax:'bcdedit [/set] [/enum] [/delete]',examples:['bcdedit /enum','bcdedit /set {current} safeboot minimal'],tip:'Nur als Admin. Ermoeglicht das Konfigurieren von Bootoptionen wie Safe Mode.'},
  {name:'bootrec',cat:'system',typ:'cmd',short:'Bootsektor und MBR reparieren (Windows RE).',syntax:'bootrec [/fixmbr|/fixboot|/scanos|/rebuildbcd]',examples:['bootrec /fixmbr','bootrec /fixboot','bootrec /rebuildbcd'],tip:'Nur aus der Windows-Wiederherstellungsumgebung (WinRE). /rebuildbcd scannt nach Windows-Installationen.'},
  {name:'reagentc',cat:'system',typ:'cmd',short:'Windows RE (Wiederherstellungsumgebung) verwalten.',syntax:'reagentc [/info] [/enable] [/disable] [/setreimage]',examples:['reagentc /info','reagentc /enable','reagentc /disable'],tip:'Zeigt ob WinRE aktiviert ist und wo es liegt. /enable aktiviert WinRE fuer F8-Bootoptionen.'},
  {name:'winrm',cat:'system',typ:'cmd',short:'Windows Remote Management konfigurieren.',syntax:'winrm [quickconfig|get|set|enumerate] [config|winrm/*]',examples:['winrm quickconfig','winrm get winrm/config','winrm set winrm/config/client @{TrustedHosts="*"}','winrm enumerate winrm/config/listener'],tip:'quickconfig aktiviert WinRM einmalig. TrustedHosts="*" erlaubt alle Hosts (nur in sicheren Netzen!).'},
  {name:'msdt',cat:'system',typ:'cmd',short:'Microsoft Diagnoseprogramme starten.',syntax:'msdt /id [DiagnoseID]',examples:['msdt /id NetworkDiagnosticsWeb','msdt /id PrinterDiagnostic','msdt /id WindowsUpdateDiagnostic'],tip:'IDs: NetworkDiagnosticsWeb, PrinterDiagnostic, WindowsUpdateDiagnostic, AudioPlaybackDiagnostic. Startet automatische Problemloesung.'},
  {name:'psr.exe',cat:'system',typ:'cmd',short:'Problem Steps Recorder — Schritte aufzeichnen fuer Fehlerbericht.',syntax:'psr [/start] [/stop] [/output Datei] [/maxsc N]',examples:['psr /start /output C:\\bericht.zip /maxsc 50','psr /stop'],tip:'Zeichnet Klicks und Screenshots auf. Ausgabe als ZIP mit MHTML-Datei. Ideal fuer Support-Berichte.'},
  {name:'slmgr',cat:'system',typ:'cmd',short:'Windows-Aktivierung und Lizenz verwalten.',syntax:'slmgr [/xpr|/dli|/dlv|/ato|/ipk KEY|/cpky|/upk]',examples:['slmgr /xpr','slmgr /dli','slmgr /ato','slmgr /ipk XXXXX-XXXXX-XXXXX-XXXXX-XXXXX','slmgr /cpky'],tip:'/xpr zeigt Ablaufdatum. /dli Lizenzinfo. /ato aktiviert online. /ipk neuen Key eingeben. /cpky Key aus Registry entfernen.'},
  {name:'winsat',cat:'system',typ:'cmd',short:'Windows System Assessment Tool — Hardware-Leistung messen.',syntax:'winsat [formal|disk|cpu|mem|d3d|dwm] [-drive X]',examples:['winsat formal','winsat disk -drive C','winsat cpu','winsat mem'],tip:'formal fuehrt alle Tests aus (dauert Minuten). Ergebnisse in %windir%\\Performance\\WinSAT\\DataStore.'},
  {name:'mdsched',cat:'system',typ:'cmd',short:'Windows-Speicherdiagnose — RAM auf Fehler pruefen.',syntax:'mdsched',examples:['mdsched'],tip:'Oeffnet Speicherdiagnose-Dialog. Test findet beim naechsten Neustart statt. Ergebnis in Ereignisanzeige (EventID 1201).'},
  {name:'verifier',cat:'system',typ:'cmd',short:'Treiberueberpruefer — fehlerhafte Treiber finden (BSOD-Diagnose).',syntax:'verifier [/standard] [/all] [/reset] [/query]',examples:['verifier /standard /all','verifier /reset','verifier /query','verifier /bootflags 0x9'],tip:'Vorsicht: kann BSODs ausloesen! /reset deaktiviert alle Pruefungen. Nur fuer Treiberdiagnose einsetzen.'},
  {name:'driverquery',cat:'system',typ:'cmd',short:'Alle installierten Treiber auflisten.',syntax:'driverquery [/fo TABLE|LIST|CSV] [/v] [/si] [/s Computer]',examples:['driverquery','driverquery /fo CSV > treiber.csv','driverquery /si','driverquery /v /fo LIST | more'],tip:'/si zeigt nur signierte Treiber. /v zeigt ausfuehrliche Infos. Remote: /s Computername.'},
  {name:'pnputil',cat:'system',typ:'cmd',short:'PnP-Treiber hinzufuegen, entfernen und auflisten.',syntax:'pnputil [/add-driver|/delete-driver|/enum-drivers] [INF-Datei]',examples:['pnputil /enum-drivers','pnputil /add-driver C:\\Treiber\\treiber.inf /install','pnputil /delete-driver oem5.inf /uninstall /force'],tip:'/enum-drivers listet alle installierten OEM-Treiber. /add-driver installiert aus INF-Datei.'},
  {name:'devcon',cat:'system',typ:'cmd',short:'Geraetemanager per Kommandozeile (Windows Driver Kit).',syntax:'devcon [status|enable|disable|remove|install] [Geraete-ID]',examples:['devcon status *','devcon disable "USB\\VID_04E8*"','devcon enable @"PCI\\VEN_8086*"','devcon remove @devnode'],tip:'Nicht standardmaessig enthalten — aus dem WDK oder Sysinternals. Maechtiger als Geraete-Manager fuer Automatisierung.'},
  {name:'powercfg /energy',cat:'system',typ:'cmd',short:'Energie-Effizienz-Bericht erstellen.',syntax:'powercfg /energy [/output Datei] [/duration Sekunden]',examples:['powercfg /energy','powercfg /energy /output C:\\energiebericht.html /duration 30'],tip:'Analysiert 60 Sekunden (oder /duration) und erstellt detaillierten HTML-Bericht ueber Energieprobleme.'},
  {name:'powercfg /batteryreport',cat:'system',typ:'cmd',short:'Akkubericht erstellen (Notebooks).',syntax:'powercfg /batteryreport [/output Datei]',examples:['powercfg /batteryreport','powercfg /batteryreport /output C:\\Akkubericht.html'],tip:'Erstellt HTML-Bericht mit Akkukapazitaet (Design vs. aktuell), Ladezyklen und Nutzungshistorie.'},
  {name:'powercfg /sleepstudy',cat:'system',typ:'cmd',short:'Energieverbrauch im Ruhezustand analysieren.',syntax:'powercfg /sleepstudy [/output Datei]',examples:['powercfg /sleepstudy','powercfg /sleepstudy /output C:\\sleepstudy.html'],tip:'Zeigt was den PC im Schlaf aufgeweckt hat und welche Komponenten Energie verbrauchen.'},
  {name:'wusa',cat:'system',typ:'cmd',short:'Windows Update Standalone Installer — MSU-Pakete installieren.',syntax:'wusa [MSU-Datei] [/quiet] [/norestart] [/uninstall /kb:NNNNN]',examples:['wusa C:\\Update.msu /quiet /norestart','wusa /uninstall /kb:5012345 /quiet /norestart'],tip:'/quiet keine Dialoge. /norestart kein automatischer Neustart. /uninstall mit KB-Nummer deinstalliert Patch.'},
  {name:'Get-WindowsUpdate',cat:'system',typ:'ps',short:'Windows Updates per PowerShell pruefen und installieren (PSWindowsUpdate-Modul).',syntax:'Get-WindowsUpdate  |  Install-WindowsUpdate [-AcceptAll] [-AutoReboot]',examples:['Install-Module PSWindowsUpdate','Get-WindowsUpdate','Install-WindowsUpdate -AcceptAll -AutoReboot','Get-WUHistory | Select -First 20'],tip:'Modul installieren: Install-Module PSWindowsUpdate. Get-WUHistory zeigt Update-Historie.'},
  {name:'Get-HotFix',cat:'system',typ:'ps',short:'Installierte Windows-Hotfixes und Updates anzeigen.',syntax:'Get-HotFix [-Id KB123456] [-ComputerName PC]',examples:['Get-HotFix','Get-HotFix | Sort InstalledOn -Descending | Select -First 10','Get-HotFix -Id KB5012345','Get-HotFix -ComputerName PC02'],tip:'Zeigt alle installierten Patches. Neueste zuerst: Sort InstalledOn -Descending. Remote-Abfrage moeglich.'},
  {name:'Get-ComputerInfo',cat:'system',typ:'ps',short:'Umfassende Systeminformationen als strukturiertes Objekt.',syntax:'Get-ComputerInfo [-Property Feld]',examples:['Get-ComputerInfo','Get-ComputerInfo -Property CsName,OsName,OsVersion,CsTotalPhysicalMemory','(Get-ComputerInfo).BiosVersion'],tip:'Modernerer Ersatz fuer systeminfo. Gibt strukturiertes Objekt zurueck — gut filterbar.'},
  {name:'Get-EventLog -List',cat:'system',typ:'ps',short:'Alle verfuegbaren Ereignisprotokolle auflisten.',syntax:'Get-EventLog -List',examples:['Get-EventLog -List','Get-EventLog -List | Sort Log'],tip:'Zeigt alle verfuegbaren Protokolle mit Groesse und Eintragsanzahl. Dann Get-EventLog -LogName [Name] fuer Eintraege.'},
  {name:'Clear-EventLog',cat:'system',typ:'ps',short:'Ereignisprotokoll leeren.',syntax:'Clear-EventLog -LogName [Log] [-ComputerName PC]',examples:['Clear-EventLog -LogName Application','Clear-EventLog -LogName Security,System','Clear-EventLog -LogName System -ComputerName PC02'],tip:'Unwiderruflich — alle Eintraege werden geloescht. Vorher Backup: wevtutil epl System C:\\System.evtx'},
  {name:'Restart-Computer',cat:'system',typ:'ps',short:'Computer neustarten — lokal oder remote.',syntax:'Restart-Computer [-ComputerName PC] [-Force] [-Wait] [-Delay N]',examples:['Restart-Computer','Restart-Computer -Force','Restart-Computer -ComputerName PC02 -Force','Restart-Computer -ComputerName PC02 -Wait -For WinRM'],tip:'-Force schliesst Anwendungen ohne Rueckfrage. -Wait -For WinRM wartet bis PC nach Neustart wieder erreichbar ist.'},
  {name:'Stop-Computer',cat:'system',typ:'ps',short:'Computer herunterfahren — lokal oder remote.',syntax:'Stop-Computer [-ComputerName PC] [-Force]',examples:['Stop-Computer -Force','Stop-Computer -ComputerName PC02,PC03 -Force'],tip:'Remote-Shutdown mehrerer PCs gleichzeitig moeglich. Entspricht shutdown /s /t 0.'},

  // PowerShell+ Erweiterungen
  {name:'Get-Command',cat:'powershell',typ:'ps',short:'Verfuegbare Befehle suchen — Cmdlets, Funktionen, Aliase.',syntax:'Get-Command [Name] [-Module Modul] [-CommandType Cmdlet|Function|Alias]',examples:['Get-Command','Get-Command Get-*','Get-Command -Module ActiveDirectory','Get-Command -CommandType Alias'],tip:'Alias: gcm. Get-Command *AD* findet alle AD-Befehle. -Syntax zeigt Parametersyntax.'},
  {name:'Get-Help',cat:'powershell',typ:'ps',short:'Hilfe zu jedem PowerShell-Befehl anzeigen.',syntax:'Get-Help [Befehl] [-Full] [-Examples] [-Online] [-Parameter Name]',examples:['Get-Help Get-Process','Get-Help Get-Process -Examples','Get-Help Get-Process -Full','Get-Help Get-Process -Parameter Name'],tip:'-Online oeffnet Browser mit aktueller Dokumentation. Update-Help laedt aktuellste Hilfe herunter.'},
  {name:'Get-Member',cat:'powershell',typ:'ps',short:'Alle Eigenschaften und Methoden eines Objekts anzeigen.',syntax:'[Objekt] | Get-Member [-MemberType Property|Method|Event]',examples:['Get-Process | Get-Member','Get-Date | Get-Member -MemberType Method','"Hallo" | Get-Member'],tip:'Alias: gm. Unverzichtbar um herauszufinden welche Felder und Methoden ein Objekt hat.'},
  {name:'Get-Module',cat:'powershell',typ:'ps',short:'Geladene oder verfuegbare PowerShell-Module anzeigen.',syntax:'Get-Module [-ListAvailable] [-Name Name]',examples:['Get-Module','Get-Module -ListAvailable','Get-Module -Name ActiveDirectory -ListAvailable','Get-Module -ListAvailable | Where Name -like "*RSAT*"'],tip:'-ListAvailable zeigt alle installierten Module. Import-Module laedt ein Modul in die Session.'},
  {name:'Find-Module',cat:'powershell',typ:'ps',short:'Module im PowerShell Gallery suchen.',syntax:'Find-Module [Name] [-Tag Tag] [-Command Befehl]',examples:['Find-Module PSWindowsUpdate','Find-Module -Tag Networking','Find-Module -Command Get-PublicIPAddress'],tip:'Sucht in der PowerShell Gallery (gallery.powershellgallery.com). Install-Module [Name] zum Installieren.'},
  {name:'Install-Module',cat:'powershell',typ:'ps',short:'PowerShell-Modul aus der Gallery installieren.',syntax:'Install-Module [Name] [-Scope CurrentUser|AllUsers] [-Force]',examples:['Install-Module PSWindowsUpdate -Scope CurrentUser','Install-Module Az -AllowClobber','Install-Module ImportExcel -Scope CurrentUser'],tip:'-Scope CurrentUser kein Admin noetig. Update-Module [Name] fuer Updates. Uninstall-Module zum Entfernen.'},
  {name:'New-Object',cat:'powershell',typ:'ps',short:'.NET-Objekte und COM-Objekte erstellen.',syntax:'New-Object System.Net.WebClient  |  New-Object -ComObject Excel.Application',examples:['$wc = New-Object System.Net.WebClient','$wc.DownloadFile("https://example.com/file.zip", "C:\\file.zip")','$acl = New-Object System.Security.AccessControl.FileSystemAccessRule("User","Read","Allow")','$excel = New-Object -ComObject Excel.Application'],tip:'Gibt Zugriff auf volle .NET und COM-Bibliothek. Sehr maechtig fuer Automatisierung.'},
  {name:'Add-Type',cat:'powershell',typ:'ps',short:'C#/.NET-Code in PowerShell kompilieren und verwenden.',syntax:'Add-Type -TypeDefinition [C#-Code]  |  Add-Type -AssemblyName [Assembly]',examples:['Add-Type -AssemblyName System.Windows.Forms','[System.Windows.Forms.MessageBox]::Show("Hallo!")','Add-Type -AssemblyName PresentationFramework','[System.Windows.MessageBox]::Show("WPF Dialog")'],tip:'Laedt .NET-Assemblies. Grundlage fuer GUI-Dialoge in PowerShell-Skripten.'},
  {name:'[System.Net.Dns]::GetHostEntry',cat:'powershell',typ:'ps',short:'DNS-Aufloesung per .NET direkt in PowerShell.',syntax:'[System.Net.Dns]::GetHostEntry([String] hostname)',examples:['[System.Net.Dns]::GetHostEntry("google.com")','[System.Net.Dns]::GetHostEntry("google.com").AddressList','[System.Net.Dns]::GetHostByName($env:COMPUTERNAME).HostName'],tip:'Schnelle DNS-Aufloesung ohne Cmdlet-Overhead. .AddressList gibt alle IP-Adressen zurueck.'},
  {name:'$PSVersionTable',cat:'powershell',typ:'ps',short:'PowerShell-Version und Umgebungsinformationen anzeigen.',syntax:'$PSVersionTable',examples:['$PSVersionTable','$PSVersionTable.PSVersion','$PSVersionTable.PSVersion.Major'],tip:'Zeigt Version, Edition (Core/Desktop), OS und CLR-Version. Essentiell fuer kompatibilitaetspruefung in Skripten.'},
  {name:'$env',cat:'powershell',typ:'ps',short:'Umgebungsvariablen lesen und setzen.',syntax:'$env:VARIABLENNAME  |  $env:VAR = "Wert"',examples:['$env:USERNAME','$env:COMPUTERNAME','$env:PATH','$env:TEMP','$env:USERPROFILE'],tip:'Alle Umgebungsvariablen: Get-ChildItem env: Setzen: $env:MYVAR="Wert" (nur Session). Dauerhaft: setx.'},
  {name:'Try-Catch-Finally',cat:'powershell',typ:'ps',short:'Fehlerbehandlung in PowerShell-Skripten.',syntax:'try { Befehl } catch { Fehlerbehandlung } finally { Aufraeumen }',examples:['try { Get-Item "C:\\nichtda.txt" -ErrorAction Stop } catch { Write-Host "Fehler: $_" }','try { ... } catch [System.IO.IOException] { "IO Fehler" } catch { "Anderer Fehler" } finally { "Immer ausgefuehrt" }'],tip:'-ErrorAction Stop noetig damit nicht-terminierende Fehler gefangen werden. $_ im Catch = Fehlerobjekt.'},
