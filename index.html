  {name:'param()',cat:'powershell',typ:'ps',short:'Parameter fuer PowerShell-Skripte definieren.',syntax:'param([Type]$Name = Default, [switch]$Flag)',examples:['param([string]$Server = "localhost", [int]$Port = 80, [switch]$Verbose)','param([Parameter(Mandatory=$true)][string]$Name)'],tip:'Mandatory=$true erzwingt Eingabe. [ValidateSet("A","B")] begrenzt Werte. CmdletBinding() fuer -WhatIf/-Confirm.'},
  {name:'#Requires',cat:'powershell',typ:'ps',short:'Skript-Anforderungen definieren (Version, Admin, Module).',syntax:'#Requires -Version N  |  -RunAsAdministrator  |  -Modules Name',examples:['#Requires -Version 5.1','#Requires -RunAsAdministrator','#Requires -Modules ActiveDirectory','#Requires -Version 7.0 -RunAsAdministrator'],tip:'Skript bricht ab wenn Anforderungen nicht erfuellt. Muss am Anfang des Skripts stehen.'},
  {name:'Invoke-Expression',cat:'powershell',typ:'ps',short:'String als PowerShell-Befehl ausfuehren.',syntax:'Invoke-Expression [String]',examples:['Invoke-Expression "Get-Process"','$cmd = "Get-Service wuauserv"; Invoke-Expression $cmd'],tip:'Alias: iex. Vorsicht: Sicherheitsrisiko bei Benutzereingaben! Nur mit vertrauenswuerdigen Strings verwenden.'},
  {name:'Start-Transcript',cat:'powershell',typ:'ps',short:'PowerShell-Sitzung protokollieren (alles aufzeichnen).',syntax:'Start-Transcript [Datei] [-Append] [-NoClobber]',examples:['Start-Transcript C:\\PS_Log.txt','Start-Transcript C:\\log.txt -Append','Stop-Transcript'],tip:'Zeichnet alle Ein- und Ausgaben auf. Stop-Transcript beendet Aufzeichnung. Ideal fuer Dokumentation langer Sitzungen.'},
  {name:'Get-Random',cat:'powershell',typ:'ps',short:'Zufaellige Zahlen oder Elemente aus einer Sammlung.',syntax:'Get-Random [-Minimum N] [-Maximum N] [-Count N] [-InputObject]',examples:['Get-Random -Minimum 1 -Maximum 100','Get-Random -Count 5 -InputObject (1..50)','Get-Process | Get-Random -Count 3'],tip:'-Count aus einer Liste: gibt N zufaellige Elemente. Gut fuer Testdaten und Sampling.'},
  {name:'tasklist',cat:'prozesse',typ:'both',short:'Listet alle laufenden Prozesse mit PID und Speicher.',syntax:'tasklist [/FI Filter] [/FO FORMAT] [/V]',examples:['tasklist','tasklist /FI "IMAGENAME eq chrome.exe"','tasklist /FO CSV'],tip:'Kann nach Name, PID, Status filtern. Ausgabe als CSV exportierbar.'},
  {name:'taskkill',cat:'prozesse',typ:'both',short:'Beendet einen Prozess ueber PID oder Namen.',syntax:'taskkill [/PID pid] [/IM Name] [/F] [/T]',examples:['taskkill /IM notepad.exe','taskkill /PID 1234 /F','taskkill /IM chrome.exe /F /T'],tip:'/F erzwingt das Beenden. /T schliesst auch Kindprozesse.'},
  {name:'start',cat:'prozesse',typ:'cmd',short:'Startet ein Programm oder oeffnet eine Datei/URL.',syntax:'start [Titel] [Programm] [Parameter]',examples:['start notepad.exe','start chrome.exe https://google.com','start /wait setup.exe'],tip:'/wait wartet bis das gestartete Programm beendet ist.'},
  {name:'wmic',cat:'prozesse',typ:'cmd',short:'WMI-Befehlszeile - Systeminformationen abfragen.',syntax:'wmic [Klasse] [get|list] [Eigenschaft]',examples:['wmic cpu get name','wmic process list brief','wmic bios get version'],tip:'Veraltet in neuen Windows-Versionen. Ersatz: PowerShell Get-CimInstance.'},
  {name:'timeout',cat:'prozesse',typ:'cmd',short:'Wartet eine bestimmte Anzahl Sekunden (Pause in Skripts).',syntax:'timeout [/T] Sekunden [/NOBREAK]',examples:['timeout /T 5','timeout /T 10 /NOBREAK'],tip:'/NOBREAK verhindert das Abbrechen per Taste. Nuetzlich in .bat-Dateien.'},
  {name:'pskill',cat:'prozesse',typ:'cmd',short:'Prozess per Name oder PID beenden (Sysinternals).',syntax:'pskill [-t] [PID|Name] [\\\\Computer]',examples:['pskill notepad','pskill -t 4512','pskill \\\\PC02 chrome'],tip:'Teil der Sysinternals Suite. -t beendet auch den gesamten Prozessbaum. Remote-PCs moeglich.'},
  {name:'pslist',cat:'prozesse',typ:'cmd',short:'Detaillierte Prozessliste inkl. CPU-Zeit (Sysinternals).',syntax:'pslist [\\\\Computer] [-t] [-m] [-x]',examples:['pslist','pslist -t','pslist -m','pslist \\\\SERVER01'],tip:'-t zeigt Prozessbaum. -m zeigt Speicherdetails. -x zeigt alle Details. Remote-Abfrage moeglich.'},
  {name:'handle',cat:'prozesse',typ:'cmd',short:'Zeigt offene Datei-Handles eines Prozesses (Sysinternals).',syntax:'handle [Name|PID] [-p Prozess]',examples:['handle','handle svchost','handle -p 1234','handle C:\\Windows\\System32\\config'],tip:'Zeigt welcher Prozess eine Datei oder Registry-Key sperrt. Als Admin ausfuehren.'},
  {name:'procdump',cat:'prozesse',typ:'cmd',short:'Erstellt Prozess-Dump fuer Crash-Analyse (Sysinternals).',syntax:'procdump [-ma] [PID|Name] [Ausgabedatei]',examples:['procdump -ma 1234 dump.dmp','procdump -ma notepad','procdump -e notepad crash.dmp'],tip:'-ma erstellt vollstaendigen Speicherdump. -e haengt bei Crash-Exceptions. Dump mit WinDbg analysieren.'},
  {name:'schtasks /create',cat:'prozesse',typ:'cmd',short:'Geplante Aufgabe per Kommandozeile erstellen.',syntax:'schtasks /create /tn [Name] /tr [Programm] /sc [Intervall] /st [Zeit]',examples:['schtasks /create /tn "Backup" /tr "C:\\backup.bat" /sc daily /st 02:00','schtasks /create /tn "Cleanup" /tr cleanmgr /sc weekly /d MON /st 03:00'],tip:'/sc: MINUTE, HOURLY, DAILY, WEEKLY, MONTHLY, ONSTART, ONLOGON. /ru SYSTEM fuer Systemkonto.'},
  {name:'schtasks /query',cat:'prozesse',typ:'cmd',short:'Alle geplante Aufgaben auflisten.',syntax:'schtasks /query [/fo LIST|TABLE|CSV] [/tn Name] [/v]',examples:['schtasks /query /fo LIST','schtasks /query /fo TABLE /nh','schtasks /query /tn "Backup" /v'],tip:'/v zeigt ausfuehrliche Details. /nh entfernt Header. Remote: /s COMPUTERNAME'},
  {name:'schtasks /run',cat:'prozesse',typ:'cmd',short:'Geplante Aufgabe sofort ausfuehren.',syntax:'schtasks /run /tn [Aufgabenname]',examples:['schtasks /run /tn "Backup"','schtasks /run /tn "\\Microsoft\\Windows\\Defrag\\ScheduledDefrag"'],tip:'Fuehrt die Aufgabe unabhaengig vom Zeitplan sofort aus. Nuetzlich zum Testen.'},
  {name:'schtasks /delete',cat:'prozesse',typ:'cmd',short:'Geplante Aufgabe loeschen.',syntax:'schtasks /delete /tn [Name] [/f]',examples:['schtasks /delete /tn "Backup" /f','schtasks /delete /tn * /f'],tip:'/f unterdrueckt Rueckfrage. /tn * loescht ALLE Aufgaben — Vorsicht!'},
  {name:'pssuspend',cat:'prozesse',typ:'cmd',short:'Prozess anhalten und fortsetzen (Sysinternals).',syntax:'pssuspend [PID|Name]  |  pssuspend -r [PID|Name]',examples:['pssuspend notepad','pssuspend -r notepad'],tip:'-r setzt den Prozess fort. Haelt CPU-Auslastung eines Prozesses an ohne ihn zu beenden.'},
  {name:'logman',cat:'prozesse',typ:'cmd',short:'Performance-Datensammlung und Leistungsprotokoll verwalten.',syntax:'logman [create|start|stop|delete] [Name] [Optionen]',examples:['logman query','logman start "MeinLog"','logman stop "MeinLog"','logman create counter "CPU" -c "\\Processor(_Total)\\% Processor Time" -si 5'],tip:'Erstellt Performance-Logs ohne GUI. -si = Stichprobenintervall in Sekunden.'},
  {name:'typeperf',cat:'prozesse',typ:'cmd',short:'Leistungsindikatoren in Echtzeit in der Konsole anzeigen.',syntax:'typeperf "\\Indikator" [-si Sekunden] [-sc Anzahl]',examples:['typeperf "\\Processor(_Total)\\% Processor Time"','typeperf "\\Memory\\Available MBytes" -si 2 -sc 10','typeperf "\\PhysicalDisk(_Total)\\Disk Reads/sec" -si 1'],tip:'-si = Intervall. -sc = Anzahl Messungen. Wert in Datei: -o ausgabe.csv'},
  {name:'perfmon /report',cat:'prozesse',typ:'cmd',short:'Systemdiagnose-Bericht automatisch erstellen.',syntax:'perfmon /report',examples:['perfmon /report'],tip:'Erstellt automatisch einen 60-Sekunden-Diagnosebericht mit CPU, RAM, Disk und Netzwerk-Analyse.'},
  {name:'wmic process call create',cat:'prozesse',typ:'cmd',short:'Prozess per WMI starten (auch remote).',syntax:'wmic process call create "[Programm]"',examples:['wmic process call create "notepad.exe"','wmic /node:PC02 process call create "cmd.exe"'],tip:'Remote-Prozessstart moeglich mit /node:Computer. Nuetzlich wenn andere Methoden versagen.'},
  {name:'Get-Job',cat:'prozesse',typ:'ps',short:'PowerShell Hintergrund-Jobs anzeigen und verwalten.',syntax:'Get-Job | [Receive-Job] [Remove-Job] [Stop-Job]',examples:['Get-Job','Get-Job | Receive-Job','$j = Start-Job { ping google.com }; Wait-Job $j; Receive-Job $j'],tip:'Start-Job startet Hintergrundjob. Receive-Job holt Ergebnis. Remove-Job raumt auf.'},
  {name:'Start-Process',cat:'prozesse',typ:'ps',short:'Prozess starten mit erw. Optionen (Fenster, Rechte, Warten).',syntax:'Start-Process [Programm] [-ArgumentList] [-Verb RunAs] [-Wait] [-WindowStyle Hidden]',examples:['Start-Process notepad','Start-Process cmd -Verb RunAs','Start-Process msiexec -ArgumentList "/i setup.msi /quiet" -Wait'],tip:'-Verb RunAs = als Admin. -Wait blockiert bis Prozess endet. -WindowStyle Hidden = kein Fenster.'},
  {name:'Wait-Process',cat:'prozesse',typ:'ps',short:'Wartet bis ein Prozess beendet wird.',syntax:'Wait-Process [-Name Name] [-Id PID] [-Timeout Sekunden]',examples:['Wait-Process -Name notepad','Wait-Process -Id 1234 -Timeout 30','Start-Process setup.exe; Wait-Process setup'],tip:'-Timeout verhindert ewiges Warten. Gibt Fehler zurueck wenn Timeout ueberschritten.'},
  {name:'Get-ScheduledTask',cat:'prozesse',typ:'ps',short:'Geplante Aufgaben per PowerShell anzeigen.',syntax:'Get-ScheduledTask [-TaskName Name] [-TaskPath Pfad]',examples:['Get-ScheduledTask','Get-ScheduledTask -TaskName "Backup"','Get-ScheduledTask | Where State -eq Running'],tip:'Mit Start-ScheduledTask, Stop-ScheduledTask, Enable/Disable-ScheduledTask kombinieren.'},
  {name:'Register-ScheduledTask',cat:'prozesse',typ:'ps',short:'Neue geplante Aufgabe per PowerShell erstellen.',syntax:'Register-ScheduledTask -TaskName [Name] -Trigger [Trigger] -Action [Action]',examples:['$action = New-ScheduledTaskAction -Execute "powershell.exe" -Argument "-File C:\\script.ps1"','$trigger = New-ScheduledTaskTrigger -Daily -At 02:00','Register-ScheduledTask -TaskName "NachtScript" -Action $action -Trigger $trigger -RunLevel Highest'],tip:'New-ScheduledTaskTrigger: -AtStartup, -AtLogOn, -Daily, -Weekly. -RunLevel Highest = Admin.'},

  // ── BENUTZER ERWEITERT ──
  {name:'net user',cat:'benutzer',typ:'cmd',short:'Benutzerkonten anzeigen, erstellen oder aendern.',syntax:'net user [Benutzername] [Passwort|*] [/add|/delete]',examples:['net user','net user Max * /add','net user Max /delete'],tip:'net user ohne Parameter listet alle Konten. * fragt Passwort interaktiv ab.'},
  {name:'net localgroup',cat:'benutzer',typ:'cmd',short:'Lokale Gruppen und Mitgliedschaften verwalten.',syntax:'net localgroup [Gruppe] [Benutzer] [/add|/delete]',examples:['net localgroup','net localgroup Administratoren Max /add'],tip:'Zeigt Mitglieder einer Gruppe oder fuegt Benutzer hinzu/entfernt sie.'},
  {name:'whoami',cat:'benutzer',typ:'both',short:'Gibt den aktuellen Benutzernamen und Rechte aus.',syntax:'whoami [/all] [/groups] [/priv]',examples:['whoami','whoami /all','whoami /groups'],tip:'/all zeigt SID, Gruppen und Berechtigungen. Nuetzlich zur Rechtepruefung.'},
  {name:'runas',cat:'benutzer',typ:'cmd',short:'Fuehrt ein Programm unter einem anderen Benutzerkonto aus.',syntax:'runas /user:[Domaene\\]Benutzer Programm',examples:['runas /user:Administrator cmd.exe'],tip:'Passwort wird interaktiv abgefragt. Kein Speichern von Passwoertern noetig.'},
  {name:'icacls',cat:'benutzer',typ:'cmd',short:'Zeigt und aendert NTFS-Berechtigungen fuer Dateien/Ordner.',syntax:'icacls [Pfad] [/grant] [/deny] [/remove] [Benutzer:Rechte]',examples:['icacls C:\\Ordner','icacls Datei.txt /grant Max:F','icacls C:\\Test /remove Max'],tip:'F=Vollzugriff, M=Aendern, R=Lesen. Sehr maechtig fuer NTFS-Rechteverwaltung.'},
  {name:'cacls',cat:'benutzer',typ:'cmd',short:'Veraltet: NTFS-Berechtigungen anzeigen/aendern (Ersatz: icacls).',syntax:'cacls [Pfad] [/e] [/g Benutzer:Recht] [/r Benutzer]',examples:['cacls C:\\Ordner','cacls datei.txt /e /g Max:F'],tip:'Veraltet seit Vista. icacls verwenden. Noch in aelteren Skripten zu finden.'},
  {name:'takeown',cat:'benutzer',typ:'cmd',short:'Eigentuemer einer Datei oder eines Ordners uebernehmen.',syntax:'takeown /f [Pfad] [/r] [/d y]',examples:['takeown /f C:\\gesperrt.txt','takeown /f C:\\Ordner /r /d y'],tip:'/r rekursiv fuer Ordner. Nach takeown noch icacls /grant benoetigt um Lesen/Schreiben zu erlauben.'},
  {name:'net accounts',cat:'benutzer',typ:'cmd',short:'Kennwort- und Kontosperrungsrichtlinien anzeigen/setzen.',syntax:'net accounts [/minpwlen:N] [/maxpwage:N] [/lockoutthreshold:N]',examples:['net accounts','net accounts /minpwlen:12','net accounts /lockoutthreshold:5 /lockoutduration:30'],tip:'Zeigt und setzt lokale Kennwortrichtlinien. In Domaene per GPO steuern.'},
  {name:'net session',cat:'benutzer',typ:'cmd',short:'Aktive Netzwerksitzungen (angemeldete Benutzer) anzeigen.',syntax:'net session [\\\\Computer] [/delete]',examples:['net session','net session \\\\PC02','net session /delete'],tip:'/delete trennt alle aktiven Netzwerksitzungen. Nuetzlich bei haengenden Verbindungen.'},
  {name:'quser',cat:'benutzer',typ:'cmd',short:'Angemeldete Benutzer auf lokalem oder Remote-PC anzeigen.',syntax:'quser [Benutzer] [/server:Computer]',examples:['quser','quser /server:RDSERVER01','quser mmustermann'],tip:'Zeigt Sitzungs-ID, Status (Aktiv/Getrennt) und Anmeldezeit. Nuetzlich auf RDP-Servern.'},
  {name:'query session',cat:'benutzer',typ:'cmd',short:'RDP/Terminal-Sitzungen auflisten.',syntax:'query session [/server:Computer]',examples:['query session','query session /server:RDSERVER01'],tip:'Alias: qwinsta. Zeigt alle Sitzungen inkl. Sitzungs-ID fuer logoff-Befehl.'},
  {name:'logoff',cat:'benutzer',typ:'cmd',short:'Benutzersitzung abmelden (lokal oder RDP).',syntax:'logoff [Sitzungs-ID|Name] [/server:Computer]',examples:['logoff 2','logoff mmustermann','logoff 3 /server:RDSERVER01'],tip:'Sitzungs-ID aus quser oder query session ermitteln. logoff ohne Parameter meldet aktuellen Benutzer ab.'},
  {name:'msg',cat:'benutzer',typ:'cmd',short:'Nachricht an angemeldeten Benutzer oder Sitzung senden.',syntax:'msg [Benutzer|Sitzung|*] [/server:Computer] [Nachricht]',examples:['msg * "Server wird in 5 Min. neu gestartet!"','msg mmustermann "Bitte abmelden"','msg /server:PC02 * "Wartung laeuft"'],tip:'Funktioniert nur wenn Empfaenger angemeldet und Messenger-Dienst aktiv (LAN). * = alle Sitzungen.'},
  {name:'wevtutil',cat:'benutzer',typ:'cmd',short:'Windows-Ereignisprotokoll abfragen und verwalten.',syntax:'wevtutil [qe|el|cl|gl] [Protokoll] [/q:XPath-Filter]',examples:['wevtutil qe Security /q:"*[System[EventID=4624]]" /c:10 /f:text','wevtutil qe System /q:"*[System[Level=2]]" /c:20','wevtutil cl Application'],tip:'qe=abfragen, el=auflisten, cl=leeren, gl=Info. Maechtiger als Ereignisanzeige-GUI. /f:xml fuer XML-Ausgabe.'},
  {name:'auditpol',cat:'benutzer',typ:'cmd',short:'Ueberwachungsrichtlinien anzeigen und konfigurieren.',syntax:'auditpol [/get] [/set] [/category:*|Name]',examples:['auditpol /get /category:*','auditpol /set /subcategory:"Logon" /success:enable /failure:enable','auditpol /backup /file:C:\\audit.csv'],tip:'Steuert welche Ereignisse im Sicherheitsprotokoll aufgezeichnet werden. Als Admin!'},
  {name:'ntrights',cat:'benutzer',typ:'cmd',short:'Benutzerrechte per Kommandozeile setzen (Resource Kit).',syntax:'ntrights +r SeServiceLogonRight -u [Benutzer]',examples:['ntrights +r SeServiceLogonRight -u svc-backup','ntrights +r SeBatchLogonRight -u Batch-User'],tip:'Aus dem Windows Resource Kit. Alternativ: secpol.msc oder PowerShell Grant-Privilege.'},
  {name:'psloggedon',cat:'benutzer',typ:'cmd',short:'Lokal und ueber Netzwerk angemeldete Benutzer (Sysinternals).',syntax:'psloggedon [\\\\Computer]',examples:['psloggedon','psloggedon \\\\PC02','psloggedon \\\\192.168.1.10'],tip:'Zeigt auch Benutzer die ueber Netzwerkfreigaben verbunden sind. Remote-Abfrage moeglich.'},
  {name:'psloglist',cat:'benutzer',typ:'cmd',short:'Ereignisprotokoll per Kommandozeile auslesen (Sysinternals).',syntax:'psloglist [\\\\Computer] [-e EventID] [-l Log]',examples:['psloglist -l Security -e 4624','psloglist \\\\PC02 -l Application','psloglist -l System -e 7036'],tip:'Schnelle Protokollauswertung ohne GUI. Remote-Abfrage moeglich. 4624=Anmeldung, 4625=Fehlgeschlagen.'},
  {name:'Get-LocalUser',cat:'benutzer',typ:'ps',short:'Lokale Benutzerkonten anzeigen.',syntax:'Get-LocalUser [[-Name] Name]',examples:['Get-LocalUser','Get-LocalUser -Name "Administrator"','Get-LocalUser | Where Enabled -eq $true'],tip:'Einfacher Ersatz fuer net user in PowerShell. Mit Set-LocalUser, New-LocalUser, Remove-LocalUser kombinieren.'},
  {name:'New-LocalUser',cat:'benutzer',typ:'ps',short:'Neues lokales Benutzerkonto erstellen.',syntax:'New-LocalUser -Name [Name] -Password [SecureString] -FullName [Name]',examples:['$pw = ConvertTo-SecureString "Pass1!" -AsPlainText -Force','New-LocalUser -Name "TestUser" -Password $pw -FullName "Test Benutzer" -Description "Testkonto"'],tip:'Konto ist nach Erstellung aktiviert. -AccountNeverExpires und -PasswordNeverExpires als weitere Optionen.'},
  {name:'Set-LocalUser',cat:'benutzer',typ:'ps',short:'Lokales Benutzerkonto aendern.',syntax:'Set-LocalUser -Name [Name] [-Password] [-FullName] [-Description]',examples:['Set-LocalUser -Name "Max" -Description "IT-Admin"','Set-LocalUser -Name "Max" -Password (ConvertTo-SecureString "NeuP@ss!" -AsPlainText -Force)'],tip:'Aendert Eigenschaften ohne das Konto zu loeschen. Enable-LocalUser / Disable-LocalUser zum Aktivieren.'},
  {name:'Get-LocalGroup',cat:'benutzer',typ:'ps',short:'Lokale Gruppen anzeigen.',syntax:'Get-LocalGroup [[-Name] Name]',examples:['Get-LocalGroup','Get-LocalGroup -Name "Administrators"','Get-LocalGroupMember -Group "Administrators"'],tip:'Get-LocalGroupMember zeigt Mitglieder. Add-LocalGroupMember / Remove-LocalGroupMember fuer Verwaltung.'},
  {name:'Add-LocalGroupMember',cat:'benutzer',typ:'ps',short:'Benutzer zu lokaler Gruppe hinzufuegen.',syntax:'Add-LocalGroupMember -Group [Gruppe] -Member [Benutzer]',examples:['Add-LocalGroupMember -Group "Administrators" -Member "Max"','Add-LocalGroupMember -Group "Remote Desktop Users" -Member "mmustermann"'],tip:'Kann auch Domaenenbenutzer zu lokalen Gruppen hinzufuegen: -Member "DOMAIN\\Benutzer"'},
  {name:'Get-Acl',cat:'benutzer',typ:'ps',short:'NTFS-Berechtigungen einer Datei oder eines Ordners lesen.',syntax:'Get-Acl [Pfad]  |  (Get-Acl).Access',examples:['Get-Acl C:\\Ordner','(Get-Acl C:\\Wichtig).Access | Format-List','Get-Acl C:\\Test | Set-Acl C:\\Test2'],tip:'Gibt ACL-Objekt zurueck. .Access zeigt alle ACE-Eintraege. Set-Acl uebertraegt Rechte auf anderes Objekt.'},
  {name:'Set-Acl',cat:'benutzer',typ:'ps',short:'NTFS-Berechtigungen einer Datei oder eines Ordners setzen.',syntax:'$acl = Get-Acl [Pfad]; $acl.SetAccessRule(...); Set-Acl [Pfad] $acl',examples:['$acl = Get-Acl "C:\\Ordner"','$rule = New-Object System.Security.AccessControl.FileSystemAccessRule("Max","FullControl","Allow")','$acl.SetAccessRule($rule)','Set-Acl "C:\\Ordner" $acl'],tip:'Kombiniert mit Get-Acl. New-Object FileSystemAccessRule definiert die Berechtigung.'},
  {name:'Get-WinEvent',cat:'benutzer',typ:'ps',short:'Windows-Ereignisprotokolle abfragen — moderner Ersatz fuer Get-EventLog.',syntax:'Get-WinEvent [-LogName Log] [-FilterHashtable @{...}] [-MaxEvents N]',examples:['Get-WinEvent -LogName Security -MaxEvents 20','Get-WinEvent -FilterHashtable @{LogName="Security"; Id=4624} -MaxEvents 10','Get-WinEvent -FilterHashtable @{LogName="System"; Level=2} | Select TimeCreated,Message'],tip:'Level: 1=Kritisch, 2=Fehler, 3=Warnung, 4=Information. Id=4624 Anmeldung, 4625 Fehlversuch, 4740 Gesperrt.'},
  {name:'Get-EventLog',cat:'benutzer',typ:'ps',short:'Ereignisprotokoll abfragen (aelterer Befehl, noch verfuegbar).',syntax:'Get-EventLog -LogName [Log] [-Newest N] [-EntryType Error|Warning] [-Source Name]',examples:['Get-EventLog -LogName System -Newest 50','Get-EventLog -LogName Application -EntryType Error -Newest 20','Get-EventLog -LogName Security -InstanceId 4624 -Newest 10'],tip:'Veraltet — Get-WinEvent bevorzugen. Funktioniert aber noch und hat einfachere Syntax.'},

  // ── PROZESSE WEITERES ──
  {name:'pmon',cat:'prozesse',typ:'cmd',short:'Einfacher Prozessmonitor in der Konsole (Resource Kit).',syntax:'pmon',examples:['pmon'],tip:'Aehnlich wie top in Linux. Zeigt CPU und Speicher aller Prozesse in Echtzeit. Aus dem Windows Resource Kit.'},
  {name:'tskill',cat:'prozesse',typ:'cmd',short:'Prozess per Name oder ID beenden (Terminal Services).',syntax:'tskill [PID|Prozessname] [/server:Computer] [/a]',examples:['tskill notepad','tskill 1234','tskill chrome /a'],tip:'/a beendet alle Instanzen. Fuer RDP-Server: /server:SERVERNAME. Einfacher als taskkill.'},
  {name:'tlist',cat:'prozesse',typ:'cmd',short:'Prozessliste mit Fenstertiteln (Resource Kit).',syntax:'tlist [-t] [-m] [Muster]',examples:['tlist','tlist -t','tlist note*'],tip:'-t zeigt Prozessbaum. -m zeigt geladene Module (DLLs). Nützlich um Fenstertitel zu finden.'},
  {name:'kill',cat:'prozesse',typ:'cmd',short:'Prozess per PID beenden (Resource Kit / Sysinternals).',syntax:'kill [PID|Prozessname]',examples:['kill 1234','kill notepad.exe'],tip:'Einfachere Syntax als taskkill. Aus dem Windows Resource Kit. Achtung: nicht auf allen Systemen vorhanden.'},
  {name:'pview',cat:'prozesse',typ:'cmd',short:'Grafischer Prozess-Viewer mit Modul- und Thread-Ansicht.',syntax:'pview',examples:['pview'],tip:'Windows Resource Kit Tool. Zeigt Threads, Module und Handles pro Prozess. Komplement zum Task-Manager.'},
  {name:'openfiles',cat:'prozesse',typ:'cmd',short:'Offene Dateien und Remote-Verbindungen anzeigen.',syntax:'openfiles [/query] [/disconnect] [/local on|off]',examples:['openfiles /query','openfiles /query /fo TABLE','openfiles /disconnect /id *'],tip:'Zeigt von Netzwerkbenutzern geoeffnete Dateien. /local on aktiviert Tracking lokaler Dateien (Neustart noetig).'},
  {name:'handle64',cat:'prozesse',typ:'cmd',short:'64-Bit Handle-Viewer — zeigt Datei-Locks (Sysinternals).',syntax:'handle64 [Suchbegriff] [-p Prozess] [-a]',examples:['handle64 C:\\locked.txt','handle64 -p chrome','handle64 -a | findstr "C:\\Temp"'],tip:'64-Bit-Version von handle.exe. Zeigt wer eine Datei sperrt. Als Admin ausfuehren.'},
  {name:'listdlls',cat:'prozesse',typ:'cmd',short:'Geladene DLLs eines Prozesses anzeigen (Sysinternals).',syntax:'listdlls [Prozessname|PID] [-u] [-v]',examples:['listdlls chrome','listdlls -u','listdlls notepad -v'],tip:'-u zeigt nur unsignierte DLLs (Sicherheitscheck). -v zeigt Versionsinfo. Als Admin fuer alle Prozesse.'},
  {name:'autoruns',cat:'prozesse',typ:'cmd',short:'Alle Autostart-Eintraege auflisten (Sysinternals GUI).',syntax:'autoruns [/accepteula]',examples:['autoruns /accepteula'],tip:'Umfangreichster Autostart-Manager. Zeigt Registry, Scheduler, Dienste, Browser-Extensions. Online-Pruefung moeglich.'},
  {name:'autorunsc',cat:'prozesse',typ:'cmd',short:'Autostart-Eintraege per Kommandozeile (Sysinternals).',syntax:'autorunsc [-a *] [-m] [-s] [-c]',examples:['autorunsc -a * -m','autorunsc -a b -m -c > autostart.csv','autorunsc -s'],tip:'-a * alle Kategorien. -m nur nicht-Microsoft. -s nur signierte. -c CSV-Ausgabe. Ideal fuer Security-Audits.'},
  {name:'procexp',cat:'prozesse',typ:'cmd',short:'Process Explorer — erweiterter Task-Manager (Sysinternals).',syntax:'procexp [/accepteula] [-t]',examples:['procexp /accepteula'],tip:'Zeigt Parent-Child-Baum, DLLs, Handles, CPU-History pro Prozess. Virustotal-Integration. Pflicht-Tool!'},
  {name:'procmon',cat:'prozesse',typ:'cmd',short:'Process Monitor — Datei/Registry/Netz-Aktivitaet live (Sysinternals).',syntax:'procmon [/accepteula] [/quiet] [/minimized]',examples:['procmon /accepteula','procmon /quiet /minimized /backingfile C:\\log.pml'],tip:'Zeichnet alle Datei-, Registry- und Prozessoperationen auf. Unverzichtbar fuer Fehlersuche und Malware-Analyse.'},
  {name:'junction',cat:'prozesse',typ:'cmd',short:'NTFS-Junctions (symbolische Ordnerlinks) erstellen (Sysinternals).',syntax:'junction [Link] [Ziel]  |  junction -d [Link]',examples:['junction C:\\AppLink D:\\Programme\\App','junction -d C:\\AppLink'],tip:'-d loescht den Junction-Punkt. Aehnlich wie mklink /d aber aus der Sysinternals Suite.'},
  {name:'Invoke-Command',cat:'prozesse',typ:'ps',short:'Befehl auf Remote-Computer ausfuehren (WinRM).',syntax:'Invoke-Command -ComputerName [PC] -ScriptBlock { Befehl }',examples:['Invoke-Command -ComputerName PC02 -ScriptBlock { Get-Process }','Invoke-Command -ComputerName PC02,PC03 -ScriptBlock { Restart-Service spooler }','Invoke-Command -ComputerName DC01 -FilePath C:\\script.ps1'],tip:'WinRM muss aktiviert sein: Enable-PSRemoting. Mehrere Computer gleichzeitig moeglich.'},
  {name:'Enter-PSSession',cat:'prozesse',typ:'ps',short:'Interaktive Remote-PowerShell-Sitzung starten.',syntax:'Enter-PSSession -ComputerName [PC] [-Credential Benutzer]',examples:['Enter-PSSession -ComputerName PC02','Enter-PSSession -ComputerName PC02 -Credential "DOMAIN\\Admin"','Exit-PSSession'],tip:'WinRM muss aktiviert sein. Prompt aendert sich zu [PC02]: — Exit-PSSession zum Beenden.'},
  {name:'New-PSSession',cat:'prozesse',typ:'ps',short:'Persistente Remote-Sitzung fuer mehrere Befehle erstellen.',syntax:'$s = New-PSSession -ComputerName [PC]; Invoke-Command -Session $s { Befehl }',examples:['$s = New-PSSession -ComputerName PC02','Invoke-Command -Session $s { Get-Process }','Invoke-Command -Session $s { Stop-Service spooler }','Remove-PSSession $s'],tip:'Effizienter als Invoke-Command wenn mehrere Befehle auf demselben Remote-PC ausgefuehrt werden.'},
  {name:'Get-Counter',cat:'prozesse',typ:'ps',short:'Performance-Counter in PowerShell abfragen.',syntax:'Get-Counter [-Counter Pfad] [-SampleInterval Sek] [-MaxSamples N]',examples:['Get-Counter "\\Processor(_Total)\\% Processor Time"','Get-Counter "\\Memory\\Available MBytes" -SampleInterval 2 -MaxSamples 5','Get-Counter -ListSet * | Select CounterSetName'],tip:'-ListSet * zeigt alle verfuegbaren Counter. Ideal fuer Skript-basiertes Monitoring.'},
  {name:'Measure-Object',cat:'prozesse',typ:'ps',short:'Statistiken (Min, Max, Sum, Average) ueber Objekte berechnen.',syntax:'[Objekte] | Measure-Object [-Property Feld] [-Sum] [-Average] [-Maximum] [-Minimum]',examples:['Get-Process | Measure-Object CPU -Sum -Average -Maximum','Get-ChildItem C:\\ -Recurse | Measure-Object Length -Sum','1..100 | Measure-Object -Sum -Average'],tip:'Sehr nuetzlich fuer Ressourcenauswertung. Get-Process | Measure-Object WorkingSet -Sum zeigt Gesamt-RAM.'},
  {name:'Debug-Process',cat:'prozesse',typ:'ps',short:'Debugger an laufenden Prozess anhaengen.',syntax:'Debug-Process [-Name Name] [-Id PID]',examples:['Debug-Process -Name notepad','Debug-Process -Id 1234'],tip:'Haengt den konfigurierten Just-in-Time-Debugger an. Benoetigt installierten Debugger (WinDbg, Visual Studio).'},
  {name:'Suspend-Process / Resume-Process',cat:'prozesse',typ:'ps',short:'Prozess anhalten und fortsetzen.',syntax:'(Get-Process [Name]).Suspend()  |  .Resume()',examples:['(Get-Process notepad).Suspend()','(Get-Process notepad).Resume()'],tip:'Keine nativen Cmdlets — .NET-Methoden des Process-Objekts verwenden. Haelt CPU-Auslastung an.'},

  // ── BENUTZER WEITERES ──
  {name:'net password',cat:'benutzer',typ:'cmd',short:'Kennwort des aktuellen Benutzers aendern.',syntax:'net user [Benutzername] [AltesPasswort] [NeuesPasswort]',examples:['net user Max AltesPasswort NeuesPasswort!'],tip:'Ohne Admin-Rechte nur eigenes Kennwort aenderbar. Mit Admin: net user Max * fragt neues Kennwort ab.'},
  {name:'net use',cat:'benutzer',typ:'cmd',short:'Netzlaufwerke verbinden, trennen und auflisten.',syntax:'net use [Buchstabe:] [\\\\Server\\Freigabe] [Passwort] [/user:Benutzer] [/persistent:yes]',examples:['net use Z: \\\\Server\\Daten','net use Z: \\\\Server\\Daten /user:DOMAIN\\Max * /persistent:yes','net use Z: /delete','net use * /delete /y'],tip:'/persistent:yes Laufwerk bleibt nach Neustart verbunden. * /delete trennt alle Verbindungen.'},
  {name:'subst',cat:'benutzer',typ:'cmd',short:'Ordner als virtuelles Laufwerk einbinden.',syntax:'subst [Buchstabe:] [Pfad]  |  subst [Buchstabe:] /d',examples:['subst X: C:\\Projekte\\Aktuell','subst X: /d','subst'],tip:'Erstellt temporaere Laufwerkszuweisung (kein Neustart noetig, aber nicht persistent). subst ohne Parameter listet alle.'},
  {name:'cacls /e /g',cat:'benutzer',typ:'cmd',short:'NTFS-Rechte per cacls aendern (Legacy-Variante).',syntax:'cacls [Pfad] /e /g [Benutzer]:[R|W|C|F]',examples:['cacls C:\\Ordner /e /g Max:F','cacls C:\\Ordner /e /r Max'],tip:'Veraltet — icacls bevorzugen. /e = Rechte hinzufuegen statt ersetzen. R=Lesen, F=Vollzugriff, C=Aendern.'},
  {name:'secedit',cat:'benutzer',typ:'cmd',short:'Sicherheitsrichtlinien exportieren, importieren und anwenden.',syntax:'secedit [/export] [/import] [/configure] [/analyze] /db [Datei] /cfg [INF-Datei]',examples:['secedit /export /cfg C:\\sicherheit.inf','secedit /configure /db C:\\sicherheit.sdb /cfg C:\\sicherheit.inf','secedit /analyze /db C:\\analyse.sdb /cfg C:\\sicherheit.inf'],tip:'Sicherheitsrichtlinien als .inf-Datei sichern und auf andere Systeme uebertragen.'},
  {name:'certutil',cat:'benutzer',typ:'cmd',short:'Zertifikate verwalten, hashen und kodieren.',syntax:'certutil [-hashfile Datei SHA256] [-encode|-decode Datei] [-addstore Store Datei]',examples:['certutil -hashfile C:\\datei.iso SHA256','certutil -encode datei.bin datei.b64','certutil -addstore Root C:\\zertifikat.cer','certutil -store My'],tip:'certutil -hashfile prueft Dateiintegritaet. -addstore installiert Zertifikate. -store zeigt Zertifikatsspeicher.'},
  {name:'cipher',cat:'benutzer',typ:'cmd',short:'EFS-Dateiverschluesselung verwalten und freien Speicher sicher loeschen.',syntax:'cipher [/e] [/d] [/w:Pfad] [/r:Datei] [Pfad]',examples:['cipher /e C:\\Geheim\\datei.txt','cipher /d C:\\Geheim\\datei.txt','cipher /w:C:\\','cipher /r:C:\\MeinZertifikat'],tip:'/e verschluesselt, /d entschluesselt mit EFS. /w ueberschreibt freien Speicher sicher. /r erstellt EFS-Wiederherstellungszertifikat.'},
  {name:'compact',cat:'benutzer',typ:'cmd',short:'NTFS-Komprimierung fuer Dateien und Ordner verwalten.',syntax:'compact [/c] [/u] [/s] [/a] [Pfad]',examples:['compact /c C:\\Archiv','compact /u C:\\Archiv','compact /s /c C:\\Logs\\*.log'],tip:'/c komprimiert, /u dekomprimiert. /s rekursiv. Komprimierung reduziert Festplattenbelegung bei selten genutzten Dateien.'},
  {name:'wmic useraccount',cat:'benutzer',typ:'cmd',short:'Benutzerkonten per WMI abfragen und verwalten.',syntax:'wmic useraccount [get|where|call] [Eigenschaften]',examples:['wmic useraccount get name,sid,disabled','wmic useraccount where name="Max" get *','wmic useraccount where name="Max" call rename "MaxNeu"'],tip:'Zeigt SIDs, Kontostatus und mehr. Gut fuer Skripte. Moderner Ersatz: Get-LocalUser in PowerShell.'},
  {name:'wmic group',cat:'benutzer',typ:'cmd',short:'Lokale Gruppen per WMI abfragen.',syntax:'wmic group get name,sid,localaccount',examples:['wmic group get name,sid','wmic group where name="Administrators" get *'],tip:'Zeigt alle lokalen Gruppen mit SIDs. Nützlich fuer Inventarisierung.'},
  {name:'Get-SmbSession',cat:'benutzer',typ:'ps',short:'Aktive SMB-Sitzungen (verbundene Benutzer) anzeigen.',syntax:'Get-SmbSession [-ClientUserName Benutzer]',examples:['Get-SmbSession','Get-SmbSession | Select ClientUserName,ClientComputerName','Close-SmbSession -SessionId 1234 -Force'],tip:'Zeigt wer ueber Netzwerkfreigaben verbunden ist. Close-SmbSession trennt einzelne Sitzungen.'},
  {name:'Get-SmbOpenFile',cat:'benutzer',typ:'ps',short:'Offene Dateien ueber Netzwerkfreigaben anzeigen.',syntax:'Get-SmbOpenFile [-ClientUserName Benutzer]',examples:['Get-SmbOpenFile','Get-SmbOpenFile | Select ClientUserName,Path','Close-SmbOpenFile -FileId 1234 -Force'],tip:'Zeigt welche Dateien von welchem Benutzer ueber SMB geoeffnet sind. Close-SmbOpenFile erzwingt Schliessung.'},
  {name:'Get-SmbShare',cat:'benutzer',typ:'ps',short:'Netzwerkfreigaben des lokalen Computers anzeigen.',syntax:'Get-SmbShare [-Name Name]',examples:['Get-SmbShare','Get-SmbShare | Select Name,Path,Description','Get-SmbShareAccess -Name "Daten"'],tip:'Get-SmbShareAccess zeigt Berechtigungen der Freigabe. New-SmbShare erstellt neue Freigaben.'},
  {name:'New-SmbShare',cat:'benutzer',typ:'ps',short:'Neue Netzwerkfreigabe erstellen.',syntax:'New-SmbShare -Name [Name] -Path [Pfad] [-FullAccess Benutzer] [-ReadAccess Benutzer]',examples:['New-SmbShare -Name "Daten" -Path "C:\\Freigabe" -FullAccess "DOMAIN\\IT-Admins"','New-SmbShare -Name "Public" -Path "C:\\Public" -ReadAccess "Everyone"'],tip:'-ChangeAccess fuer Schreibzugriff ohne Vollzugriff. Kombination mit NTFS-Rechten (icacls) empfohlen.'},
  {name:'Get-LocalGroupMember',cat:'benutzer',typ:'ps',short:'Mitglieder einer lokalen Gruppe anzeigen.',syntax:'Get-LocalGroupMember -Group [Gruppenname]',examples:['Get-LocalGroupMember -Group "Administrators"','Get-LocalGroupMember -Group "Remote Desktop Users"','Get-LocalGroupMember "Administrators" | Select Name,PrincipalSource'],tip:'PrincipalSource zeigt ob Mitglied lokal, AD oder Microsoft-Konto ist.'},
  {name:'Remove-LocalGroupMember',cat:'benutzer',typ:'ps',short:'Benutzer aus lokaler Gruppe entfernen.',syntax:'Remove-LocalGroupMember -Group [Gruppe] -Member [Benutzer]',examples:['Remove-LocalGroupMember -Group "Administrators" -Member "TempAdmin"','Remove-LocalGroupMember -Group "Remote Desktop Users" -Member "Max"'],tip:'Vorsicht bei Administrators-Gruppe — mindestens ein Admin muss bleiben!'},
  {name:'Disable-LocalUser',cat:'benutzer',typ:'ps',short:'Lokales Benutzerkonto deaktivieren.',syntax:'Disable-LocalUser -Name [Benutzername]',examples:['Disable-LocalUser -Name "Gast"','Disable-LocalUser -Name "TempUser"','Get-LocalUser | Where Enabled -eq $true | Disable-LocalUser'],tip:'Konto wird nicht geloescht — jederzeit mit Enable-LocalUser reaktivierbar. Besser als loeschen.'},
  {name:'Enable-LocalUser',cat:'benutzer',typ:'ps',short:'Lokales Benutzerkonto aktivieren.',syntax:'Enable-LocalUser -Name [Benutzername]',examples:['Enable-LocalUser -Name "Administrator"','Enable-LocalUser -Name "Max"'],tip:'Das integrierte Administrator-Konto ist standardmaessig deaktiviert. Enable-LocalUser -Name "Administrator" aktiviert es.'},
  {name:'Rename-LocalUser',cat:'benutzer',typ:'ps',short:'Lokales Benutzerkonto umbenennen.',syntax:'Rename-LocalUser -Name [AlterName] -NewName [NeuerName]',examples:['Rename-LocalUser -Name "Administrator" -NewName "SysAdmin"','Rename-LocalUser -Name "Gast" -NewName "Guest_Disabled"'],tip:'Umbenennen des Administrator-Kontos ist eine Security-Best-Practice gegen Brute-Force-Angriffe.'},
  {name:'Remove-LocalUser',cat:'benutzer',typ:'ps',short:'Lokales Benutzerkonto loeschen.',syntax:'Remove-LocalUser -Name [Benutzername]',examples:['Remove-LocalUser -Name "TempUser"','Get-LocalUser | Where {$_.Description -like "*temp*"} | Remove-LocalUser'],tip:'Nicht wiederherstellbar! Profil und Dateien bleiben erhalten. Profil separat unter C:\\Users loeschen.'},
  {name:'New-LocalGroup',cat:'benutzer',typ:'ps',short:'Neue lokale Gruppe erstellen.',syntax:'New-LocalGroup -Name [Name] [-Description Text]',examples:['New-LocalGroup -Name "VPN-Benutzer" -Description "Zugriff auf VPN"','New-LocalGroup -Name "Drucker-Admins"'],tip:'Neue Gruppe erstellen und dann mit Add-LocalGroupMember befuellen.'},
  {name:'Rename-LocalGroup',cat:'benutzer',typ:'ps',short:'Lokale Gruppe umbenennen.',syntax:'Rename-LocalGroup -Name [AlterName] -NewName [NeuerName]',examples:['Rename-LocalGroup -Name "Benutzer" -NewName "Standardbenutzer"'],tip:'Mitgliedschaften bleiben beim Umbenennen erhalten.'},
  {name:'Remove-LocalGroup',cat:'benutzer',typ:'ps',short:'Lokale Gruppe loeschen.',syntax:'Remove-LocalGroup -Name [Gruppenname]',examples:['Remove-LocalGroup -Name "AlteGruppe"'],tip:'Integrierte Gruppen (Administrators, Users usw.) koennen nicht geloescht werden.'},
  {name:'ConvertTo-SecureString',cat:'benutzer',typ:'ps',short:'Passwort in SecureString umwandeln fuer Skripte.',syntax:'ConvertTo-SecureString [Text] -AsPlainText -Force',examples:['$pw = ConvertTo-SecureString "Passwort1!" -AsPlainText -Force','$pw = Read-Host -AsSecureString "Passwort eingeben"','$cred = New-Object PSCredential("Admin", $pw)'],tip:'Fuer Produktionsskripte: Read-Host -AsSecureString verwenden statt Klartextpasswort im Skript.'},
  {name:'Get-Credential',cat:'benutzer',typ:'ps',short:'Anmeldedialog anzeigen und Credentials sicher speichern.',syntax:'$cred = Get-Credential [Benutzername]',examples:['$cred = Get-Credential','$cred = Get-Credential "DOMAIN\\Admin"','Invoke-Command -ComputerName PC02 -Credential $cred -ScriptBlock { whoami }'],tip:'Zeigt Windows-Anmeldedialog. Credentials nie im Klartext im Skript speichern — immer Get-Credential verwenden.'},
  {name:'echo',cat:'daten',typ:'both',short:'Gibt Text aus oder aktiviert/deaktiviert das Echo in Skripts.',syntax:'echo [Text]  |  echo on|off',examples:['echo Hallo Welt','echo %USERNAME%','echo off'],tip:'Mit Variablen: echo %PATH% gibt den aktuellen Pfad aus.'},
  {name:'set',cat:'daten',typ:'cmd',short:'Zeigt oder setzt Umgebungsvariablen in der CMD-Sitzung.',syntax:'set [Variable=[Wert]]',examples:['set','set MYVAR=Hallo','set PATH'],tip:'set ohne Parameter zeigt alle Variablen. Aenderungen gelten nur in der aktuellen Sitzung.'},
  {name:'find',cat:'daten',typ:'cmd',short:'Sucht nach einer Zeichenkette in Dateien oder Ausgaben.',syntax:'find [/I] [/N] "Suchtext" [Datei]',examples:['find "ERROR" logfile.txt','dir | find "txt"','find /I /N "warning" *.log'],tip:'/I ignoriert Gross-/Kleinschreibung. /N zeigt Zeilennummern.'},
  {name:'findstr',cat:'daten',typ:'cmd',short:'Erweiterte Textsuche mit regulaeren Ausdruecken.',syntax:'findstr [/I] [/R] "Muster" [Dateien]',examples:['findstr "error" *.log','netstat -an | findstr :443'],tip:'Regulaere Ausdruecke mit /R. Kann Pipelines durchsuchen.'},
  {name:'sort',cat:'daten',typ:'cmd',short:'Sortiert die Ausgabe einer Datei oder Pipeline alphabetisch.',syntax:'sort [/R] [Datei]  |  [Befehl] | sort',examples:['sort namen.txt','dir | sort','sort /R liste.txt'],tip:'/R sortiert absteigend (Z-A). Haeufig mit Pipes kombiniert.'},
  {name:'more',cat:'daten',typ:'both',short:'Gibt Inhalte seitenweise aus.',syntax:'more [Datei]  |  [Befehl] | more',examples:['more readme.txt','type log.txt | more'],tip:'Leertaste = naechste Seite, Enter = naechste Zeile, Q = abbrechen.'},
  {name:'clip',cat:'daten',typ:'cmd',short:'Leitet Ausgabe in die Windows-Zwischenablage.',syntax:'[Befehl] | clip  |  clip < [Datei]',examples:['dir | clip','ipconfig | clip','clip < datei.txt'],tip:'Die Ausgabe landet direkt im Clipboard - kein Fenster oeffnet sich.'},
  {name:'cls',cat:'daten',typ:'both',short:'Loescht den Inhalt des Terminal-Fensters.',syntax:'cls',examples:['cls'],tip:'Entspricht clear in Linux/Mac. In PowerShell auch Strg+L.'},
  {name:'for',cat:'daten',typ:'both',short:'Schleife in CMD-Skripts - iteriert ueber Dateien oder Zahlen.',syntax:'for %i in (Menge) do [Befehl]',examples:['for %i in (*.txt) do echo %i','for /L %i in (1,1,10) do echo %i'],tip:'/L fuer Zahlenbereich. In .bat-Dateien %% statt % verwenden.'},
  {name:'if',cat:'daten',typ:'cmd',short:'Bedingte Ausfuehrung in CMD-Skripten.',syntax:'if [not] [exist|defined|errorlevel N] Bedingung Befehl',examples:['if exist C:\\datei.txt echo Vorhanden','if %ERRORLEVEL% EQU 0 echo Erfolgreich','if not defined MYVAR set MYVAR=Standard','if %1 == "" echo Kein Parameter'],tip:'Vergleichsoperatoren: EQU, NEQ, LSS, LEQ, GTR, GEQ. In Batch-Dateien: if ... (dann) else (sonst)'},
  {name:'goto',cat:'daten',typ:'cmd',short:'Springe zu einem Label in einer Batch-Datei.',syntax:'goto [Label]  |  :Label',examples:[':start','echo Schleife','goto start',':ende','echo Fertig'],tip:'Haeufig mit if kombiniert fuer Schleifen und Fehlerbehandlung in .bat Dateien. goto :eof beendet Unterprogramm.'},
  {name:'call',cat:'daten',typ:'cmd',short:'Ruft eine andere Batch-Datei oder ein Unterprogramm auf.',syntax:'call [Batch-Datei] [Parameter]  |  call :Label',examples:['call setup.bat /quiet','call :subroutine Argument','call C:\\Scripts\\cleanup.bat'],tip:'Ohne call wuerde die aufrufende Batch nach dem Unterprogramm nicht weiterlaufen.'},
  {name:'pause',cat:'daten',typ:'cmd',short:'Haelt Batch-Ausfuehrung an bis Taste gedrueckt wird.',syntax:'pause',examples:['pause','echo Fertig - Taste druecken...','pause','exit'],tip:'Zeigt "Druecken Sie eine beliebige Taste..." Oft am Ende von Skripten fuer Debugging.'},
  {name:'exit',cat:'daten',typ:'cmd',short:'CMD-Fenster schliessen oder Exitcode setzen.',syntax:'exit [/B] [Exitcode]',examples:['exit','exit /B 0','exit /B 1'],tip:'/B beendet nur die aktuelle Batch ohne CMD zu schliessen. Exitcode pruefbar per %ERRORLEVEL%.'},
  {name:'setx',cat:'daten',typ:'cmd',short:'Umgebungsvariable dauerhaft setzen (persistent nach Neustart).',syntax:'setx [Variable] [Wert] [/M]',examples:['setx MYVAR "Hallo"','setx PATH "%PATH%;C:\\MeinTool" /M','setx JAVA_HOME "C:\\Java\\jdk21"'],tip:'/M setzt systemweit (alle Benutzer, Admin noetig). Ohne /M nur fuer aktuellen Benutzer. Gilt erst in neuen CMD-Fenstern.'},
  {name:'reg',cat:'daten',typ:'cmd',short:'Registry per Kommandozeile abfragen, setzen, loeschen, exportieren.',syntax:'reg [query|add|delete|export|import|copy] [Schluessel] ...',examples:['reg query HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion','reg add HKCU\\SOFTWARE\\Test /v MeinWert /t REG_SZ /d "Hallo" /f','reg delete HKCU\\SOFTWARE\\Test /v MeinWert /f','reg export HKLM\\SOFTWARE\\MeineApp C:\\backup.reg','reg import C:\\backup.reg'],tip:'/f unterdrueckt Rueckfragen. /t: REG_SZ, REG_DWORD, REG_BINARY, REG_EXPAND_SZ, REG_MULTI_SZ.'},
  {name:'regedit /e',cat:'daten',typ:'cmd',short:'Registry-Schluessel exportieren.',syntax:'regedit /e [Datei.reg] [Schluessel]',examples:['regedit /e C:\\backup.reg HKEY_CURRENT_USER\\SOFTWARE\\MeineApp'],tip:'Exportiert in .reg-Format. Zum Wiederherstellen: regedit /s backup.reg (ohne Bestaetigungsdialog).'},
  {name:'wmic',cat:'daten',typ:'cmd',short:'WMI-Abfragen fuer Systeminformationen und Konfiguration.',syntax:'wmic [Alias] [get|list|where|call] [Eigenschaft]',examples:['wmic os get Caption,Version,BuildNumber','wmic logicaldisk get DeviceID,Size,FreeSpace','wmic product get Name,Version','wmic cpu get Name,NumberOfCores,MaxClockSpeed'],tip:'wmic product gibt installierte Software aus. logicaldisk zeigt alle Laufwerke mit Groesse.'},
  {name:'ConvertFrom-Json',cat:'daten',typ:'ps',short:'JSON-String in PowerShell-Objekt umwandeln.',syntax:'[String] | ConvertFrom-Json  |  ConvertFrom-Json [String]',examples:["'{\"Name\":\"Max\",\"Alter\":30}' | ConvertFrom-Json","$json = Get-Content api.json | ConvertFrom-Json","$json.Name"],tip:'Gibt ein PSCustomObject zurueck. Felder per Punkt-Notation zugreifen. Ideal fuer REST-API-Antworten.'},
  {name:'ConvertTo-Json',cat:'daten',typ:'ps',short:'PowerShell-Objekt in JSON-String umwandeln.',syntax:'[Objekt] | ConvertTo-Json [-Depth N] [-Compress]',examples:['Get-Process | Select Name,CPU | ConvertTo-Json','@{Name="Max"; Alter=30} | ConvertTo-Json -Compress','Get-Service | ConvertTo-Json -Depth 3 | Out-File dienste.json'],tip:'-Depth steuert Tiefe der Verschachtelung (Standard: 2). -Compress erzeugt kompaktes JSON ohne Whitespace.'},
  {name:'ConvertFrom-Csv',cat:'daten',typ:'ps',short:'CSV-String oder Datei in Objekte umwandeln.',syntax:'[String] | ConvertFrom-Csv  |  Import-Csv [Datei]',examples:["'Name,Alter\nMax,30\nErika,25' | ConvertFrom-Csv",'Import-Csv C:\\daten.csv | Where Alter -gt 25'],tip:'Import-Csv ist einfacher fuer Dateien. ConvertFrom-Csv fuer Strings aus Pipelines.'},
  {name:'Out-File',cat:'daten',typ:'ps',short:'Ausgabe in Datei umleiten (PS-Ersatz fuer >).',syntax:'[Befehl] | Out-File [Datei] [-Append] [-Encoding UTF8]',examples:['Get-Process | Out-File C:\\prozesse.txt','Get-Service | Out-File dienste.txt -Encoding UTF8','Get-EventLog System -Newest 100 | Out-File log.txt -Append'],tip:'-Append haengt an statt zu ueberschreiben. -Encoding UTF8 vermeidet Sonderzeichen-Probleme.'},
  {name:'Tee-Object',cat:'daten',typ:'ps',short:'Ausgabe gleichzeitig anzeigen und in Datei speichern.',syntax:'[Befehl] | Tee-Object [Datei]  |  Tee-Object -Variable varName',examples:['Get-Process | Tee-Object C:\\proc.txt','ipconfig | Tee-Object -Variable ipOut','Get-Service | Tee-Object dienste.txt | Where Status -eq Running'],tip:'Wie tee in Linux. Zeigt Ergebnis im Terminal UND speichert es. Ideal fuer Logging waehrend Skript laeuft.'},
  {name:'Write-Output',cat:'daten',typ:'ps',short:'Text in die Pipeline schreiben.',syntax:'Write-Output [Text]',examples:['Write-Output "Hallo Welt"','Write-Output $variable','Write-Output "Schritt 1 abgeschlossen"'],tip:'Alias: echo. Schreibt in die Pipeline, nicht direkt auf den Bildschirm. Unterschied zu Write-Host.'},
  {name:'Write-Host',cat:'daten',typ:'ps',short:'Text direkt auf den Bildschirm ausgeben (nicht in Pipeline).',syntax:'Write-Host [Text] [-ForegroundColor Farbe] [-BackgroundColor Farbe]',examples:['Write-Host "Fertig!" -ForegroundColor Green','Write-Host "FEHLER" -ForegroundColor Red -BackgroundColor Black','Write-Host "Fortschritt..." -NoNewline'],tip:'Farben: Red, Green, Yellow, Cyan, Magenta, White, Gray. -NoNewline kein Zeilenumbruch.'},
  {name:'Read-Host',cat:'daten',typ:'ps',short:'Benutzereingabe in PowerShell abfragen.',syntax:'Read-Host [-Prompt Text] [-AsSecureString]',examples:['$name = Read-Host "Dein Name"','$pw = Read-Host "Passwort" -AsSecureString','Read-Host "Enter druecken zum Fortfahren"'],tip:'-AsSecureString fuer Passwoerter (verdeckte Eingabe). Gibt String oder SecureString zurueck.'},
  {name:'Select-String',cat:'daten',typ:'ps',short:'Text in Dateien oder Strings suchen (PS grep).',syntax:'Select-String -Pattern [Regex] [Datei|Pipeline] [-CaseSensitive] [-NotMatch]',examples:['Select-String -Pattern "ERROR" C:\\app.log','Get-Content log.txt | Select-String "WARNING"','Select-String -Pattern "192\\.168\\." *.txt -CaseSensitive','Get-Process | Out-String | Select-String "chrome"'],tip:'-NotMatch invertiert. -AllMatches alle Treffer pro Zeile. Gibt MatchInfo-Objekte mit Zeilennummer zurueck.'},
  {name:'Out-GridView',cat:'daten',typ:'ps',short:'Ergebnisse in interaktiver GUI-Tabelle anzeigen und filtern.',syntax:'[Objekte] | Out-GridView [-Title Text] [-PassThru]',examples:['Get-Process | Out-GridView','Get-Service | Out-GridView -Title "Dienste"','Get-ADUser -Filter * | Select Name,SamAccountName | Out-GridView -PassThru'],tip:'-PassThru gibt ausgewaehlte Zeilen zurueck fuer weitere Verarbeitung. Kein GUI im Core-Modus.'},
  {name:'Format-Table',cat:'daten',typ:'ps',short:'Ausgabe als Tabelle formatieren.',syntax:'[Objekte] | Format-Table [-Property Felder] [-AutoSize] [-Wrap]',examples:['Get-Process | Format-Table Name,CPU,WorkingSet -AutoSize','Get-Service | Format-Table -Property Name,Status,StartType','Get-ChildItem | Format-Table Name,Length,LastWriteTime -AutoSize'],tip:'-AutoSize passt Spaltenbreite an Inhalt an. -Wrap bricht lange Werte um statt abzuschneiden.'},
  {name:'Format-List',cat:'daten',typ:'ps',short:'Ausgabe als Liste (Eigenschaft: Wert) formatieren.',syntax:'[Objekte] | Format-List [-Property Felder]',examples:['Get-Process notepad | Format-List *','Get-Service wuauserv | Format-List','Get-NetAdapter | Format-List'],tip:'Format-List * zeigt ALLE Eigenschaften eines Objekts. Ideal fuer Detail-Ansichten.'},
  {name:'Group-Object',cat:'daten',typ:'ps',short:'Objekte nach Eigenschaft gruppieren und zaehlen.',syntax:'[Objekte] | Group-Object [Eigenschaft] [-NoElement]',examples:['Get-Process | Group-Object -Property Company | Sort Count -Descending','Get-Service | Group-Object Status','Get-ChildItem | Group-Object Extension | Sort Count -Descending'],tip:'-NoElement gibt nur Gruppenname und Count zurueck (kein Array der Elemente). Sehr nuetzlich fuer Statistiken.'},
  {name:'Compare-Object',cat:'daten',typ:'ps',short:'Zwei Objekte oder Dateien vergleichen — zeigt Unterschiede.',syntax:'Compare-Object [Referenz] [Vergleich] [-Property Felder] [-IncludeEqual]',examples:['Compare-Object (Get-Content alt.txt) (Get-Content neu.txt)','Compare-Object (Get-Service) (Get-Service) -Property Name,Status','Compare-Object (Get-ADGroupMember Gruppe1) (Get-ADGroupMember Gruppe2) -Property SamAccountName'],tip:'<= nur in Referenz, => nur in Vergleich. -IncludeEqual zeigt auch gleiche Elemente (== Marker).'},
  {name:'ForEach-Object',cat:'daten',typ:'ps',short:'Jeden Eintrag einer Pipeline verarbeiten. Alias: foreach, %',syntax:'[Objekte] | ForEach-Object { Befehl }  |  % { ... }',examples:['Get-Process | ForEach-Object { $_.Name + ": " + $_.CPU }','1..10 | % { $_ * 2 }','Get-Service | % { if ($_.Status -eq "Stopped") { Start-Service $_.Name } }'],tip:'$_ ist das aktuelle Objekt. foreach ist der Alias. Kuerzer: 1..10 | % { ... }'},
  {name:'Invoke-RestMethod',cat:'daten',typ:'ps',short:'REST-API aufrufen und JSON/XML automatisch parsen.',syntax:'Invoke-RestMethod -Uri [URL] [-Method GET|POST] [-Body] [-Headers]',examples:['Invoke-RestMethod https://api.github.com/users/microsoft','$result = Invoke-RestMethod "https://api.example.com/data"','Invoke-RestMethod -Uri "https://api.site.com/post" -Method POST -Body (@{Name="Max"} | ConvertTo-Json) -ContentType "application/json"'],tip:'Parst JSON/XML automatisch zu Objekten. Moderner Ersatz fuer Invoke-WebRequest bei APIs.'},
  {name:'Get-ChildItem',cat:'powershell',typ:'ps',short:'Listet Dateien, Ordner oder Registry-Eintraege auf. Alias: ls, dir, gci',syntax:'Get-ChildItem [Pfad] [-Recurse] [-Filter *.ext] [-Hidden]',examples:['Get-ChildItem C:\\Windows','ls -Recurse -Filter *.log','gci -Hidden C:\\Users'],tip:'Alias ls und dir funktionieren auch. -Recurse durchsucht alle Unterordner.'},
  {name:'Get-Content',cat:'powershell',typ:'ps',short:'Liest den Inhalt einer Datei. Alias: cat, type, gc',syntax:'Get-Content [Datei] [-Tail N] [-Wait]',examples:['Get-Content log.txt','gc log.txt -Tail 20'],tip:'-Tail N zeigt die letzten N Zeilen. -Wait ist wie tail -f in Linux.'},
  {name:'Set-Content / Add-Content',cat:'powershell',typ:'ps',short:'Schreibt oder haengt Text an eine Datei an.',syntax:'Set-Content [Datei] [Wert]  |  Add-Content [Datei] [Wert]',examples:['Set-Content out.txt "Hallo"','Add-Content log.txt "Neue Zeile"'],tip:'Set-Content ueberschreibt, Add-Content haengt an. -Encoding UTF8 empfohlen.'},
  {name:'Get-Process',cat:'powershell',typ:'ps',short:'Listet laufende Prozesse auf. Alias: ps, gps',syntax:'Get-Process [Name] [-Id PID]',examples:['Get-Process','Get-Process chrome','ps | Sort-Object CPU -Descending'],tip:'Kann mit Stop-Process kombiniert werden. Sortierbar nach CPU, RAM.'},
  {name:'Stop-Process',cat:'powershell',typ:'ps',short:'Beendet einen Prozess per Name oder PID.',syntax:'Stop-Process [-Name Name] [-Id PID] [-Force]',examples:['Stop-Process -Name notepad','Stop-Process -Id 1234 -Force','Get-Process chrome | Stop-Process'],tip:'-Force erzwingt das Beenden. Pipe von Get-Process moeglich.'},
  {name:'Get-Service',cat:'powershell',typ:'ps',short:'Zeigt den Status von Windows-Diensten.',syntax:'Get-Service [Name]',examples:['Get-Service','Get-Service -Name wuauserv','Get-Service | Where Status -eq Running'],tip:'Mit Start-Service, Stop-Service, Restart-Service kombinieren.'},
  {name:'Invoke-WebRequest',cat:'powershell',typ:'ps',short:'HTTP-Anfragen senden - Webseiten abrufen oder Dateien laden. Alias: wget, curl, iwr',syntax:'Invoke-WebRequest [URL] [-OutFile Datei]',examples:['iwr https://example.com','Invoke-WebRequest https://example.com/file.zip -OutFile file.zip'],tip:'Alias wget und curl funktionieren. .Content gibt Body aus. -OutFile laedt direkt.'},
  {name:'Get-CimInstance',cat:'powershell',typ:'ps',short:'Systeminformationen ueber WMI abfragen. Moderner Ersatz fuer wmic.',syntax:'Get-CimInstance [Klasse]',examples:['Get-CimInstance Win32_Processor','Get-CimInstance Win32_OperatingSystem','Get-CimInstance Win32_DiskDrive'],tip:'Sehr maechtig fuer Systeminfos. Moderner Ersatz fuer wmic.'},
  {name:'Test-Connection',cat:'powershell',typ:'ps',short:'Ping-Test in PowerShell (Ersatz fuer ping).',syntax:'Test-Connection [Hostname] [-Count N] [-Quiet]',examples:['Test-Connection google.com','Test-Connection 8.8.8.8 -Count 3','Test-Connection heise.de -Quiet'],tip:'-Quiet gibt nur True/False zurueck - ideal fuer Skript-Bedingungen.'},
  {name:'Resolve-DnsName',cat:'powershell',typ:'ps',short:'DNS-Aufloesung in PowerShell (Ersatz fuer nslookup).',syntax:'Resolve-DnsName [Name] [-Type A|AAAA|MX]',examples:['Resolve-DnsName google.com','Resolve-DnsName -Name heise.de -Type MX'],tip:'Gibt strukturierte Objekte zurueck - besser pipebar als nslookup.'},
  {name:'Get-NetIPAddress',cat:'powershell',typ:'ps',short:'Zeigt IP-Adressen der Netzwerkadapter.',syntax:'Get-NetIPAddress [-AddressFamily IPv4|IPv6]',examples:['Get-NetIPAddress','Get-NetIPAddress -AddressFamily IPv4'],tip:'Moderner Ersatz fuer ipconfig in PowerShell-Skripten.'},
  {name:'Select-Object',cat:'powershell',typ:'ps',short:'Waehlt bestimmte Eigenschaften aus Objekten. Alias: select',syntax:'[Objekte] | Select-Object [Eigenschaften]',examples:['Get-Process | Select-Object Name,CPU,Id','dir | Select-Object Name,Length'],tip:'Sehr haeufig in Pipelines genutzt.'},
  {name:'Where-Object',cat:'powershell',typ:'ps',short:'Filtert Objekte in einer Pipeline nach Bedingung. Alias: where, ?',syntax:'[Objekte] | Where-Object { $_.Eigenschaft -eq Wert }',examples:['Get-Process | Where { $_.CPU -gt 10 }','dir | Where { $_.Extension -eq ".log" }'],tip:'$_ ist das aktuelle Objekt in der Pipeline.'},
  {name:'Sort-Object',cat:'powershell',typ:'ps',short:'Sortiert Objekte nach einer Eigenschaft. Alias: sort',syntax:'[Objekte] | Sort-Object [Eigenschaft] [-Descending]',examples:['Get-Process | Sort-Object CPU -Descending','dir | Sort-Object Length'],tip:'Mehrere Eigenschaften: Sort-Object Name,Length'},
  {name:'Export-Csv / Import-Csv',cat:'powershell',typ:'ps',short:'Exportiert oder importiert Objekte als CSV-Datei.',syntax:'[Objekte] | Export-Csv [Datei] -NoTypeInformation',examples:['Get-Process | Export-Csv prozesse.csv -NoTypeInformation','Import-Csv daten.csv | Format-Table'],tip:'-NoTypeInformation entfernt die Typenzeile. -Encoding UTF8 empfohlen.'},
  {name:'Set-ExecutionPolicy',cat:'powershell',typ:'ps',short:'Legt fest welche PowerShell-Skripte ausgefuehrt werden duerfen.',syntax:'Set-ExecutionPolicy [Policy] [-Scope Scope]',examples:['Set-ExecutionPolicy RemoteSigned','Set-ExecutionPolicy Bypass -Scope Process'],tip:'RemoteSigned erlaubt lokale Skripte. Bypass fuer temporaere Ausfuehrung.'},
  {name:'Get-History',cat:'powershell',typ:'ps',short:'Zeigt die Befehlshistorie der aktuellen Sitzung. Alias: h',syntax:'Get-History  |  Invoke-History [Id]',examples:['Get-History','Invoke-History 5','h | Select-Object -Last 10'],tip:'Alias h fuer Get-History. r fuer Invoke-History.'},
  // ACTIVE DIRECTORY — CMD-Tools
  {name:'dsadd user',cat:'ad',typ:'cmd',short:'Erstellt ein neues Benutzerkonto in Active Directory.',syntax:'dsadd user [DN] -samid [Name] -pwd [Passwort] -mustchpwd yes|no -disabled no',examples:['dsadd user "CN=Max Mustermann,OU=Mitarbeiter,DC=firma,DC=local" -samid mmustermann -pwd P@ssw0rd -mustchpwd yes -disabled no','dsadd user "CN=Test User,OU=IT,DC=corp,DC=de" -samid tuser -pwd Test123! -disabled no'],tip:'Der DN (Distinguished Name) bestimmt wo im AD das Objekt erstellt wird. OU muss vorher existieren.'},
  {name:'dsadd group',cat:'ad',typ:'cmd',short:'Erstellt eine neue Gruppe in Active Directory.',syntax:'dsadd group [DN] -secgrp yes|no -scope l|g|u',examples:['dsadd group "CN=IT-Admins,OU=Gruppen,DC=firma,DC=local" -secgrp yes -scope g','dsadd group "CN=Buchhaltung,OU=Gruppen,DC=corp,DC=de" -secgrp yes -scope l'],tip:'Scope: l=lokal, g=global, u=universal. -secgrp yes fuer Sicherheitsgruppe, no fuer Verteilergruppe.'},
  {name:'dsadd ou',cat:'ad',typ:'cmd',short:'Erstellt eine neue Organisationseinheit (OU) im AD.',syntax:'dsadd ou [DN] -desc "Beschreibung"',examples:['dsadd ou "OU=Auszubildende,DC=firma,DC=local" -desc "Alle Auszubildenden"','dsadd ou "OU=Berlin,OU=Standorte,DC=corp,DC=de" -desc "Standort Berlin"'],tip:'OUs koennen verschachtelt werden. Der vollstaendige Pfad muss im DN angegeben sein.'},
  {name:'dsquery user',cat:'ad',typ:'cmd',short:'Sucht Benutzerkonten im Active Directory.',syntax:'dsquery user [DN] -name "Muster*" [-limit N] [-inactive N]',examples:['dsquery user -name "Max*"','dsquery user DC=firma,DC=local -limit 100','dsquery user -inactive 4 -limit 50'],tip:'-inactive N findet Konten die seit N Wochen inaktiv sind. Platzhalter * sind erlaubt.'},
  {name:'dsquery group',cat:'ad',typ:'cmd',short:'Sucht Gruppen im Active Directory.',syntax:'dsquery group [DN] -name "Muster*" [-scope l|g|u]',examples:['dsquery group -name "IT*"','dsquery group DC=firma,DC=local -limit 50','dsquery group -name "Admin*" -scope g'],tip:'Ergebnis kann an dsget oder dsmod weitergeleitet werden: dsquery group -name "IT*" | dsget group -members'},
  {name:'dsquery ou',cat:'ad',typ:'cmd',short:'Sucht Organisationseinheiten im Active Directory.',syntax:'dsquery ou [DN] -name "Muster*"',examples:['dsquery ou DC=firma,DC=local','dsquery ou -name "IT*"'],tip:'Zeigt die DNs aller OUs. Hilfreich um den richtigen Pfad fuer andere ds-Befehle zu finden.'},
  {name:'dsquery computer',cat:'ad',typ:'cmd',short:'Sucht Computerobjekte im Active Directory.',syntax:'dsquery computer [DN] -name "Muster*" [-inactive N] [-stalepwd N]',examples:['dsquery computer -name "PC*"','dsquery computer -inactive 8','dsquery computer DC=firma,DC=local -limit 200'],tip:'-stalepwd N findet Computer deren Kennwort seit N Tagen nicht geaendert wurde.'},
  {name:'dsget user',cat:'ad',typ:'cmd',short:'Zeigt Eigenschaften eines oder mehrerer AD-Benutzer.',syntax:'dsget user [DN] [-samid] [-email] [-tel] [-memberof] [-disabled]',examples:['dsget user "CN=Max Mustermann,OU=IT,DC=firma,DC=local" -samid -email -tel','dsquery user -name "Max*" | dsget user -disabled -memberof'],tip:'Kann Ergebnisse von dsquery per Pipe empfangen. -memberof zeigt Gruppenmitgliedschaften.'},
  {name:'dsget group',cat:'ad',typ:'cmd',short:'Zeigt Mitglieder und Eigenschaften einer AD-Gruppe.',syntax:'dsget group [DN] [-members] [-memberof] [-desc]',examples:['dsget group "CN=IT-Admins,OU=Gruppen,DC=firma,DC=local" -members','dsget group "CN=IT-Admins,OU=Gruppen,DC=firma,DC=local" -memberof'],tip:'-members listet alle Mitglieder. -memberof zeigt in welchen Gruppen diese Gruppe Mitglied ist.'},
  {name:'dsmod user',cat:'ad',typ:'cmd',short:'Aendert Eigenschaften eines AD-Benutzerkontos.',syntax:'dsmod user [DN] [-pwd Passwort] [-disabled yes|no] [-mustchpwd yes|no] [-acctexpires N]',examples:['dsmod user "CN=Max,OU=IT,DC=firma,DC=local" -disabled yes','dsmod user "CN=Max,OU=IT,DC=firma,DC=local" -pwd NeuP@ss1 -mustchpwd yes','dsquery user -name "Max*" | dsmod user -disabled no'],tip:'-acctexpires 0 setzt kein Ablaufdatum. -acctexpires -1 deaktiviert das Konto sofort.'},
  {name:'dsmod group',cat:'ad',typ:'cmd',short:'Fuegt Mitglieder zu einer Gruppe hinzu oder entfernt sie.',syntax:'dsmod group [DN] -addmbr [MemberDN] | -rmmbr [MemberDN]',examples:['dsmod group "CN=IT-Admins,OU=Gruppen,DC=firma,DC=local" -addmbr "CN=Max,OU=IT,DC=firma,DC=local"','dsmod group "CN=IT-Admins,OU=Gruppen,DC=firma,DC=local" -rmmbr "CN=Max,OU=IT,DC=firma,DC=local"'],tip:'Mehrere DNs koennen mit Leerzeichen getrennt angegeben werden.'},
  {name:'dsrm',cat:'ad',typ:'cmd',short:'Loescht ein Objekt aus dem Active Directory.',syntax:'dsrm [DN] [-noprompt] [-subtree]',examples:['dsrm "CN=Max Mustermann,OU=IT,DC=firma,DC=local"','dsrm "OU=AlteOU,DC=firma,DC=local" -subtree -noprompt'],tip:'-subtree loescht die OU inkl. aller Unterobjekte. -noprompt unterdrueckt Rueckfragen.'},
  {name:'dsmove',cat:'ad',typ:'cmd',short:'Verschiebt ein AD-Objekt in eine andere OU.',syntax:'dsMove [ObjektDN] -newparent [ZielOU-DN]',examples:['dsMove "CN=Max,OU=Alt,DC=firma,DC=local" -newparent "OU=Neu,DC=firma,DC=local"'],tip:'Aendert nur den Container, nicht den CN. Fuer Umbenennung dsmod -newname verwenden.'},
  {name:'net group',cat:'ad',typ:'cmd',short:'Verwaltet globale Gruppen in einer Domaene.',syntax:'net group [Gruppenname] [/domain] [/add|/delete] [Benutzer]',examples:['net group /domain','net group "Domain Admins" /domain','net group "IT-Team" Max /add /domain'],tip:'Nur fuer globale Gruppen. Fuer lokale Gruppen net localgroup verwenden.'},
  {name:'nltest',cat:'ad',typ:'cmd',short:'Testet Netlogon-Dienst und Domaenencontroller-Verbindung.',syntax:'nltest [/dclist:Domaene] [/sc_verify:Domaene] [/dsgetdc:Domaene]',examples:['nltest /dclist:firma.local','nltest /sc_verify:firma.local','nltest /dsgetdc:firma.local /force'],tip:'/force erzwingt eine neue DC-Suche. Hilfreich zur Diagnose von AD-Verbindungsproblemen.'},
  {name:'dcdiag',cat:'ad',typ:'cmd',short:'Diagnosetool fuer Domaenencontroller - prueft AD-Gesundheit.',syntax:'dcdiag [/test:Test] [/s:Server] [/fix] [/v]',examples:['dcdiag','dcdiag /test:replication','dcdiag /test:dns','dcdiag /s:DC01 /v'],tip:'Ohne Parameter werden alle Tests ausgefuehrt. /test:replication prueft AD-Replikation.'},
  {name:'repadmin',cat:'ad',typ:'cmd',short:'Verwaltet und ueberprueft die AD-Replikation.',syntax:'repadmin [/showrepl] [/replsummary] [/syncall] [/showutdvec]',examples:['repadmin /showrepl','repadmin /replsummary','repadmin /syncall /AdeP','repadmin /showrepl DC01'],tip:'/syncall /AdeP synchronisiert alle Partitionen mit allen Partnern. Hilfreich nach Aenderungen.'},
  {name:'gpupdate',cat:'ad',typ:'cmd',short:'Erzwingt die sofortige Anwendung von Gruppenrichtlinien.',syntax:'gpupdate [/force] [/target:computer|user] [/logoff] [/boot]',examples:['gpupdate','gpupdate /force','gpupdate /force /target:computer','gpupdate /force /logoff'],tip:'/force wendet alle GPOs neu an, auch unveraenderte. /logoff meldet danach ab.'},
  {name:'gpresult',cat:'ad',typ:'cmd',short:'Zeigt welche Gruppenrichtlinien fuer Benutzer/Computer gelten.',syntax:'gpresult [/r] [/h Datei.html] [/scope user|computer] [/user Benutzer]',examples:['gpresult /r','gpresult /h C:\\gpo_report.html','gpresult /scope user /r','gpresult /user mmustermann /r'],tip:'/h erstellt einen detaillierten HTML-Bericht. /r gibt eine schnelle Zusammenfassung.'},
  {name:'ldifde',cat:'ad',typ:'cmd',short:'Importiert und exportiert AD-Objekte im LDIF-Format.',syntax:'ldifde [-f Datei] [-s Server] [-i] [-e] [-d DN] [-r Filter]',examples:['ldifde -f export.ldf -s DC01','ldifde -f import.ldf -i','ldifde -f users.ldf -d "OU=IT,DC=firma,DC=local" -r "(objectClass=user)"'],tip:'-i = Import-Modus. -e = Export-Modus. Nützlich für Massenimporte und -exporte von AD-Objekten.'},
  {name:'csvde',cat:'ad',typ:'cmd',short:'Importiert und exportiert AD-Objekte im CSV-Format.',syntax:'csvde [-f Datei] [-s Server] [-i] [-d DN]',examples:['csvde -f alle_benutzer.csv','csvde -f users.csv -d "OU=IT,DC=firma,DC=local"','csvde -f import.csv -i'],tip:'Einfacher als ldifde fuer tabellarische Massendaten. Kein Passwortimport moeglich.'},
  {name:'netdom',cat:'ad',typ:'cmd',short:'Verwaltet Domaenenmitgliedschaften und Computerkonten.',syntax:'netdom [join|remove|query|rename] [Computer] /domain:[Domaene]',examples:['netdom query fsmo','netdom join PC01 /domain:firma.local /userd:Admin /passwordd:*','netdom remove PC01 /domain:firma.local'],tip:'netdom query fsmo zeigt welcher DC welche FSMO-Rolle haelt.'},
  // ACTIVE DIRECTORY — PowerShell (AD-Modul)
  {name:'Get-ADUser',cat:'ad',typ:'ps',short:'Ruft einen oder mehrere AD-Benutzer ab.',syntax:'Get-ADUser [-Identity DN|SAM] [-Filter *] [-SearchBase DN] [-Properties *]',examples:['Get-ADUser -Identity mmustermann','Get-ADUser -Filter * -SearchBase "OU=IT,DC=firma,DC=local"','Get-ADUser -Filter {Enabled -eq $false} | Select Name,SAMAccountName','Get-ADUser mmustermann -Properties *'],tip:'-Properties * laedt alle Attribute. Ohne -Properties nur Standardfelder. Sehr maechtig mit -Filter.'},
  {name:'New-ADUser',cat:'ad',typ:'ps',short:'Erstellt einen neuen Benutzer in Active Directory.',syntax:'New-ADUser -Name [Name] -SamAccountName [SAM] -Path [OU-DN] -AccountPassword (ConvertTo-SecureString "Pw" -AsPlainText -Force) -Enabled $true',examples:['New-ADUser -Name "Max Mustermann" -SamAccountName mmustermann -Path "OU=IT,DC=firma,DC=local" -AccountPassword (ConvertTo-SecureString "P@ssw0rd!" -AsPlainText -Force) -Enabled $true','New-ADUser -Name "Erika Muster" -GivenName Erika -Surname Muster -SamAccountName emuster -Department IT -Enabled $true'],tip:'Ohne -Enabled $true wird das Konto deaktiviert erstellt. Passwort muss als SecureString uebergeben werden.'},
  {name:'Set-ADUser',cat:'ad',typ:'ps',short:'Aendert Eigenschaften eines AD-Benutzers.',syntax:'Set-ADUser [-Identity SAM] [-DisplayName] [-EmailAddress] [-Department] [-Enabled $true|$false]',examples:['Set-ADUser mmustermann -EmailAddress "m.mustermann@firma.de" -Department "IT"','Set-ADUser mmustermann -Enabled $false','Set-ADUser mmustermann -Description "IT-Admin" -Title "Systemadministrator"'],tip:'Beliebige AD-Attribute koennen mit -Replace @{Attribut="Wert"} gesetzt werden.'},
  {name:'Remove-ADUser',cat:'ad',typ:'ps',short:'Loescht einen Benutzer aus Active Directory.',syntax:'Remove-ADUser [-Identity SAM|DN] [-Confirm:$false]',examples:['Remove-ADUser mmustermann','Remove-ADUser -Identity "CN=Max,OU=IT,DC=firma,DC=local" -Confirm:$false','Get-ADUser -Filter {Department -eq "Alt"} | Remove-ADUser -Confirm:$false'],tip:'-Confirm:$false unterdrueckt die Rueckfrage. Konto kann nicht wiederhergestellt werden (ausser AD-Papierkorb aktiv).'},
  {name:'Enable-ADAccount / Disable-ADAccount',cat:'ad',typ:'ps',short:'Aktiviert oder deaktiviert ein AD-Konto.',syntax:'Enable-ADAccount [-Identity SAM]  |  Disable-ADAccount [-Identity SAM]',examples:['Enable-ADAccount mmustermann','Disable-ADAccount mmustermann','Get-ADUser -Filter {Enabled -eq $false} | Enable-ADAccount'],tip:'Alternativ: Set-ADUser -Enabled $true/$false. Beide Befehle funktionieren auch per Pipeline.'},
  {name:'Unlock-ADAccount',cat:'ad',typ:'ps',short:'Entsperrt ein gesperrtes AD-Benutzerkonto.',syntax:'Unlock-ADAccount [-Identity SAM|DN]',examples:['Unlock-ADAccount mmustermann','Search-ADAccount -LockedOut | Unlock-ADAccount'],tip:'Kombiniert mit Search-ADAccount -LockedOut koennen alle gesperrten Konten auf einmal entsperrt werden.'},
  {name:'Set-ADAccountPassword',cat:'ad',typ:'ps',short:'Setzt das Passwort eines AD-Benutzerkontos.',syntax:'Set-ADAccountPassword [-Identity SAM] -NewPassword (ConvertTo-SecureString "Pw" -AsPlainText -Force) -Reset',examples:['Set-ADAccountPassword mmustermann -NewPassword (ConvertTo-SecureString "Neues!Pw1" -AsPlainText -Force) -Reset','Set-ADAccountPassword mmustermann -NewPassword (Read-Host -AsSecureString) -Reset'],tip:'-Reset umgeht das alte Passwort. Ohne -Reset muss das alte Passwort angegeben werden.'},
  {name:'Search-ADAccount',cat:'ad',typ:'ps',short:'Sucht nach Konten mit bestimmten Zustaenden (gesperrt, abgelaufen usw.).',syntax:'Search-ADAccount [-LockedOut] [-Disabled] [-AccountExpired] [-PasswordExpired] [-PasswordNeverExpires]',examples:['Search-ADAccount -LockedOut','Search-ADAccount -AccountExpired | Select Name,SamAccountName','Search-ADAccount -PasswordNeverExpires | Select Name'],tip:'Sehr nuetzlich fuer regelmaessige Kontenaudits. Ergebnisse koennen direkt gepipt werden.'},
  {name:'Get-ADGroup',cat:'ad',typ:'ps',short:'Ruft eine oder mehrere AD-Gruppen ab.',syntax:'Get-ADGroup [-Identity Name|DN] [-Filter *] [-SearchBase DN]',examples:['Get-ADGroup "IT-Admins"','Get-ADGroup -Filter * -SearchBase "OU=Gruppen,DC=firma,DC=local"','Get-ADGroup -Filter {GroupScope -eq "Global"} | Select Name'],tip:'-Properties * laedt alle Attribute. GroupScope: DomainLocal, Global, Universal.'},
  {name:'New-ADGroup',cat:'ad',typ:'ps',short:'Erstellt eine neue Gruppe in Active Directory.',syntax:'New-ADGroup -Name [Name] -GroupScope [Global|Universal|DomainLocal] -GroupCategory [Security|Distribution] -Path [OU-DN]',examples:['New-ADGroup -Name "IT-Admins" -GroupScope Global -GroupCategory Security -Path "OU=Gruppen,DC=firma,DC=local"','New-ADGroup -Name "Newsletter" -GroupScope Universal -GroupCategory Distribution -Path "OU=Gruppen,DC=firma,DC=local"'],tip:'GroupCategory Security fuer Berechtigungen, Distribution fuer E-Mail-Verteiler.'},
  {name:'Add-ADGroupMember',cat:'ad',typ:'ps',short:'Fuegt Mitglieder zu einer AD-Gruppe hinzu.',syntax:'Add-ADGroupMember [-Identity Gruppe] [-Members SAM|DN]',examples:['Add-ADGroupMember "IT-Admins" -Members mmustermann','Add-ADGroupMember "IT-Admins" -Members mmustermann,emuster,jschmidt','Get-ADUser -Filter {Department -eq "IT"} | foreach { Add-ADGroupMember "IT-Admins" -Members $_ }'],tip:'Mehrere Mitglieder mit Komma trennen. Per Pipeline koennen ganze Abteilungen hinzugefuegt werden.'},
  {name:'Remove-ADGroupMember',cat:'ad',typ:'ps',short:'Entfernt Mitglieder aus einer AD-Gruppe.',syntax:'Remove-ADGroupMember [-Identity Gruppe] [-Members SAM] [-Confirm:$false]',examples:['Remove-ADGroupMember "IT-Admins" -Members mmustermann -Confirm:$false','Get-ADGroupMember "IT-Admins" | Remove-ADGroupMember -Identity "IT-Admins" -Confirm:$false'],tip:'-Confirm:$false unterdrueckt die Sicherheitsabfrage. Vorsichtig bei Massenentfernung.'},
  {name:'Get-ADGroupMember',cat:'ad',typ:'ps',short:'Listet alle Mitglieder einer AD-Gruppe auf.',syntax:'Get-ADGroupMember [-Identity Gruppe] [-Recursive]',examples:['Get-ADGroupMember "IT-Admins"','Get-ADGroupMember "Domain Admins" | Select Name,SamAccountName','Get-ADGroupMember "IT-Admins" -Recursive | Select Name'],tip:'-Recursive loest auch verschachtelte Gruppen auf und zeigt alle indirekten Mitglieder.'},
  {name:'Get-ADOrganizationalUnit',cat:'ad',typ:'ps',short:'Ruft Organisationseinheiten (OUs) aus dem AD ab.',syntax:'Get-ADOrganizationalUnit [-Filter *] [-SearchBase DN] [-Properties *]',examples:['Get-ADOrganizationalUnit -Filter *','Get-ADOrganizationalUnit -Filter {Name -like "IT*"}','Get-ADOrganizationalUnit -Filter * | Select Name,DistinguishedName'],tip:'DistinguishedName wird benoetigt als -Path bei New-ADUser / New-ADGroup.'},
  {name:'New-ADOrganizationalUnit',cat:'ad',typ:'ps',short:'Erstellt eine neue OU in Active Directory.',syntax:'New-ADOrganizationalUnit -Name [Name] -Path [Parent-DN]',examples:['New-ADOrganizationalUnit -Name "Auszubildende" -Path "DC=firma,DC=local"','New-ADOrganizationalUnit -Name "Berlin" -Path "OU=Standorte,DC=firma,DC=local"'],tip:'Verschachteln moeglich. Path = DN des uebergeordneten Containers.'},
  {name:'Move-ADObject',cat:'ad',typ:'ps',short:'Verschiebt ein AD-Objekt in eine andere OU.',syntax:'Move-ADObject [-Identity DN] -TargetPath [Ziel-DN]',examples:['Move-ADObject "CN=Max,OU=Alt,DC=firma,DC=local" -TargetPath "OU=Neu,DC=firma,DC=local"','Get-ADUser -Filter {Department -eq "IT"} | Move-ADObject -TargetPath "OU=IT,DC=firma,DC=local"'],tip:'Aendert den Container des Objekts. CN bleibt unveraendert.'},
  {name:'Get-ADComputer',cat:'ad',typ:'ps',short:'Ruft Computerobjekte aus Active Directory ab.',syntax:'Get-ADComputer [-Identity Name] [-Filter *] [-SearchBase DN] [-Properties *]',examples:['Get-ADComputer PC01','Get-ADComputer -Filter * -SearchBase "OU=Computer,DC=firma,DC=local"','Get-ADComputer -Filter {OperatingSystem -like "*Windows 10*"} | Select Name,OperatingSystem'],tip:'-Properties OperatingSystem,LastLogonDate gibt Infos ueber Betriebssystem und letzten Login.'},
  {name:'Get-ADDomainController',cat:'ad',typ:'ps',short:'Zeigt Informationen ueber Domaenencontroller.',syntax:'Get-ADDomainController [-Identity Name] [-Filter *] [-Discover]',examples:['Get-ADDomainController','Get-ADDomainController -Filter *','Get-ADDomainController -Discover -NextClosestSite'],tip:'-Discover findet den naechsten verfuegbaren DC. Zeigt Rollen, IP, Betriebssystem.'},
  {name:'Get-ADDomain',cat:'ad',typ:'ps',short:'Zeigt Informationen ueber die aktuelle AD-Domaene.',syntax:'Get-ADDomain [[-Identity] Domaene]',examples:['Get-ADDomain','Get-ADDomain firma.local','(Get-ADDomain).PDCEmulator'],tip:'Zeigt Domaenenfunktionsstufe, FSMO-Rollentraeger, SID, NetBIOS-Name und mehr.'},
  {name:'Get-ADForest',cat:'ad',typ:'ps',short:'Zeigt Informationen ueber die AD-Gesamtstruktur (Forest).',syntax:'Get-ADForest [[-Identity] Forest]',examples:['Get-ADForest','(Get-ADForest).SchemaMaster','(Get-ADForest).Domains'],tip:'Gibt Schema- und Konfigurations-Namenskontext, FSMO-Rollentraeger und alle Domaenen aus.'},
  {name:'Get-GPO',cat:'ad',typ:'ps',short:'Ruft Gruppenrichtlinienobjekte (GPOs) ab.',syntax:'Get-GPO [-All] [-Name Name] [-Guid GUID] [-Domain Domaene]',examples:['Get-GPO -All','Get-GPO -Name "Default Domain Policy"','Get-GPO -All | Select DisplayName,GpoStatus'],tip:'Erfordert das GroupPolicy-Modul (RSAT). GpoStatus: AllSettingsEnabled, AllSettingsDisabled, UserSettingsDisabled, ComputerSettingsDisabled.'},
  {name:'New-GPO',cat:'ad',typ:'ps',short:'Erstellt ein neues Gruppenrichtlinienobjekt.',syntax:'New-GPO -Name [Name] [-Domain Domaene] [-Comment Text]',examples:['New-GPO -Name "Sicherheitsrichtlinie IT"','New-GPO -Name "Firewall Einstellungen" -Comment "Erstellt fuer IT-Abteilung"'],tip:'Ein neues GPO ist zunachst nicht verknuepft. Mit New-GPLink verknuepfen.'},
  {name:'New-GPLink',cat:'ad',typ:'ps',short:'Verknuepft ein GPO mit einer OU, Domaene oder Site.',syntax:'New-GPLink -Name [GPO-Name] -Target [OU-DN] [-Enforced Yes|No] [-LinkEnabled Yes|No]',examples:['New-GPLink -Name "Sicherheitsrichtlinie IT" -Target "OU=IT,DC=firma,DC=local"','New-GPLink -Name "Default Domain Policy" -Target "DC=firma,DC=local" -Enforced Yes'],tip:'-Enforced Yes verhindert, dass untergeordnete OUs die Richtlinie blockieren koennen.'},
  {name:'Get-GPResultantSetOfPolicy',cat:'ad',typ:'ps',short:'Erstellt einen GPO-Bericht fuer Benutzer/Computer (RSOP).',syntax:'Get-GPResultantSetOfPolicy -Path [Pfad] -ReportType Html|Xml [-User Benutzer] [-Computer PC]',examples:['Get-GPResultantSetOfPolicy -ReportType Html -Path "C:\\rsop_report.html"','Get-GPResultantSetOfPolicy -ReportType Html -Path "C:\\report.html" -User mmustermann -Computer PC01'],tip:'Aequivalent zu gpresult /h in PowerShell. Zeigt alle angewendeten GPOs und Einstellungen.'},
  {name:'Import-Module ActiveDirectory',cat:'ad',typ:'ps',short:'Laedt das Active Directory PowerShell-Modul.',syntax:'Import-Module ActiveDirectory',examples:['Import-Module ActiveDirectory','Get-Module -Name ActiveDirectory -ListAvailable'],tip:'Wird automatisch geladen auf DCs. Auf Clients: RSAT-AD-PowerShell installieren (Add-WindowsCapability -Online -Name Rsat.ActiveDirectory.DS-LDS.Tools~~~~0.0.1.0).'},

  // ═══════════════════════════════════════════════
  // DNS SERVER — Diagnose-Tools (CMD, ueberall)
  // ═══════════════════════════════════════════════
  {name:'nslookup',cat:'dns',typ:'both',short:'DNS-Abfragen interaktiv oder direkt — der Klassiker.',syntax:'nslookup [Name] [DNS-Server]  |  nslookup (interaktiv)',examples:['nslookup google.com','nslookup google.com 8.8.8.8','nslookup -type=MX firma.local','nslookup -type=NS firma.local dc01.firma.local'],tip:'Interaktiver Modus: nslookup ohne Argumente starten, dann set type=ANY usw. Mit server [IP] Ziel-DNS wechseln.'},
  {name:'Resolve-DnsName',cat:'dns',typ:'ps',short:'Moderner PowerShell-Ersatz fuer nslookup — gibt strukturierte Objekte zurueck.',syntax:'Resolve-DnsName [-Name] Hostname [-Type A|AAAA|MX|NS|SOA|PTR|CNAME|TXT|SRV] [-Server IP]',examples:['Resolve-DnsName google.com','Resolve-DnsName firma.local -Type MX','Resolve-DnsName 192.168.1.1 -Type PTR','Resolve-DnsName _ldap._tcp.firma.local -Type SRV -Server dc01.firma.local'],tip:'Ausgabe ist ein Objekt — ideal fuer Skripte. -Server gibt einen bestimmten DNS-Server an.'},
  {name:'ipconfig /flushdns',cat:'dns',typ:'cmd',short:'Leert den lokalen DNS-Cache des Clients.',syntax:'ipconfig /flushdns',examples:['ipconfig /flushdns'],tip:'Loest Probleme durch veraltete Cache-Eintraege. Danach mit ipconfig /displaydns pruefen.'},
  {name:'ipconfig /displaydns',cat:'dns',typ:'cmd',short:'Zeigt alle Eintraege im lokalen DNS-Client-Cache.',syntax:'ipconfig /displaydns  |  ipconfig /displaydns | find "Eintrag"',examples:['ipconfig /displaydns','ipconfig /displaydns | more','ipconfig /displaydns | find "google"'],tip:'Zeigt gecachte A-, CNAME-, MX-Eintraege mit TTL. Hilfreich zur Cache-Diagnose.'},
  {name:'ipconfig /registerdns',cat:'dns',typ:'cmd',short:'Erzwingt die erneute DNS-Registrierung des Clients.',syntax:'ipconfig /registerdns',examples:['ipconfig /registerdns'],tip:'Registriert den Hostnamen und IP des Clients neu beim DNS-Server. Benoetigt oft Admin-Rechte.'},

  // ═══════════════════════════════════════════════
  // DNS SERVER — dnscmd (Server-Verwaltung, CMD)
  // ═══════════════════════════════════════════════
  {name:'dnscmd /info',cat:'dns',typ:'cmd',short:'Zeigt die Konfiguration und Einstellungen des DNS-Servers.',syntax:'dnscmd [Server] /info [/Eigenschaft]',examples:['dnscmd /info','dnscmd DC01 /info','dnscmd /info /forwarders'],tip:'Zeigt alle Serverkonfigurationen wie Forwarder, Rekursion, Cache-Groesse usw. /forwarders zeigt nur Weiterleitungen.'},
  {name:'dnscmd /enumzones',cat:'dns',typ:'cmd',short:'Listet alle Zonen auf dem DNS-Server auf.',syntax:'dnscmd [Server] /enumzones [/primary|/secondary|/forwarder|/stub]',examples:['dnscmd /enumzones','dnscmd DC01 /enumzones','dnscmd /enumzones /primary'],tip:'Zeigt Zonenname, Typ (Primary/Secondary/Stub/Forwarder) und AD-Integration.'},
  {name:'dnscmd /zoneadd',cat:'dns',typ:'cmd',short:'Erstellt eine neue DNS-Zone auf dem Server.',syntax:'dnscmd [Server] /zoneadd [Zonenname] /primary|/secondary|/stub /file [Datei] [/dp /domain|/forest|/legacy]',examples:['dnscmd /zoneadd firma.local /primary /dp /domain','dnscmd /zoneadd firma.local /primary /file firma.local.dns','dnscmd /zoneadd 1.168.192.in-addr.arpa /primary /dp /domain'],tip:'/dp /domain = AD-integriert (empfohlen). Fuer Reverse-Zone: IP-Oktette umkehren + .in-addr.arpa'},
  {name:'dnscmd /zonedelete',cat:'dns',typ:'cmd',short:'Loescht eine Zone vom DNS-Server.',syntax:'dnscmd [Server] /zonedelete [Zonenname] [/dsdel] [/f]',examples:['dnscmd /zonedelete altezone.local /f','dnscmd DC01 /zonedelete testzone.local /dsdel /f'],tip:'/f unterdrueckt die Rueckfrage. /dsdel loescht auch die AD-Replikation der Zone.'},
  {name:'dnscmd /zoneinfo',cat:'dns',typ:'cmd',short:'Zeigt detaillierte Informationen zu einer einzelnen Zone.',syntax:'dnscmd [Server] /zoneinfo [Zonenname]',examples:['dnscmd /zoneinfo firma.local','dnscmd DC01 /zoneinfo 1.168.192.in-addr.arpa'],tip:'Zeigt SOA, Zonentyp, AD-Partitionsbereich, Datei, Refresh- und Retry-Intervalle.'},
  {name:'dnscmd /zonereset',cat:'dns',typ:'cmd',short:'Aendert den Typ einer Zone (z.B. Primary zu AD-integriert).',syntax:'dnscmd [Server] /zonereset [Zonenname] /primary|/secondary [/dp /domain|/forest]',examples:['dnscmd /zonereset firma.local /primary /dp /domain','dnscmd /zonereset firma.local /secondary 192.168.1.2'],tip:'Kann eine dateibasierte Primary-Zone in eine AD-integrierte Zone umwandeln.'},
  {name:'dnscmd /zonerefresh',cat:'dns',typ:'cmd',short:'Erzwingt den sofortigen Zonenabzug (Transfer) bei Sekundaerzonen.',syntax:'dnscmd [Server] /zonerefresh [Zonenname]',examples:['dnscmd /zonerefresh firma.local','dnscmd DC01 /zonerefresh 1.168.192.in-addr.arpa'],tip:'Nur fuer Sekundaerzonen relevant. Loest sofortigen AXFR/IXFR-Transfer vom Master aus.'},
