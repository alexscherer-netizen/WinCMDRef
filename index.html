        <ol class="steps">
          <li class="step"><span class="step-num">1</span><div class="step-content"><div class="step-title">Server Manager oeffnen</div><div class="step-path">Start → Server Manager → Rollen und Features hinzufuegen</div></div></li>
          <li class="step"><span class="step-num">2</span><div class="step-content"><div class="step-title">Rolle auswaehlen</div><div class="step-desc">Installationstyp: Rollenbasiert → Server auswaehlen → Active Directory-Domaenendienste → Hinzufuegen → Weiter → Installieren</div></div></li>
          <li class="step"><span class="step-num">3</span><div class="step-content"><div class="step-title">Server zum DC promoten</div><div class="step-desc">Nach Installation: Warnung im Server Manager anklicken → "Server zu einem Domaenencontroller heraufstufen"</div></div></li>
        </ol>
        <div class="guide-section-head">Schritt 2 — Neuen Forest konfigurieren</div>
        <ol class="steps">
          <li class="step"><span class="step-num">4</span><div class="step-content"><div class="step-title">Bereitstellungskonfiguration</div><div class="step-desc">Neuen Forest hinzufuegen → Root-Domaenenname eingeben z.B. firma.local</div><div class="step-note">&#128161; .local nur fuer interne Netze. Fuer Split-DNS: firma.de verwenden</div></div></li>
          <li class="step"><span class="step-num">5</span><div class="step-content"><div class="step-title">DC-Optionen setzen</div><div class="step-desc">Funktionsebene: Windows Server 2016 oder hoeher empfohlen. DNS-Server: Haken setzen. DSRM-Passwort festlegen!</div><div class="step-warn">&#9888; DSRM-Passwort sicher aufbewahren — wird fuer AD-Wiederherstellung benoetigt!</div></div></li>
          <li class="step"><span class="step-num">6</span><div class="step-content"><div class="step-title">DNS-Delegation, NetBIOS-Name, Pfade</div><div class="step-desc">Standard-Pfade beibehalten oder anpassen. Voraussetzungspruefung abwarten → Installieren → Server startet neu.</div></div></li>
        </ol>`},
      {label:'PowerShell', content:`
        <div class="guide-section-head">AD DS Rolle installieren</div>
        <ol class="steps">
          <li class="step"><span class="step-num">1</span><div class="step-content"><div class="step-title">Rolle installieren</div><div class="step-code">Install-WindowsFeature AD-Domain-Services \`
  -IncludeManagementTools</div></div></li>
          <li class="step"><span class="step-num">2</span><div class="step-content"><div class="step-title">ADDSDeployment-Modul laden</div><div class="step-code">Import-Module ADDSDeployment</div></div></li>
        </ol>
        <div class="guide-section-head">Neuen Forest erstellen</div>
        <ol class="steps">
          <li class="step"><span class="step-num">3</span><div class="step-content"><div class="step-title">Ersten DC / neuen Forest promoten</div><div class="step-code">Install-ADDSForest \`
  -DomainName "firma.local" \`
  -DomainNetbiosName "FIRMA" \`
  -DomainMode "WinThreshold" \`
  -ForestMode "WinThreshold" \`
  -InstallDns:$true \`
  -DatabasePath "C:\Windows\NTDS" \`
  -SysvolPath "C:\Windows\SYSVOL" \`
  -LogPath "C:\Windows\NTDS" \`
  -SafeModeAdministratorPassword \`
    (ConvertTo-SecureString "DSRM!Pass1" -AsPlainText -Force) \`
  -Force:$true</div><div class="step-note">&#128161; DomainMode WinThreshold = Windows Server 2016. Server startet automatisch neu.</div></div></li>
        </ol>
        <div class="guide-section-head">Kind-Domaene hinzufuegen</div>
        <ol class="steps">
          <li class="step"><span class="step-num">4</span><div class="step-content"><div class="step-title">Neue untergeordnete Domaene erstellen</div><div class="step-code">Install-ADDSDomain \`
  -NewDomainName "berlin" \`
  -ParentDomainName "firma.local" \`
  -DomainType ChildDomain \`
  -InstallDns:$true \`
  -Credential (Get-Credential "firma\Administrator") \`
  -SafeModeAdministratorPassword \`
    (ConvertTo-SecureString "DSRM!Pass1" -AsPlainText -Force) \`
  -Force:$true</div><div class="step-note">&#128161; Ergibt berlin.firma.local als FQDN der Kind-Domaene.</div></div></li>
        </ol>`}
    ]
  },

    tabs:[

          <li class="step"><span class="step-num">4</span><div class="step-content"><div class="step-title">Standortverknuepfung konfigurieren</div><div class="step-desc">Inter-Site Transports → IP → DEFAULTIPSITELINK → Eigenschaften → Kosten und Replikationsintervall anpassen</div><div class="step-note">&#128161; Niedrigere Kosten = bevorzugte Route. Standard-Intervall: 180 Minuten.</div></div></li>

New-ADReplicationSubnet \`

    tabs:[
      {label:'GUI', content:`

          <li class="step"><span class="step-num">2</span><div class="step-content"><div class="step-title">Neue Vertrauensstellung erstellen</div><div class="step-desc">Rechtsklick auf Domaene → Eigenschaften → Reiter Vertrauensstellungen → Neue Vertrauensstellung → Assistent startet</div></div></li>
          <li class="step"><span class="step-num">3</span><div class="step-content"><div class="step-title">Trust-Typ auswaehlen</div><div class="step-note">Forest-Trust: Beide Forests vertrauen sich (bidirektional, alle Domaenen)<br>Externe Vertrauensstellung: Nur eine bestimmte Domaene<br>Shortcut-Trust: Beschleunigt Authentifizierung in grossen Forests</div></div></li>
          <li class="step"><span class="step-num">4</span><div class="step-content"><div class="step-title">Vertrauensstellung pruefen</div><div class="step-desc">Vertrauensstellungen-Tab → Trust auswaehlen → Bestaetigungstest ausfuehren</div></div></li>

Get-ADTrust -Identity firma.local</div></div></li>
          <li class="step"><span class="step-num">2</span><div class="step-content"><div class="step-title">Forest-Trust erstellen</div><div class="step-code">$cred = Get-Credential "partner\Administrator"
Add-ADGroupMember "Domain Admins" # (auf beiden Seiten Admin sein)

  /twoway \`

  /ud:partner\Administrator \`

    tabs:[

          <li class="step"><span class="step-num">1</span><div class="step-content"><div class="step-title">KDS-Stammschluessel erstellen (einmalig pro Forest)</div><div class="step-code">Add-KdsRootKey -EffectiveImmediately</div><div class="step-note">&#128161; In Produktion: ohne -EffectiveImmediately — 10 Stunden Wartezeit fuer Replikation</div></div></li>

          <li class="step"><span class="step-num">3</span><div class="step-content"><div class="step-title">gMSA auf Zielserver installieren</div><div class="step-code">Install-ADServiceAccount -Identity "svc-webserver"

  -SamAccountName "svc-backup" \`

    id:'ad-delegation', emoji:'🔑', title:'Verwaltungsdelegierung einrichten',
    subtitle:'Rechte fuer OU-Verwaltung delegieren — ohne Domain-Admin vergeben zu muessen',
    tabs:[
      {label:'GUI', content:`
        <ol class="steps">
          <li class="step"><span class="step-num">1</span><div class="step-content"><div class="step-title">ADUC oeffnen und OU auswaehlen</div><div class="step-code">dsa.msc</div><div class="step-desc">Rechtsklick auf die gewuenschte OU → Steuerung delegieren</div></div></li>
          <li class="step"><span class="step-num">2</span><div class="step-content"><div class="step-title">Gruppe hinzufuegen</div><div class="step-desc">Delegierungs-Assistent → Weiter → Gruppe hinzufuegen z.B. "Helpdesk"</div></div></li>
          <li class="step"><span class="step-num">3</span><div class="step-content"><div class="step-title">Delegierte Aufgaben auswaehlen</div><div class="step-note">Typische Helpdesk-Rechte:<br>&#10003; Benutzerobjekte erstellen, loeschen und verwalten<br>&#10003; Kennwoerter zuruecksetzen und erzwingen<br>&#10003; Mitgliedschaft in einer Gruppe lesen<br>&#10003; Konten aktivieren/deaktivieren</div></div></li>
          <li class="step"><span class="step-num">4</span><div class="step-content"><div class="step-title">Delegierung pruefen</div><div class="step-code">dsacls "OU=IT,DC=firma,DC=local"</div></div></li>
        </ol>`},
      {label:'PowerShell', content:`
        <ol class="steps">
          <li class="step"><span class="step-num">1</span><div class="step-content"><div class="step-title">Passwort-Reset delegieren</div><div class="step-code">$OU = "OU=IT,DC=firma,DC=local"
$Gruppe = (Get-ADGroup "Helpdesk").SID

# Passwort-Reset Recht setzen
dsacls $OU /G "&#36;{Gruppe}:CA;Reset Password;user"

# Konto entsperren
dsacls $OU /G "&#36;{Gruppe}:RPWP;lockoutTime;user"</div></div></li>
          <li class="step"><span class="step-num">2</span><div class="step-content"><div class="step-title">Benutzerverwaltung delegieren</div><div class="step-code">dsacls $OU /G "&#36;{Gruppe}:CCDC;user"</div><div class="step-note">CC=Create Child, DC=Delete Child fuer User-Objekte</div></div></li>
          <li class="step"><span class="step-num">3</span><div class="step-content"><div class="step-title">Aktuelle Berechtigungen einer OU anzeigen</div><div class="step-code">(Get-Acl "AD:$OU").Access | \`
  Where IdentityReference -like "*Helpdesk*" | \`
  Select IdentityReference,ActiveDirectoryRights</div></div></li>
        </ol>`}
    ]
  },
  {
    id:'dns-setup', emoji:'🌍', title:'DNS-Server einrichten & konfigurieren',
    subtitle:'DNS-Rolle installieren, Zonen anlegen, Forwarder setzen, Reverse-Zone konfigurieren',
    tabs:[
      {label:'GUI', content:`
        <div class="guide-section-head">DNS-Rolle installieren</div>
        <ol class="steps">
          <li class="step"><span class="step-num">1</span><div class="step-content"><div class="step-title">Server Manager → DNS-Rolle hinzufuegen</div><div class="step-path">Server Manager → Rollen und Features hinzufuegen → DNS-Server → Installieren</div></div></li>
          <li class="step"><span class="step-num">2</span><div class="step-content"><div class="step-title">DNS-Manager oeffnen</div><div class="step-code">dnsmgmt.msc</div></div></li>
        </ol>
        <div class="guide-section-head">Forward-Lookupzone anlegen</div>
        <ol class="steps">
          <li class="step"><span class="step-num">3</span><div class="step-content"><div class="step-title">Neue Zone erstellen</div><div class="step-desc">Forward-Lookupzonen → Rechtsklick → Neue Zone → Primaere Zone → In AD integrieren → firma.local</div></div></li>
          <li class="step"><span class="step-num">4</span><div class="step-content"><div class="step-title">Reverse-Lookupzone anlegen</div><div class="step-desc">Reverse-Lookupzonen → Rechtsklick → Neue Zone → IPv4 Reverse → Netzwerk-ID: 192.168.1</div></div></li>
        </ol>
        <div class="guide-section-head">Forwarder konfigurieren</div>
        <ol class="steps">
          <li class="step"><span class="step-num">5</span><div class="step-content"><div class="step-title">Externe Forwarder setzen</div><div class="step-desc">DNS-Server → Rechtsklick → Eigenschaften → Weiterleitungen → Bearbeiten → 8.8.8.8, 1.1.1.1 hinzufuegen</div></div></li>
        </ol>`},
      {label:'PowerShell', content:`
        <ol class="steps">
          <li class="step"><span class="step-num">1</span><div class="step-content"><div class="step-title">DNS-Rolle installieren</div><div class="step-code">Install-WindowsFeature DNS -IncludeManagementTools
Import-Module DnsServer</div></div></li>
          <li class="step"><span class="step-num">2</span><div class="step-content"><div class="step-title">AD-integrierte Forward-Zone erstellen</div><div class="step-code">Add-DnsServerPrimaryZone \`
  -Name "firma.local" \`
  -ReplicationScope "Domain" \`
  -DynamicUpdate "Secure"</div></div></li>
          <li class="step"><span class="step-num">3</span><div class="step-content"><div class="step-title">Reverse-Lookupzone erstellen</div><div class="step-code">Add-DnsServerPrimaryZone \`
  -NetworkId "192.168.1.0/24" \`
  -ReplicationScope "Domain" \`
  -DynamicUpdate "Secure"</div></div></li>
          <li class="step"><span class="step-num">4</span><div class="step-content"><div class="step-title">Forwarder setzen</div><div class="step-code">Set-DnsServerForwarder \`
  -IPAddress 8.8.8.8,1.1.1.1 \`
  -UseRootHint $false</div></div></li>
          <li class="step"><span class="step-num">5</span><div class="step-content"><div class="step-title">A-Record und PTR anlegen</div><div class="step-code">Add-DnsServerResourceRecordA \`
  -ZoneName "firma.local" \`
  -Name "server01" \`
  -IPv4Address "192.168.1.10" \`
  -CreatePtr</div></div></li>
          <li class="step"><span class="step-num">6</span><div class="step-content"><div class="step-title">DNS-Konfiguration pruefen</div><div class="step-code">Resolve-DnsName server01.firma.local
dcdiag /test:dns /v</div></div></li>
        </ol>`}
    ]
  },
  {
    id:'dns-records', emoji:'📋', title:'DNS-Eintraege verwalten (alle Record-Typen)',
    subtitle:'A, AAAA, CNAME, MX, TXT, SRV, PTR anlegen, aendern und loeschen',
    tabs:[
      {label:'GUI', content:`
        <ol class="steps">
          <li class="step"><span class="step-num">1</span><div class="step-content"><div class="step-title">DNS-Manager oeffnen</div><div class="step-code">dnsmgmt.msc</div></div></li>
          <li class="step"><span class="step-num">2</span><div class="step-content"><div class="step-title">Zone auswaehlen und Eintrag erstellen</div><div class="step-desc">Forward-Lookupzonen → firma.local → Rechtsklick → Neuer Host (A), Neuer Alias (CNAME) oder Andere neue Eintraege (MX, TXT, SRV)</div></div></li>
          <li class="step"><span class="step-num">3</span><div class="step-content"><div class="step-title">Eintrag aendern</div><div class="step-desc">Doppelklick auf vorhandenen Eintrag → Wert anpassen → OK</div></div></li>
          <li class="step"><span class="step-num">4</span><div class="step-content"><div class="step-title">TTL anpassen</div><div class="step-desc">Ansicht → Erweitert aktivieren → dann Doppelklick auf Eintrag → TTL sichtbar und aenderbar</div></div></li>
        </ol>`},
      {label:'PowerShell', content:`
        <div class="guide-section-head">A-Record (IPv4)</div>
        <ol class="steps">
          <li class="step"><span class="step-num">1</span><div class="step-content"><div class="step-code">Add-DnsServerResourceRecordA \`
  -ZoneName "firma.local" \`
  -Name "www" \`
  -IPv4Address "192.168.1.80" \`
  -TimeToLive 01:00:00 \`
  -CreatePtr</div></div></li>
        </ol>
        <div class="guide-section-head">CNAME (Alias)</div>
        <ol class="steps">
          <li class="step"><span class="step-num">2</span><div class="step-content"><div class="step-code">Add-DnsServerResourceRecordCName \`
  -ZoneName "firma.local" \`
  -Name "mail" \`
  -HostNameAlias "server01.firma.local."</div></div></li>
        </ol>
        <div class="guide-section-head">MX-Record (Mail)</div>
        <ol class="steps">
          <li class="step"><span class="step-num">3</span><div class="step-content"><div class="step-code">Add-DnsServerResourceRecordMX \`
  -ZoneName "firma.local" \`
  -Name "@" \`
  -MailExchange "mail.firma.local." \`
  -Preference 10</div></div></li>
        </ol>
        <div class="guide-section-head">TXT-Record (SPF / DMARC)</div>
        <ol class="steps">
          <li class="step"><span class="step-num">4</span><div class="step-content"><div class="step-code">Add-DnsServerResourceRecordTxt \`
  -ZoneName "firma.local" \`
  -Name "@" \`
  -DescriptiveText "v=spf1 mx ip4:192.168.1.0/24 ~all"</div></div></li>
        </ol>
        <div class="guide-section-head">Eintrag loeschen</div>
        <ol class="steps">
          <li class="step"><span class="step-num">5</span><div class="step-content"><div class="step-code">Remove-DnsServerResourceRecord \`
  -ZoneName "firma.local" \`
  -Name "www" -RRType "A" -Force</div></div></li>
        </ol>`},
      {label:'dnscmd', content:`
        <ol class="steps">
          <li class="step"><span class="step-num">1</span><div class="step-content"><div class="step-title">A-Record anlegen</div><div class="step-code">dnscmd /recordadd firma.local www A 192.168.1.80</div></div></li>
          <li class="step"><span class="step-num">2</span><div class="step-content"><div class="step-title">CNAME anlegen</div><div class="step-code">dnscmd /recordadd firma.local ftp CNAME server01.firma.local.</div></div></li>
          <li class="step"><span class="step-num">3</span><div class="step-content"><div class="step-title">MX-Record anlegen</div><div class="step-code">dnscmd /recordadd firma.local @ MX 10 mail.firma.local.</div></div></li>
          <li class="step"><span class="step-num">4</span><div class="step-content"><div class="step-title">TXT-Record (SPF) anlegen</div><div class="step-code">dnscmd /recordadd firma.local @ TXT "v=spf1 mx ~all"</div></div></li>
          <li class="step"><span class="step-num">5</span><div class="step-content"><div class="step-title">PTR-Record in Reverse-Zone</div><div class="step-code">dnscmd /recordadd 1.168.192.in-addr.arpa 80 PTR www.firma.local.</div></div></li>

// ── GUIDE STATE ──
let openGuide = null;
let guideActiveTabs = {};

function toggleGuide(id, event) {
  // Nur toggeln wenn Klick direkt auf guide-head oder guide-arrow, nicht auf body
  if (event && event.target.closest('.guide-body')) return;
  openGuide = openGuide === id ? null : id;
  if (activeTab === 'ad-guide') renderGuide();
}

function switchGuideTab(guideId, tabIdx) {
  guideActiveTabs[guideId] = tabIdx;
  const panels = document.querySelectorAll(`.guide-panels-${guideId} .guide-panel`);
  const tabs   = document.querySelectorAll(`.guide-tabbar-${guideId} .guide-tab`);
  panels.forEach((p,i) => p.classList.toggle('active', i === tabIdx));
  tabs.forEach((t,i) => t.classList.toggle('active', i === tabIdx));
}

function renderGuide() {
  const content = document.getElementById('content');
  document.getElementById('visCount').textContent = AD_GUIDES.length;
  document.getElementById('topbarTitle').innerHTML = `<span>&gt;</span> AD Anleitungen`;

  let html = `<div class="cat-header">
    <div class="cat-header-icon" style="background:#fb923c22;border:1px solid #fb923c55">&#128218;</div>
    <div class="cat-header-text"><h2>AD Anleitungen</h2><p>Schritt-fuer-Schritt Wege fuer alle wichtigen AD-Aufgaben &mdash; ${AD_GUIDES.length} Anleitungen</p></div>
  </div><div class="guide-grid">`;

  AD_GUIDES.forEach(g => {
    const isOpen = openGuide === g.id;
    const activeTabIdx = guideActiveTabs[g.id] || 0;
    let bodyHtml = '';
    if (isOpen) {
      const tabsHtml = g.tabs.map((t,i) =>
        `<div class="guide-tab${i===activeTabIdx?' active':''}" onclick="switchGuideTab('${g.id}',${i})">${t.label}</div>`
      ).join('');
      const panelsHtml = g.tabs.map((t,i) =>
        `<div class="guide-panel${i===activeTabIdx?' active':''}">${t.content}</div>`
      ).join('');
      bodyHtml = `<div class="guide-body">
        <div class="guide-tabs guide-tabbar-${g.id}">${tabsHtml}</div>
        <div class="guide-panels-${g.id}">${panelsHtml}</div>
      </div>`;
    }
    html += `<div class="guide-card${isOpen?' open':''}" onclick="toggleGuide('${g.id}', event)">
      <div class="guide-head">
        <span class="guide-emoji">${g.emoji}</span>
        <div class="guide-head-text">
          <div class="guide-title">${g.title}</div>
          <div class="guide-subtitle">${g.subtitle}</div>
        </div>
        <div class="guide-arrow">&#9660;</div>
      </div>${bodyHtml}
    </div>`;
  });
  html += '</div>';
  content.innerHTML = html;
}

// ── MOBILE SIDEBAR ──
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('visible');
  document.body.style.overflow = 'hidden';
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('visible');
  document.body.style.overflow = '';
}

// ── BOTTOM NAV ──
function buildBottomNav() {
  const inner = document.getElementById('bottom-nav-inner');
  inner.innerHTML = '';
  CATS.forEach(cat => {
    const el = document.createElement('div');
    el.className = 'bnav-item' + (cat.id === activeTab ? ' active' : '');
    el.dataset.id = cat.id;
    el.innerHTML = `<span class="bnav-icon">${cat.icon}</span><span class="bnav-label">${cat.label.replace(' Befehle','').replace('Alle','Alle')}</span>`;
    el.onclick = () => { selectTab(cat.id); };
    inner.appendChild(el);
  });
}

function buildNav() {
  const nav = document.getElementById('navItems');
  nav.innerHTML = '';
  CATS.forEach(cat => {
    const count = cat.id === 'alle' ? CMDS.length
      : cat.id === 'ad-guide' ? AD_GUIDES.length
      : cat.id === 'powershell' ? CMDS.filter(c => c.typ === 'ps' && c.cat !== 'ad' && c.cat !== 'dns').length
      : CMDS.filter(c => c.cat === cat.id).length;
    const el = document.createElement('div');
    el.className = 'sidebar-item' + (cat.id === activeTab ? ' active' : '');
    el.innerHTML = `<span class="cat-icon">${cat.icon}</span><span>${cat.label}</span><span class="cat-count">${count}</span>`;
    el.onclick = () => selectTab(cat.id);
    nav.appendChild(el);
  });
}

function selectTab(id) {
  activeTab = id;
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  openCard = null;
  buildNav();
  buildBottomNav();
  render();
  window.scrollTo(0,0);
  // close sidebar on mobile after selecting
  closeSidebar();
  // scroll active bottom nav item into view
  const active = document.querySelector('.bnav-item.active');
  if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

function handleSearch(q) {
  searchQuery = q.toLowerCase().trim();
  openCard = null;
  render();
}

function hl(text, q) {
  if (!q) return text;
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function badgeHtml(typ, cat) {
  if (cat === 'ad' && typ === 'ps')   return '<span class="badge badge-ad">AD·PS</span>';
  if (cat === 'ad' && typ === 'cmd')  return '<span class="badge badge-cmd">AD·CMD</span>';
  if (cat === 'ad' && typ === 'both') return '<span class="badge badge-both">AD·CMD+PS</span>';
  if (cat === 'dns' && typ === 'ps')   return '<span class="badge badge-dns">DNS·PS</span>';
  if (cat === 'dns' && typ === 'cmd')  return '<span class="badge badge-dns">DNS·CMD</span>';
  if (cat === 'dns' && typ === 'both') return '<span class="badge badge-dns">DNS·CMD+PS</span>';
  if (cat === 'run') return '<span class="badge badge-run">Win+R</span>';
  if (typ === 'cmd')  return '<span class="badge badge-cmd">CMD</span>';
  if (typ === 'ps')   return '<span class="badge badge-ps">PS</span>';
  return '<span class="badge badge-both">CMD+PS</span>';
}

function toggleCard(idx) {
  openCard = openCard === idx ? null : idx;
  render();
}

function getFiltered() {
  return CMDS.filter(c => {
    const matchTab = activeTab === 'alle'
      || c.cat === activeTab
      || (activeTab === 'powershell' && c.typ === 'ps' && c.cat !== 'ad' && c.cat !== 'dns' && c.cat !== 'run');
    const q = searchQuery;
    const matchQ = !q || c.name.toLowerCase().includes(q) || c.short.toLowerCase().includes(q);
    return matchTab && matchQ;
  });
}

function cardHtml(c, globalIdx) {
  const isOpen = openCard === globalIdx;
  const q = searchQuery;
  let detail = '';
  if (isOpen) {
    if (c.cat === 'run') {
      // Run commands: show tip only (no syntax/examples labels needed)
      detail = `<div class="cmd-detail">
        <div class="detail-row"><div class="detail-label">&#128161; Beschreibung & Tipp</div><div class="tip-box">${c.tip}</div></div>
        ${c.syntax ? '<div class="detail-row"><div class="detail-label">&#9000; Oefffnet</div><div class="code-box">' + c.syntax + '</div></div>' : ''}
      </div>`;
    } else {
      const exHtml = c.examples.map(e => `<div class="example-line">&gt; ${e}</div>`).join('');
      detail = `<div class="cmd-detail">
        <div class="detail-row"><div class="detail-label">&#9000; Syntax</div><div class="code-box">${c.syntax}</div></div>
        <div class="detail-row"><div class="detail-label">&#9654; Beispiele</div>${exHtml}</div>
        <div class="detail-row"><div class="detail-label">&#128161; Tipp</div><div class="tip-box">${c.tip}</div></div>
      </div>`;
    }
  }
  // Win-version badges for run commands
  let winBadges = '';
  if (c.cat === 'run' && c.win) {
    if (c.win.includes('7'))  winBadges += '<span class="run-win run-w7">W7</span>';
    if (c.win.includes('8'))  winBadges += '<span class="run-win run-w8">W8</span>';
    if (c.win.includes('10')) winBadges += '<span class="run-win run-w10">W10</span>';
    if (c.win.includes('11')) winBadges += '<span class="run-win run-w11">W11</span>';
  }
  return `<div class="cmd-card${isOpen ? ' open' : ''}" onclick="toggleCard(${globalIdx})">
    <div class="cmd-head">
      <div class="cmd-name-wrap">
        <div class="cmd-name">${hl(c.name, q)}${winBadges}</div>
        <div class="cmd-short">${hl(c.short, q)}</div>
      </div>
      ${badgeHtml(c.typ, c.cat)}
      <div class="cmd-arrow">&#9660;</div>
    </div>${detail}
  </div>`;
}

    </div>`;
  } else {
    header = `<div class="cat-header"><div class="cat-header-text"><h2>Suche: "${searchQuery}"</h2><p>${filtered.length} Treffer</p></div></div>`;
  }
  content.innerHTML = header + `<div class="cmd-grid">${filtered.map(c => cardHtml(c, CMDS.indexOf(c))).join('')}</div>`;
}

buildNav();
buildBottomNav();
render();
</script>
</body>
</html>
